<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>New Stage 4 diagrams — preview gallery</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:24px;background:#f8fafc;color:#0f172a}
    h1{font-size:1.3rem} p.lead{color:#475569;max-width:60ch}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-top:18px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .card h2{font-size:.95rem;margin:0 0 4px} .card .eng{font-size:.72rem;color:#64748b;margin:0 0 10px}
    .card .box{height:220px;display:flex;align-items:center;justify-content:center}
    .card .box svg{max-width:100%;max-height:220px}
  </style>
</head>
<body>
  <h1>New Stage 4 diagram types — preview</h1>
  <p class="lead">Faithful, browser-rendered preview of every new diagram added during the Stage 4 expansion. Each card renders the engine exactly as it appears on worksheets. Refresh to see different random examples where relevant.</p>
  <div id="grid" class="grid"></div>

  <script src="./engines/integers/integer-engine.js"></script>
  <script src="./engines/equations/equation-engine.js"></script>
  <script src="./engines/fdp/fdp-engine.js"></script>
  <script src="./engines/algebra/algebra-engine.js"></script>
  <script src="./engines/area/area-engine.js"></script>
  <script src="./engines/length/length-engine.js"></script>
  <script src="./engines/rates/rates-engine.js"></script>
  <script src="./engines/indices/indices-engine.js"></script>
  <script src="./engines/pythagoras/pythagoras-engine.js"></script>
  <script src="./engines/linear/linear-engine.js"></script>
  <script>
    const cases = [
      ["Integers", "number-line jumps", "MMT_INTEGER_ENGINE", {diagramType:"number-line-jumps", min:-10,max:10,step:1,start:-6,jumps:[{by:9},{by:-4}],labels:[-10,-5,0,5,10]}],
      ["Integers", "thermometer", "MMT_INTEGER_ENGINE", {diagramType:"thermometer", min:-20,max:40,step:10,value:-5,unit:"°C",showValue:true}],
      ["FDP", "fraction circle", "MMT_FDP_ENGINE", {diagramType:"fraction-circle", numerator:3, denominator:8}],
      ["FDP", "fraction of a set", "MMT_FDP_ENGINE", {diagramType:"fraction-of-set", total:12, shaded:9, cols:6}],
      ["FDP", "fraction number line", "MMT_FDP_ENGINE", {diagramType:"number-line-fraction", denominator:4, wholes:2, markNumerator:5, showMark:true}],
      ["FDP", "multiply (area model)", "MMT_FDP_ENGINE", {diagramType:"fraction-multiply-area", n1:2,d1:3,n2:3,d2:4}],
      ["FDP", "double number line", "MMT_FDP_ENGINE", {diagramType:"double-number-line", topMax:100, bottomMax:80, ticks:4}],
      ["FDP", "equivalent bars", "MMT_FDP_ENGINE", {diagramType:"equivalent-bars", fracs:[{n:1,d:2},{n:3,d:6}], showLabel:true}],
      ["Algebra", "algebra tiles", "MMT_ALGEBRA_ENGINE", {diagramType:"algebra-tiles", x:3, ones:4}],
      ["Algebra", "expand (area model)", "MMT_ALGEBRA_ENGINE", {diagramType:"expand-area-model", multiplier:"3", parts:["x","4"], products:["3x","12"], showProducts:true}],
      ["Algebra", "perimeter figure", "MMT_ALGEBRA_ENGINE", {diagramType:"perimeter-figure", shape:"rectangle", width:"x", length:"x + 3"}],
      ["Algebra", "function machine", "MMT_ALGEBRA_ENGINE", {diagramType:"function-machine", input:"x", operations:[{text:"× 3"},{text:"+ 2"}], output:"?"}],
      ["Equations", "balance scale", "MMT_EQUATION_ENGINE", {diagramType:"balance-scale", leftX:2, leftConst:3, rightConst:9}],
      ["Equations", "inequality number line", "MMT_EQUATION_ENGINE", {diagramType:"inequality-number-line", value:2, direction:">=", min:-10, max:10, step:1}],
      ["Equations", "bar model", "MMT_EQUATION_ENGINE", {diagramType:"bar-model", total:23, totalLabel:"23", parts:[{label:"x"},{label:"x"},{label:"5"}]}],
      ["Area", "grid count", "MMT_AREA_ENGINE", {diagramType:"grid-count", cols:6, rows:4}],
      ["Area", "annulus (ring)", "MMT_AREA_ENGINE", {diagramType:"curved-composite", shape:"annulus", outerLabel:"5 m", innerLabel:"3 m"}],
      ["Length", "ruler", "MMT_LENGTH_ENGINE", {diagramType:"ruler", maxCm:12, objectStart:1, objectEnd:8}],
      ["Ratios & Rates", "ratio bar model", "MMT_RATES_ENGINE", {diagramType:"ratio-bar", parts:[{label:"A",units:2},{label:"B",units:3}], totalLabel:"$50"}],
      ["Ratios & Rates", "scale drawing", "MMT_RATES_ENGINE", {diagramType:"scale-drawing", title:"Floor plan", lengthLabel:"6 cm", widthLabel:"4 cm", scale:"1:100"}],
      ["Ratios & Rates", "double number line", "MMT_RATES_ENGINE", {diagramType:"double-number-line", topLabel:"drinks", bottomLabel:"cost ($)", topMax:5, bottomMax:15, ticks:5}],
      ["Indices", "index-law expansion", "MMT_INDICES_ENGINE", {diagramType:"index-expansion", base:"x", groups:[3,2], op:"×", resultExp:5}],
      ["Pythagoras", "3-D box diagonal", "MMT_PYTHAGORAS_ENGINE", {diagramType:"box-3d", lengthLabel:"6 cm", depthLabel:"4 cm", heightLabel:"3 cm", diagonalLabel:"x"}],
      ["Pythagoras", "isosceles (composite)", "MMT_PYTHAGORAS_ENGINE", {diagramType:"isosceles", baseLabel:"6 cm", slantLabel:"5 cm", heightLabel:"h"}],
      ["Pythagoras", "ladder (real-world)", "MMT_PYTHAGORAS_ENGINE", {diagramType:"ladder-wall", heightLabel:"4 m", baseLabel:"3 m", ladderLabel:"x"}],
      ["Linear", "gradient triangle", "MMT_LINEAR_ENGINE", {diagramType:"linear-graph", xMin:-8, xMax:8, yMin:-8, yMax:8, width:720, height:620, squareGrid:true, xStep:1, yStep:1, xMinorStep:1, yMinorStep:1, line:{m:2,b:1}, showGradientTriangle:true, gradTriX1:1, gradTriRun:2, runLabel:"run = 2", riseLabel:"rise = 4"}],
      ["Linear", "x/y intercepts", "MMT_LINEAR_ENGINE", {diagramType:"linear-graph", xMin:-8, xMax:8, yMin:-8, yMax:8, width:720, height:620, squareGrid:true, xStep:1, yStep:1, xMinorStep:1, yMinorStep:1, line:{m:2,b:-4,label:"y = 2x − 4"}}],
      ["Linear", "name the quadrant", "MMT_LINEAR_ENGINE", {diagramType:"coordinate-plane", xMin:-5, xMax:5, yMin:-5, yMax:5, xStep:1, yStep:1, xMinorStep:1, yMinorStep:1, width:620, height:620, squareGrid:true, points:[{label:"P",x:-3,y:2}]}]
    ];
    const grid = document.getElementById("grid");
    for (const [topic, name, eng, cfg] of cases) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<h2>${topic} — ${name}</h2><p class="eng">${eng} · ${cfg.diagramType}</p><div class="box"></div>`;
      grid.appendChild(card);
      try { window[eng].render(card.querySelector(".box"), cfg); }
      catch (e) { card.querySelector(".box").textContent = "render error: " + e.message; }
    }
  </script>
</body>
</html>
