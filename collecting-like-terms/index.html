<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Collecting Like Terms</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow: 0 14px 40px rgba(0,0,0,.10);

      --blue:#2563eb;
      --blue2:#1d4ed8;

      --purple:#8b5cf6;

      --ok:#16a34a;
      --bad:#dc2626;

      --bubbleStroke:#8b5cf6;
      --bubbleDia:220px;

      /* 🔧 TUNER: bubble text size ONLY (adjust this) */
      --bubbleFont: 20px;

      --exprFontSmall: 54px;

      --termChipBg:#eef2ff;
      --termChipBd:#c7d2fe;
      --termChipInk:#1d4ed8;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 700px at 50% -200px, #eaf2ff 0%, var(--bg) 60%, var(--bg) 100%);
      color:var(--ink);
    }

    .topbar{
      position: sticky;
      top:0;
      z-index: 20;
      background: rgba(246,247,251,.82);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(229,231,235,.6);
    }
    .topbar-inner{
      max-width: 1480px;
      margin: 0 auto;
      padding: 14px 12px;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .backBtn{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid var(--border);
      background:#fff;
      padding:10px 14px;
      border-radius: 999px;
      box-shadow: 0 10px 20px rgba(0,0,0,.05);
      text-decoration:none;
      color:var(--ink);
      font-weight:700;
      white-space:nowrap;
    }
    .backBtn img{
      width:28px; height:28px;
      border-radius: 8px;
      object-fit: contain;
    }

    .titlePill{
      margin-left:auto;
      margin-right:auto;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue2) 100%);
      color:#fff;
      font-weight: 900;
      letter-spacing: .2px;
      box-shadow: 0 16px 30px rgba(37,99,235,.18);
      min-width: 280px;
      text-align:center;
    }

    .topActions{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .pillBtn, .pillSelect, .pillToggle{
      border:1px solid var(--border);
      background:#fff;
      padding:10px 14px;
      border-radius: 999px;
      box-shadow: 0 10px 20px rgba(0,0,0,.05);
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
      color:var(--ink);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .pillBtn.blue{
      border-color:#bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
    }
    .pillBtn.red{
      border-color:#fecaca;
      background:#fff1f2;
      color:#b91c1c;
    }
    .pillSelect{
      padding: 10px 12px;
    }
    .pillSelect select{
      border:none;
      background:transparent;
      font: inherit;
      font-weight:800;
      cursor:pointer;
      outline:none;
    }
    .pillToggle{
      padding: 10px 12px;
      cursor:pointer;
      user-select:none;
    }
    .pillToggle input{
      width:18px;
      height:18px;
      accent-color: var(--purple);
      cursor:pointer;
    }

    .wrap{
      max-width: 1480px;
      margin: 14px auto 0;
      padding: 0 10px 24px;
    }

    .card{
      background: rgba(255,255,255,.92);
      border:1px solid rgba(229,231,235,.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    /* term row */
    .termsRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      align-items:center;
      padding: 8px 4px 4px;
    }
    .termChip{
      display:flex;
      align-items:center;
      gap:8px;
      padding: 8px 10px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 2px solid #dbeafe;
      box-shadow: 0 12px 26px rgba(0,0,0,.06);
    }
    .termChip .seg{
      display:flex;
      align-items:center;
      gap:6px;
      background: var(--termChipBg);
      border: 1px solid var(--termChipBd);
      border-radius: 12px;
      padding: 6px 8px;
    }
    .seg label{
      color: var(--termChipInk);
      font-weight: 900;
      letter-spacing:.2px;
      white-space:nowrap;
      font-size: 14px;
    }
    .seg input{
      width: 40px;
      border: 2px solid #c7d2fe;
      background:#fff;
      border-radius: 10px;
      padding: 6px 8px;
      font-weight: 900;
      color: #1d4ed8;
      outline:none;
      text-align:center;
    }
    .seg input.unit{
      width: 46px;
      text-transform:none;
    }

    .opSelect{
      border: 2px solid #ddd6fe;
      background:#f5f3ff;
      color:#5b21b6;
      border-radius: 12px;
      padding: 6px 8px;
      font-weight: 900;
      outline:none;
      cursor:pointer;
      font-size: 14px;
    }

    .addTermBtn{
      margin: 10px auto 4px;
      display:block;
      border: 2px solid #ddd6fe;
      background: #faf5ff;
      color:#6d28d9;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      cursor:pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,.05);
    }
    .addTermBtn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    /* bubbles */
    .bubblesRow{
      margin-top: 14px;
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      padding-bottom: 28px; /* space for Simplify button */
    }
    .bubble{
      width: var(--bubbleDia);
      height: var(--bubbleDia);
      border-radius: 999px;
      border: 5px solid var(--bubbleStroke);
      background: rgba(255,255,255,.92);
      box-shadow: 0 14px 35px rgba(0,0,0,.08);
      position:relative;
      overflow:hidden;
      --dotScale: 1;
    }
    .bubble .dot{
      position:absolute;
      transform: translate(-50%,-50%) scale(var(--dotScale));
      font-weight: 1000;
      font-size: var(--bubbleFont);
      line-height: 1;
      letter-spacing: .2px;
      user-select:none;
      white-space:nowrap;

      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      border: 2px solid rgba(139,92,246,.55);
      box-shadow: 0 6px 14px rgba(0,0,0,.10);
    }
    .dot.pos{ color: var(--ok); }
    .dot.neg{ color: var(--bad); }

    /* simplify + box */
    .belowRow{
      margin-top: 20px;
      display:flex;
      justify-content:center;
    }
    .simplifyWrap{
      width: 100%;
      max-width: 1220px;
      position: relative;
    }
    .simplifyBtn{
      position:absolute;
      left: 10px;
      top: -44px;
      border: 2px solid #ddd6fe;
      background: #faf5ff;
      color:#6d28d9;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 900;
      cursor:pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,.06);
      z-index: 5;
      transform: translateZ(0);
    }
    .simplifyBtn:disabled{ opacity:.55; cursor:not-allowed; }

    @keyframes pulseBtn {
      0%   { transform: translateZ(0) scale(1); }
      40%  { transform: translateZ(0) scale(1.06); }
      100% { transform: translateZ(0) scale(1); }
    }
    .simplifyBtn.pulse{
      animation: pulseBtn 260ms cubic-bezier(.2,.9,.2,1);
    }

    .workBox{
      background:#fff;
      border: 1px solid rgba(229,231,235,.9);
      border-radius: 22px;
      box-shadow: 0 14px 35px rgba(0,0,0,.07);
      padding: 18px 16px 14px;
      position: relative;
    }
    .workLines{
      display:flex;
      flex-direction:column;
      gap: 14px;
      align-items:center;
    }

    .line0{
      width:100%;
      display:grid;
      gap: 8px;
      align-items:center;
    }

    .termCell{
      text-align:center;
      font-weight: 1000;
      font-size: var(--exprFontSmall);
      color:#0f172a;
      letter-spacing: .2px;
      white-space: nowrap;
    }
    .termCell.pos{ color: var(--ok); }
    .termCell.neg{ color: var(--bad); }

    .rule{
      width:100%;
      border-top: 2px dashed #c7d2fe;
      margin: 6px 0 0;
    }

    .eqLine{
      width:100%;
      display:flex;
      justify-content:center;
      gap: 14px;
      align-items:baseline;
      font-weight:1000;
      font-size: var(--exprFontSmall);
      color:#0f172a;
      position: relative;
    }
    .eqLine .eq{ font-weight:1000; opacity:.9; }

    @keyframes flashLine {
      0%   { transform: translateY(-2px); filter: drop-shadow(0 0 0 rgba(37,99,235,0)); }
      60%  { transform: translateY(0);   filter: drop-shadow(0 10px 18px rgba(37,99,235,.14)); }
      100% { transform: translateY(0);   filter: drop-shadow(0 0 0 rgba(37,99,235,0)); }
    }
    .eqLine.flash{
      animation: flashLine 320ms cubic-bezier(.2,.9,.2,1);
    }

    .eqTokens{
      display:inline-flex;
      align-items:baseline;
      gap:0;
      flex-wrap:wrap;
    }
    .eqTok{
      display:inline-block;
      white-space: pre;
      transform: translateZ(0);
    }
    .eqTok.pos{ color: var(--ok); }
    .eqTok.neg{ color: var(--bad); }

    /* animation overlay */
    .animLayer{
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }
    .ghost{
      position: fixed;
      left: 0;
      top: 0;
      transform: translate(0,0);
      will-change: transform, opacity;
      pointer-events: none;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.18));
    }

    /* tiny toast */
    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      box-shadow: 0 16px 30px rgba(0,0,0,.20);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 10000;
    }
    .toast.show{ opacity: 1; }

    .footerLink{
      margin: 18px auto 22px;
      max-width: 1480px;
      text-align:center;
      color:#111827;
      font-weight:800;
      opacity:.9;
    }
    .footerLink a{ color:#2563eb; text-decoration:none; font-weight:900; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="backBtn" href="https://www.millsmathstools.au" target="_blank" rel="noopener">
        <img src="mmt.png" alt="MMT" />
        <span>Back to Mills Maths Tools</span>
      </a>

      <div class="titlePill">Collecting Like Terms</div>

      <div class="topActions">
        <div class="pillSelect" title="Tools">
          <select id="toolsMenu">
            <option value="" selected>Tools ▾</option>
            <option value="lesson-plan.html">Lesson plan</option>
            <option value="worksheet-creator.html">Worksheet Creator</option>
            <option value="student-quiz.html">Student Quiz</option>
          </select>
        </div>

        <div class="pillSelect" title="Teacher settings">
          <select id="teacherMode">
            <option value="single" selected>Single terms ▾</option>
            <option value="two">Double terms</option>
          </select>
        </div>

        <!-- ✅ optional middot toggle -->
        <label class="pillToggle" title="Use · instead of ×">
          <input id="mulToggle" type="checkbox" />
          <span>Use ·</span>
        </label>

        <button class="pillBtn red" id="resetBtn" type="button">Reset</button>
        <button class="pillBtn blue" id="randomBtn" type="button">Random</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="termsRow" id="termsRow"></div>
      <button class="addTermBtn" id="addTermBtn" type="button">Click to add term</button>

      <div class="bubblesRow" id="bubblesRow"></div>

      <div class="belowRow">
        <div class="simplifyWrap">
          <button class="simplifyBtn" id="simplifyBtn" type="button">Simplify 0/1</button>
          <div class="workBox">
            <div class="workLines" id="workLines"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footerLink">
      This tool and more can be found at <a href="https://www.millsmathstools.au" target="_blank" rel="noopener">www.millsmathstools.au</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  const MAX_TERMS = 5;

  // term model: {op:'+'|'-', groups:1..9, unit:'x'}
  let terms = [
    { op: '+', groups: 5, unit: '8' },
    { op: '+', groups: 4, unit: 'x' },
    { op: '-', groups: 7, unit: 'x' }
  ];

  let mode = 'single'; // 'single' | 'two'
  let simplifyStep = 0;
  let simplifyTotal = 1; // computed
  let cachedLines = [];  // [{type:'line0', items:[...]} , {type:'eq', text:'...'}]

  // Animation / flow control
  let busyReveal = false;
  let lastResetArmAt = 0;

  // Multiplication symbol toggle
  let useDot = false; // "·" when true, otherwise "×"

  const el = (id) => document.getElementById(id);

  const termsRow = el('termsRow');
  const bubblesRow = el('bubblesRow');
  const addTermBtn = el('addTermBtn');
  const simplifyBtn = el('simplifyBtn');
  const workLines = el('workLines');
  const toastEl = el('toast');

  const MUL = () => (useDot ? '·' : '×');

  function showToast(msg, ms=1200){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    window.clearTimeout(showToast._t);
    showToast._t = window.setTimeout(() => toastEl.classList.remove('show'), ms);
  }

  function pulseSimplify(){
    simplifyBtn.classList.remove('pulse');
    // restart animation
    void simplifyBtn.offsetWidth;
    simplifyBtn.classList.add('pulse');
  }

  // navigation
  el('toolsMenu').addEventListener('change', (e) => {
    const v = e.target.value;
    if (v) window.location.href = v;
    e.target.value = '';
  });

  el('teacherMode').addEventListener('change', (e) => {
    mode = e.target.value;
    if (mode !== 'single' && mode !== 'two') mode = 'single';
    simplifyStep = 0;
    busyReveal = false;
    renderAll();
  });

  // remember middot choice
  try{
    const saved = localStorage.getItem('mmt_collect_mulDot');
    if (saved === '1') useDot = true;
  }catch(_){}
  el('mulToggle').checked = useDot;
  el('mulToggle').addEventListener('change', (e) => {
    useDot = !!e.target.checked;
    try{ localStorage.setItem('mmt_collect_mulDot', useDot ? '1' : '0'); }catch(_){}
    // re-render working text to update symbols
    computeSimplifyLines();
    renderWorkBox();
  });

  function doReset(){
    terms = [
      { op: '+', groups: 5, unit: '8' },
      { op: '+', groups: 4, unit: 'x' },
      { op: '-', groups: 7, unit: 'x' }
    ];
    simplifyStep = 0;
    busyReveal = false;
    renderAll();
  }

  el('resetBtn').addEventListener('click', () => {
    doReset();
  });

  el('randomBtn').addEventListener('click', () => {
    makeRandomQuestion();
    simplifyStep = 0;
    busyReveal = false;
    renderAll();
  });

  // Spacebar shortcut for Random
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      const a = document.activeElement;
      const tag = a ? a.tagName.toLowerCase() : '';
      if (tag === 'input' || tag === 'select' || tag === 'textarea') return;
      e.preventDefault();
      makeRandomQuestion();
      simplifyStep = 0;
      busyReveal = false;
      renderAll();
    }
  }, { passive: false });

  // ✅ keyboard flow:
  // N = Random
  // R or S = Reveal/Simplify
  // Backspace twice = Reset
  window.addEventListener('keydown', (e) => {
    const a = document.activeElement;
    const tag = a ? a.tagName.toLowerCase() : '';
    const inInput = (tag === 'input' || tag === 'select' || tag === 'textarea');

    if (inInput) return;

    if (e.key === 'n' || e.key === 'N'){
      e.preventDefault();
      el('randomBtn').click();
      return;
    }

    if (e.key === 'r' || e.key === 'R' || e.key === 's' || e.key === 'S'){
      e.preventDefault();
      if (!simplifyBtn.disabled) simplifyBtn.click();
      return;
    }

    if (e.key === 'Backspace'){
      e.preventDefault();
      const now = Date.now();
      if (now - lastResetArmAt < 1500){
        doReset();
        showToast('Reset ✓', 900);
        lastResetArmAt = 0;
      } else {
        lastResetArmAt = now;
        showToast('Press Backspace again to reset', 1200);
      }
    }
  });

  addTermBtn.addEventListener('click', () => {
    if (terms.length >= MAX_TERMS) return;
    terms.push({ op: '+', groups: 1, unit: (mode === 'single' ? 'x' : 'x') });
    simplifyStep = 0;
    busyReveal = false;
    renderAll();
  });

  // ✅ reveal logic: animate per like-term group on first reveal,
  // but only increment the simplify counter when the line is COMPLETE.
  simplifyBtn.addEventListener('click', async () => {
    if (busyReveal) return;
    if (simplifyStep >= simplifyTotal) return;

    const nextLine = cachedLines[simplifyStep + 1];

    // First reveal: collected like terms, animate group-by-group
    if (simplifyStep === 0 && nextLine && nextLine.anim === 'collect'){
      busyReveal = true;
      simplifyBtn.disabled = true;
      pulseSimplify();

      // Render a preview of the next line (tokens hidden), then animate into it
      const eqEl = renderWorkBoxPreviewEq(nextLine);
      await animateCollectSequential(eqEl);

      // Now count this reveal as complete
      simplifyStep++;
      busyReveal = false;
      renderWorkBox();
      renderSimplifyBtn();
      flashNewestEq();
      return;
    }

    // Other reveals: normal
    pulseSimplify();
    simplifyStep++;
    renderWorkBox();
    renderSimplifyBtn();
    flashNewestEq();
  });

  function clampInt(v, min, max, fallback){
    const n = parseInt(String(v), 10);
    if (Number.isFinite(n)) return Math.max(min, Math.min(max, n));
    return fallback;
  }

  function sanitizeGroups(v){
    return clampInt(v, 1, 9, 1);
  }

  function sanitizeUnit(raw){
    let s = String(raw ?? '').trim();
    if (!s) return (mode === 'single' ? 'x' : 'x');

    s = s.replace(/^\-+/, '');

    if (mode === 'single'){
      s = s.replace(/[^a-zA-Z0-9]/g, '');
      if (!s) return 'x';
      s = s.slice(0, 1);

      if (/^\d$/.test(s)){
        const d = clampInt(s, 1, 9, 1);
        return String(d);
      }
      return s.toLowerCase();
    }

    s = s.replace(/[^a-zA-Z0-9]/g, '');
    if (!s) return 'x';

    const digits = (s.match(/\d+/g) || []).join('');
    const letters = (s.match(/[a-zA-Z]+/g) || []).join('').toLowerCase();

    let d = digits ? String(clampInt(digits, 1, 99, 1)) : '';
    let l = letters ? letters : '';

    if (!d && !l) return 'x';
    return (d + l) || 'x';
  }

  function normalizeUnit(u){
    const s = String(u).trim().toLowerCase();
    if (!s) return 'x';
    const digits = (s.match(/^\d+/) || [''])[0];
    const rest = s.slice(digits.length);
    return digits + rest;
  }

  function isNumericUnit(u){
    return /^\d+$/.test(u);
  }

  function hasLeadingDigit(u){
    return /^\d/.test(u);
  }

  function splitNumLetters(u){
    const m = String(u).toLowerCase().match(/^(\d+)([a-z]+)$/);
    if (!m) return null;
    return { num: parseInt(m[1],10), letters: m[2] };
  }

  function termKey(u){
    return normalizeUnit(u);
  }

  function termToExpression(groups, unit, signForText){
    const g = groups;
    const u = normalizeUnit(unit);

    const neg = signForText < 0;
    const signPrefix = neg ? '− ' : '+ ';

    if (g === 1){
      return signPrefix + u;
    }

    if (!hasLeadingDigit(u) && !isNumericUnit(u)){
      return signPrefix + String(g) + u;
    }

    return signPrefix + String(g) + MUL() + u;
  }

  function termToExpressionFirst(groups, unit){
    const g = groups;
    const u = normalizeUnit(unit);

    if (g === 1) return u;
    if (!hasLeadingDigit(u) && !isNumericUnit(u)) return String(g) + u;
    return String(g) + MUL() + u;
  }

  function makeRandomQuestion(){
    const nTerms = Math.random() < 0.6 ? 4 : 3;
    const groupsPool = [1,2,3,4,5,6,7,8,9];

    const unitChoicesSingle = ['x','a','b','c','m','n','p', '2','3','4','5','6','7','8','9'];
    const unitChoicesTwo = ['x','a','b','ab','xy','m','n','p','38','43','59','12','7b','9b','7ab','3x','5x','6a','4b','9x','11a'];

    let u1, u2;
    if (mode === 'single'){
      u1 = unitChoicesSingle[Math.floor(Math.random()*unitChoicesSingle.length)];
      do { u2 = unitChoicesSingle[Math.floor(Math.random()*unitChoicesSingle.length)]; } while (u2 === u1);
    } else {
      u1 = unitChoicesTwo[Math.floor(Math.random()*unitChoicesTwo.length)];
      do { u2 = unitChoicesTwo[Math.floor(Math.random()*unitChoicesTwo.length)]; } while (normalizeUnit(u2) === normalizeUnit(u1));
    }

    const units = [u1, u2];
    const local = [];

    for (let i=0;i<nTerms;i++){
      const unit = (i < 2) ? units[i] : units[Math.floor(Math.random()*2)];
      const groups = groupsPool[Math.floor(Math.random()*groupsPool.length)];
      local.push({ op: '+', groups, unit });
    }

    local[0].op = '+';
    for (let i=1;i<local.length;i++){
      local[i].op = Math.random() < 0.35 ? '-' : '+';
    }

    terms = local;
  }

  function renderAll(){
    addTermBtn.disabled = terms.length >= MAX_TERMS;

    terms = terms.map((t, idx) => {
      const groups = sanitizeGroups(t.groups);
      const unit = sanitizeUnit(t.unit);
      const op = (idx === 0) ? '+' : (t.op === '-' ? '-' : '+');
      return { op, groups, unit };
    });

    simplifyStep = 0;
    busyReveal = false;

    renderTermsUI();
    renderBubbles();
    computeSimplifyLines();
    renderWorkBox();
    renderSimplifyBtn();
  }

  function renderTermsUI(){
    termsRow.innerHTML = '';

    terms.forEach((t, idx) => {
      const chip = document.createElement('div');
      chip.className = 'termChip';

      if (idx !== 0){
        const op = document.createElement('select');
        op.className = 'opSelect';
        op.innerHTML = `
          <option value="+">+</option>
          <option value="-">−</option>
        `;
        op.value = t.op;
        op.addEventListener('change', () => {
          t.op = op.value;
          simplifyStep = 0;
          busyReveal = false;
          renderBubbles();
          computeSimplifyLines();
          renderWorkBox();
          renderSimplifyBtn();
        });
        chip.appendChild(op);
      }

      const seg = document.createElement('div');
      seg.className = 'seg';

      const gInp = document.createElement('input');
      gInp.type = 'text';
      gInp.inputMode = 'numeric';
      gInp.value = String(t.groups);
      gInp.title = 'Number of groups (1–9)';
      gInp.addEventListener('input', () => {
        t.groups = sanitizeGroups(gInp.value);
        gInp.value = String(t.groups);
        simplifyStep = 0;
        busyReveal = false;
        renderBubbles();
        computeSimplifyLines();
        renderWorkBox();
        renderSimplifyBtn();
      });

      const lbl = document.createElement('label');
      lbl.textContent = 'groups of';

      const uInp = document.createElement('input');
      uInp.type = 'text';
      uInp.className = 'unit';
      uInp.value = t.unit;
      uInp.title = (mode === 'single')
        ? 'Unit: one digit (1–9) OR one letter'
        : 'Unit: number up to 99, letters, or number+letters (e.g., 7b, ab)';
      uInp.addEventListener('input', () => {
        const before = uInp.value;
        const cleaned = sanitizeUnit(before);
        t.unit = cleaned;
        if (cleaned !== before){
          uInp.value = cleaned;
        }
        simplifyStep = 0;
        busyReveal = false;
        renderBubbles();
        computeSimplifyLines();
        renderWorkBox();
        renderSimplifyBtn();
      });

      seg.appendChild(gInp);
      seg.appendChild(lbl);
      seg.appendChild(uInp);

      chip.appendChild(seg);
      termsRow.appendChild(chip);
    });
  }

  // Dice-like positions (percent coords) for 1..9
  const DOTS = {
    1: [[50,50]],
    2: [[30,35],[70,65]],
    3: [[30,35],[50,50],[70,65]],
    4: [[30,30],[70,30],[30,70],[70,70]],
    5: [[30,30],[70,30],[50,50],[30,70],[70,70]],
    6: [[30,25],[70,25],[30,50],[70,50],[30,75],[70,75]],
    7: [[30,25],[70,25],[30,50],[70,50],[30,75],[70,75],[50,50]],
    8: [[30,25],[70,25],[30,50],[70,50],[30,75],[70,75],[50,37],[50,63]],
    9: [[30,25],[50,25],[70,25],[30,50],[50,50],[70,50],[30,75],[50,75],[70,75]]
  };

  function positionsForCount(n){
    const k = Math.max(1, Math.min(9, n));
    return DOTS[k];
  }

  function renderBubbles(){
    bubblesRow.innerHTML = '';

    terms.forEach((t) => {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      // ✅ bubble clarity: slightly smaller halo chips for dense 8/9 patterns
      bubble.style.setProperty('--dotScale', (t.groups >= 8 ? '0.92' : '1'));

      const signNeg = (t.op === '-');
      const cls = signNeg ? 'neg' : 'pos';
      const token = normalizeUnit(t.unit);
      const shownToken = signNeg ? ('-' + token) : token;

      const pos = positionsForCount(t.groups);
      pos.forEach(([x,y]) => {
        const d = document.createElement('div');
        d.className = 'dot ' + cls;
        d.style.left = x + '%';
        d.style.top = y + '%';
        d.textContent = shownToken;
        bubble.appendChild(d);
      });

      bubblesRow.appendChild(bubble);
    });
  }

  function collectedMap(){
    const order = [];
    const map = new Map();
    terms.forEach((t, idx) => {
      const u = termKey(t.unit);
      const sgn = (idx === 0 ? +1 : (t.op === '-' ? -1 : +1));
      const add = sgn * t.groups;
      if (!map.has(u)){
        map.set(u, add);
        order.push(u);
      } else {
        map.set(u, map.get(u) + add);
      }
    });
    return { map, order };
  }

  function buildCollectedTokens(map, order){
    const tokens = [];
    for (const u of order){
      const c = map.get(u);
      if (!c) continue;

      const neg = c < 0;
      const abs = Math.abs(c);

      let body;
      if (abs === 1){
        body = u;
      } else {
        if (!hasLeadingDigit(u) && !isNumericUnit(u)) body = String(abs) + u;
        else body = String(abs) + MUL() + u;
      }

      const text = (tokens.length === 0)
        ? ((neg ? '− ' : '') + body)
        : ((neg ? ' − ' : ' + ') + body);

      tokens.push({ key: u, text, neg });
    }
    if (!tokens.length) tokens.push({ key:'__0__', text:'0', neg:false });
    return tokens;
  }

  function stringifyFromTokens(tokens){
    return tokens.map(t => t.text).join('');
  }

  function evaluateNumericAndCoeffAlgebra(map, order){
    let constSum = 0;

    const newOrder = [];
    const newMap = new Map();
    const seen = new Set();

    for (const u of order){
      const c = map.get(u);
      if (!c) continue;

      if (isNumericUnit(u)){
        constSum += c * parseInt(u,10);
        continue;
      }

      const nl = splitNumLetters(u);
      if (nl){
        const mergedCoeff = c * nl.num;
        const key = nl.letters;
        if (!seen.has(key)){
          newOrder.push(key);
          seen.add(key);
          newMap.set(key, mergedCoeff);
        } else {
          newMap.set(key, newMap.get(key) + mergedCoeff);
        }
        continue;
      }

      if (!seen.has(u)){
        newOrder.push(u);
        seen.add(u);
        newMap.set(u, c);
      } else {
        newMap.set(u, newMap.get(u) + c);
      }
    }

    return { constSum, newMap, newOrder };
  }

  function buildFinalTokens(constSum, map, order){
    const tokens = [];
    const pushTok = (neg, body, key) => {
      const text = (tokens.length === 0)
        ? ((neg ? '− ' : '') + body)
        : ((neg ? ' − ' : ' + ') + body);
      tokens.push({ key: key || '__final__', text, neg });
    };

    if (constSum !== 0){
      const neg = constSum < 0;
      pushTok(neg, String(Math.abs(constSum)), '__const__');
    }

    for (const u of order){
      const c = map.get(u);
      if (!c) continue;
      const neg = c < 0;
      const abs = Math.abs(c);

      let body;
      if (abs === 1) body = u;
      else body = String(abs) + u;

      pushTok(neg, body, u);
    }

    if (!tokens.length){
      tokens.push({ key:'__final__', text:'0', neg:false });
    }
    return tokens;
  }

  function computeSimplifyLines(){
    const originalItems = terms.map((t, idx) => {
      const sgn = (idx === 0 ? +1 : (t.op === '-' ? -1 : +1));
      if (idx === 0){
        return termToExpressionFirst(t.groups, t.unit);
      }
      return termToExpression(t.groups, t.unit, sgn);
    });

    const { map, order } = collectedMap();
    const collectedTokens = buildCollectedTokens(map, order);
    const collectedExpr = stringifyFromTokens(collectedTokens);

    const { constSum, newMap, newOrder } = evaluateNumericAndCoeffAlgebra(map, order);
    const finalTokens = buildFinalTokens(constSum, newMap, newOrder);
    const finalExpr = stringifyFromTokens(finalTokens);

    const line0Text = originalItems.join(' ');
    const line1Text = collectedExpr;
    const line2Text = finalExpr;

    const needLine1 = (normalizeSpaces(line1Text) !== normalizeSpaces(line0Text));
    const needLine2 = (normalizeSpaces(line2Text) !== normalizeSpaces(line1Text));

    cachedLines = [];
    cachedLines.push({ type:'line0', items: originalItems.slice() });

    if (needLine1){
      cachedLines.push({ type:'eq', text: line1Text, tokens: collectedTokens, anim: 'collect' });
    }
    if (needLine2){
      cachedLines.push({ type:'eq', text: line2Text, tokens: finalTokens });
    }

    simplifyTotal = Math.max(1, cachedLines.length - 1);
  }

  function normalizeSpaces(s){
    return String(s).replace(/\s+/g,' ').trim();
  }

  function renderSimplifyBtn(){
    simplifyBtn.textContent = `Simplify ${Math.min(simplifyStep, simplifyTotal)}/${simplifyTotal}`;
    simplifyBtn.disabled = busyReveal || (simplifyStep >= simplifyTotal);
  }

  function renderWorkBox(){
    workLines.innerHTML = '';

    const l0 = cachedLines.find(x => x.type === 'line0');

    const grid = document.createElement('div');
    grid.className = 'line0';

    const n = (l0?.items?.length || 1);
    grid.style.gridTemplateColumns = `repeat(${n}, var(--bubbleDia))`;
    grid.style.columnGap = '14px';
    grid.style.width = 'fit-content';
    grid.style.margin = '0 auto';
    grid.style.justifyContent = 'center';

    (l0?.items || ['']).forEach((txt, idx) => {
      const cell = document.createElement('div');
      const trimmed = String(txt).trim();
      const isNeg = trimmed.startsWith('−') || trimmed.startsWith('-');
      cell.className = 'termCell ' + (isNeg ? 'neg' : 'pos');

      const key = termKey(terms[idx]?.unit ?? 'x');
      cell.dataset.key = key;
      cell.dataset.idx = String(idx);
      cell.dataset.neg = isNeg ? '1' : '0';

      cell.textContent = txt;
      grid.appendChild(cell);
    });

    workLines.appendChild(grid);
    workLines.appendChild(ruleEl());

    let shown = 0;
    for (let i=1;i<cachedLines.length;i++){
      if (shown >= simplifyStep) break;

      const line = cachedLines[i];
      const eq = document.createElement('div');
      eq.className = 'eqLine';

      if (line.tokens && line.tokens.length){
        eq.innerHTML = `<span class="eq">=</span><span class="eqTokens"></span>`;
        const holder = eq.querySelector('.eqTokens');

        line.tokens.forEach(tok => {
          const s = document.createElement('span');
          s.className = 'eqTok ' + (tok.neg ? 'neg' : 'pos');
          s.dataset.key = tok.key;
          s.textContent = tok.text;
          holder.appendChild(s);
        });
      } else {
        eq.innerHTML = `<span class="eq">=</span><span>${escapeHtml(line.text)}</span>`;
      }

      workLines.appendChild(eq);
      shown++;
    }
  }

  // Preview renderer used ONLY for the first animated reveal (step 0 -> step 1)
  function renderWorkBoxPreviewEq(line){
    workLines.innerHTML = '';

    const l0 = cachedLines.find(x => x.type === 'line0');

    const grid = document.createElement('div');
    grid.className = 'line0';
    const n = (l0?.items?.length || 1);
    grid.style.gridTemplateColumns = `repeat(${n}, var(--bubbleDia))`;
    grid.style.columnGap = '14px';
    grid.style.width = 'fit-content';
    grid.style.margin = '0 auto';
    grid.style.justifyContent = 'center';

    (l0?.items || ['']).forEach((txt, idx) => {
      const cell = document.createElement('div');
      const trimmed = String(txt).trim();
      const isNeg = trimmed.startsWith('−') || trimmed.startsWith('-');
      cell.className = 'termCell ' + (isNeg ? 'neg' : 'pos');

      const key = termKey(terms[idx]?.unit ?? 'x');
      cell.dataset.key = key;
      cell.dataset.idx = String(idx);
      cell.dataset.neg = isNeg ? '1' : '0';

      cell.textContent = txt;
      grid.appendChild(cell);
    });

    workLines.appendChild(grid);
    workLines.appendChild(ruleEl());

    const eq = document.createElement('div');
    eq.className = 'eqLine';
    eq.innerHTML = `<span class="eq">=</span><span class="eqTokens"></span>`;
    const holder = eq.querySelector('.eqTokens');

    (line.tokens || []).forEach(tok => {
      const s = document.createElement('span');
      s.className = 'eqTok ' + (tok.neg ? 'neg' : 'pos');
      s.dataset.key = tok.key;
      s.textContent = tok.text;
      // start hidden; animation will pop them in
      s.style.opacity = '0';
      s.style.transform = 'scale(0.98)';
      holder.appendChild(s);
    });

    workLines.appendChild(eq);
    return eq;
  }

  function flashNewestEq(){
    const lines = [...workLines.querySelectorAll('.eqLine')];
    if (!lines.length) return;
    const last = lines[lines.length - 1];
    last.classList.remove('flash');
    void last.offsetWidth;
    last.classList.add('flash');
  }

  function ruleEl(){
    const r = document.createElement('div');
    r.className = 'rule';
    return r;
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;');
  }

  /* Animation layer helpers */
  function ensureAnimLayer(){
    let layer = document.querySelector('.animLayer');
    if (!layer){
      layer = document.createElement('div');
      layer.className = 'animLayer';
      document.body.appendChild(layer);
    }
    return layer;
  }

  function wait(ms){
    return new Promise(res => setTimeout(res, ms));
  }

  // ✅ Sequential: each like-term "group" animates, then the next group.
  async function animateCollectSequential(eqLineEl){
    const layer = ensureAnimLayer();

    const targets = [...eqLineEl.querySelectorAll('.eqTok[data-key]')];
    const sourceCells = [...document.querySelectorAll('.termCell[data-key]')];

    for (let ti = 0; ti < targets.length; ti++){
      const t = targets[ti];
      const key = t.dataset.key;

      // ignore placeholders
      if (!key || key === '__0__') {
        t.style.opacity = '1';
        t.style.transform = 'scale(1)';
        continue;
      }

      const sources = sourceCells.filter(s => s.dataset.key === key);
      const tRect = t.getBoundingClientRect();
      const tx = tRect.left + tRect.width/2;
      const ty = tRect.top + tRect.height/2;

      const driftPromises = [];

      for (let si=0; si<sources.length; si++){
        const s = sources[si];
        const sRect = s.getBoundingClientRect();
        const sx = sRect.left + sRect.width/2;
        const sy = sRect.top + sRect.height/2;

        const ghost = document.createElement('div');
        ghost.className = 'ghost termCell ' + (s.dataset.neg === '1' ? 'neg' : 'pos');
        ghost.textContent = s.textContent;
        ghost.style.left = (sx) + 'px';
        ghost.style.top = (sy) + 'px';
        ghost.style.transform = 'translate(-50%, -50%)';
        layer.appendChild(ghost);

        const dx = tx - sx;
        const dy = ty - sy;

        const drift = ghost.animate([
          { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
          { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.03)`, opacity: 1 }
        ], {
          duration: 520,
          delay: 40 * si,
          easing: 'cubic-bezier(.2,.9,.2,1)',
          fill: 'forwards'
        });

        driftPromises.push(drift.finished.then(() => ghost.remove()));
      }

      // wait until the last ghost is basically there, then pop the target
      const lastDelay = 40 * Math.max(0, sources.length - 1);
      await wait(520 + lastDelay - 140);

      // pop target in
      t.animate([
        { opacity: 0, transform: 'scale(0.98)' },
        { opacity: 1, transform: 'scale(1.12)' },
        { opacity: 1, transform: 'scale(1)' }
      ], {
        duration: 420,
        easing: 'cubic-bezier(.2,.9,.2,1)',
        fill: 'forwards'
      });

      t.style.opacity = '1';

      // finish this group cleanly before the next group begins
      await Promise.allSettled(driftPromises);
      await wait(120);
    }

    // micro-feedback on completion
    eqLineEl.classList.remove('flash');
    void eqLineEl.offsetWidth;
    eqLineEl.classList.add('flash');
  }

  // init
  renderAll();
})();
</script>
</body>
