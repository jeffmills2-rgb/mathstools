<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Collecting Like Terms – Worksheet Creator</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 14px 40px rgba(0,0,0,.10);
      --radius:18px;

      --blue:#2563eb;
      --green:#16a34a;
      --purple:#7c3aed;
      --amber:#d97706;
      --teal:#0f766e;

      --footer-h:44px;

      --mathFont:"Cambria Math","STIX Two Math","STIXGeneral","Times New Roman",serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding-bottom:var(--footer-h);
    }

    .wrap{
      max-width:1320px;
      margin:18px auto 40px;
      padding:0 16px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .title{
      font-size:30px;
      font-weight:1000;
      margin:0 0 6px;
    }

    .subtitle{
      margin:0 0 16px;
      color:var(--muted);
      font-weight:850;
      font-size:18px;
    }

    .controls{
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      padding:14px;
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(180deg,#ffffff,#f9fafb);
    }

    .fieldRow{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      align-items:flex-end;
      flex:1 1 auto;
    }

    label{
      display:block;
      font-weight:950;
      margin-bottom:8px;
    }

    select,input{
      border:2px solid #e5e7eb;
      border-radius:16px;
      padding:12px;
      font-weight:900;
      font-size:16px;
      background:#fff;
      outline:none;
    }

    select{ min-width:240px; }
    input{ min-width:200px; }

    .togglePanel{
      min-width:220px;
      border:2px solid #e5e7eb;
      border-radius:16px;
      background:#fff;
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .toggleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .toggleLabel{
      font-weight:900;
      font-size:14px;
      color:var(--ink);
      line-height:1.1;
    }

    .switch{
      position:relative;
      display:inline-block;
      width:52px;
      height:30px;
      flex:0 0 auto;
    }

    .switch input{
      opacity:0;
      width:0;
      height:0;
      position:absolute;
    }

    .slider{
      position:absolute;
      inset:0;
      cursor:pointer;
      background:#d1d5db;
      border-radius:999px;
      transition:.2s ease;
    }

    .slider:before{
      content:"";
      position:absolute;
      height:22px;
      width:22px;
      left:4px;
      top:4px;
      background:white;
      border-radius:50%;
      transition:.2s ease;
      box-shadow:0 1px 4px rgba(0,0,0,.18);
    }

    .switch input:checked + .slider{
      background:#2563eb;
    }

    .switch input:checked + .slider:before{
      transform:translateX(22px);
    }

    .btnRow{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-weight:900;
      cursor:pointer;
      transition:transform .04s ease, filter .15s ease, opacity .2s ease;
      user-select:none;
    }
    button:active{ transform:scale(.98); }
    button.primary{ background:#2563eb; color:#fff; }
    button.ghost{ background:#eef2ff; color:#1d4ed8; }
    button.danger{ background:#fee2e2; color:#991b1b; }

    .outWrap{ margin-top:16px; }

    .page{
      margin-top:16px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 10px 26px rgba(15,23,42,.08);
    }

    .pageHeader{
      padding:12px 16px 10px;
      border-bottom:1px solid rgba(229,231,235,.95);
      display:grid;
      grid-template-columns:minmax(0,1fr) auto auto;
      align-items:center;
      gap:16px;
    }

    .hdrLeft{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .hdrLeft img{
      width:34px;
      height:34px;
      object-fit:contain;
      display:block;
      flex:0 0 auto;
    }

    .hdrText{
      min-width:0;
    }

    .hdrTitle{
      font-weight:1000;
      font-size:16px;
      line-height:1.15;
    }

    .hdrSub{
      color:var(--ink);
      font-weight:850;
      font-size:13px;
      margin-top:2px;
      line-height:1.15;
    }

    .hdrMeta{
      color:var(--muted);
      font-weight:850;
      font-size:12px;
      margin-top:3px;
      line-height:1.15;
    }

    .lineField{
      display:flex;
      flex-direction:column;
      gap:5px;
      min-width:210px;
    }

    .lineLabel{
      font-size:12px;
      font-weight:950;
      color:var(--ink);
    }

    .lineBox{
      height:34px;
      border:2px solid #111827;
      border-radius:12px;
      background:#fff;
    }

    .grid{
      padding:10px 14px 12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px 14px;
    }

    .qCard{
      border:1px solid rgba(229,231,235,.95);
      border-radius:16px;
      padding:8px 10px 10px;
      background:#fff;
      min-height:124px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .qTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      margin-bottom:6px;
    }

    .qNum{
      font-weight:950;
      font-size:13px;
      color:var(--ink);
      flex:0 0 auto;
      padding-top:1px;
      min-width:22px;
    }

    .qMain{
      flex:1;
      min-width:0;
    }

    .qTypeChip{
      display:inline-block;
      margin-bottom:4px;
      padding:2px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:950;
      letter-spacing:.01em;
      background:#f3f4f6;
      color:#374151;
    }

    .chip-simplify{ background:#eef2ff; color:#1d4ed8; }
    .chip-missing{ background:#ecfeff; color:#155e75; }

    .qExpr{
      text-align:center;
      font-weight:900;
      font-size:17px;
      font-family:var(--mathFont);
      line-height:1.16;
      color:#000;
      word-break:break-word;
      min-height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      gap:0;
      padding:0 2px;
    }

    .qExpr.tight{ font-size:15px; }
    .qExpr.tighter{ font-size:13px; }
    .qExpr.mega-tight{ font-size:11px; }

    .exprPart{
      display:inline-flex;
      align-items:baseline;
      justify-content:center;
      white-space:nowrap;
    }

    .term{
      display:inline-flex;
      align-items:baseline;
      justify-content:center;
      white-space:nowrap;
      margin:0 3px;
    }

    .op,
    .eq{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
      margin:0 5px;
    }

    .times{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
      margin:0 4px;
    }

    .coef{
      color:var(--blue);
      font-weight:1000;
    }

    .blank{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:42px;
      height:24px;
      padding:0 8px;
      border-bottom:2px solid #111827;
      transform:translateY(-1px);
      margin:0 2px;
    }

    .prompt{
      margin-top:5px;
      text-align:center;
      font-size:11px;
      font-weight:900;
      color:var(--muted);
      line-height:1.15;
    }

    .answerBlock{
      margin-top:auto;
      display:flex;
      flex-direction:column;
      gap:5px;
      padding-top:8px;
    }

    .ansLabel{
      font-weight:950;
      font-size:12px;
      color:var(--ink);
    }

    .ansBox{
      width:100%;
      min-height:72px;
      border:2px solid #111827;
      border-radius:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:15px;
      font-family:var(--mathFont);
      color:#111827;
      padding:8px 10px;
      text-align:center;
      line-height:1.2;
    }

    .ansBox.key{
      min-height:40px;
      color:var(--green);
      border-color:var(--green);
      background:rgba(22,163,74,.08);
    }

    .keyStep{
      margin-top:6px;
      font-family:var(--mathFont);
      font-weight:900;
      font-size:13px;
      color:#111827;
      line-height:1.2;
      text-align:center;
      padding:5px 6px;
      border-radius:10px;
      background:#f9fafb;
      border:1px solid #e5e7eb;
    }

    .pageFooter{
      padding:8px 16px;
      border-top:1px solid rgba(229,231,235,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:950;
      color:#111827;
      font-size:12px;
      background:rgba(255,255,255,.96);
    }

    .pageFooter a{
      color:#2563eb;
      text-decoration:none;
      font-weight:1000;
    }
    .pageFooter a:hover{ text-decoration:underline; }

    .mmtFooter{
      position:fixed;
      left:0; right:0; bottom:0;
      height:var(--footer-h);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      background:rgba(255,255,255,.92);
      border-top:1px solid rgba(229,231,235,.95);
      backdrop-filter:blur(8px);
      z-index:500;
      font-weight:900;
      color:#111827;
      text-align:center;
      font-size:13px;
    }

    .mmtFooter a{
      color:#2563eb;
      text-decoration:none;
      font-weight:950;
    }
    .mmtFooter a:hover{ text-decoration:underline; }

    @media (max-width:1100px){
      .fieldRow{
        width:100%;
      }
      .togglePanel{
        min-width:240px;
      }
    }

    @media (max-width:900px){
      .pageHeader{
        grid-template-columns:1fr;
        align-items:start;
      }

      .lineField{
        min-width:180px;
      }
    }

    @media print{
      @page{
        size:A4;
        margin:12.7mm;
      }

      html, body{
        background:#fff !important;
      }

      body{
        padding-bottom:0;
        margin:0;
      }

      .wrap{
        max-width:none;
        margin:0;
        padding:0;
      }

      .card{
        box-shadow:none;
        border-radius:0;
        border:none;
        padding:0;
        margin:0;
      }

      .controls,
      .title,
      .subtitle,
      .mmtFooter{
        display:none !important;
      }

      .page{
        margin:0;
        border:none;
        border-radius:0;
        box-shadow:none;
        break-after:page;
        page-break-after:always;
      }

      .page:last-child{
        break-after:auto;
        page-break-after:auto;
      }

      .page.headerPage .pageHeader{
        display:grid;
        padding:4.5mm 5mm 5.5mm;
        gap:12px;
        grid-template-columns:minmax(0,1fr) auto auto;
        align-items:center;
      }

      .page.headerPage .grid{
        padding:5.5mm 5mm 4mm;
        gap:8px 10px;
        grid-template-columns:repeat(2, minmax(0, 1fr));
        grid-auto-rows:1fr;
      }

      .page.headerPage .pageFooter{
        padding:3mm 5mm 4mm;
      }

      .page.headerPage .qCard{
        break-inside:avoid;
        page-break-inside:avoid;
        min-height:116px;
        padding:7px 9px 9px;
      }

      .page.contPage .pageHeader{
        display:none !important;
      }

      .page.contPage .grid{
        padding:7mm 5mm 3mm;
        gap:7px 10px;
        grid-template-columns:repeat(2, minmax(0, 1fr));
        grid-auto-rows:1fr;
      }

      .page.contPage .pageFooter{
        padding:2mm 5mm 3mm;
      }

      .page.contPage .qCard{
        break-inside:avoid;
        page-break-inside:avoid;
        min-height:96px;
        padding:6px 8px 8px;
      }

      .lineField{
        min-width:150px !important;
      }

      .hdrTitle{ font-size:14px; }
      .hdrSub{ font-size:12px; }
      .hdrMeta{ font-size:11px; }

      .qTypeChip{
        font-size:10px;
        padding:2px 7px;
        margin-bottom:3px;
      }

      .qExpr{
        font-size:22px;
        min-height:30px;
        line-height:1.15;
      }

      .qExpr.tight{ font-size:18px; }
      .qExpr.tighter{ font-size:16px; }
      .qExpr.mega-tight{ font-size:14px; }

      .term{ margin:0 2px; }
      .op, .eq{ margin:0 4px; }
      .times{ margin:0 3px; }

      .prompt{
        font-size:10px;
        line-height:1.2;
      }

      .ansBox{
        min-height:62px;
        font-size:13px;
      }

      .ansBox.key{
        min-height:28px;
      }

      .keyStep{
        font-size:11px;
        padding:4px 5px;
        line-height:1.2;
      }

      .lineBox{
        height:30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">Collecting Like Terms worksheet creator</h1>
      <p class="subtitle">Printable A4 worksheets + answer key. First page uses 8 questions, continuation pages use 10.</p>

      <div class="controls">
        <div class="fieldRow">
          <div>
            <label for="levelSel">Level</label>
            <select id="levelSel">
              <option value="sweet">Sweet</option>
              <option value="mild" selected>Mild</option>
              <option value="medium">Medium</option>
              <option value="spicy">Spicy</option>
            </select>
          </div>

          <div>
            <label for="countInp">Number of questions (1–96)</label>
            <input id="countInp" type="number" min="1" max="96" value="18" />
          </div>

          <div>
            <label for="notationSel">Notation</label>
            <select id="notationSel">
              <option value="times" selected>Use multiplication symbol</option>
              <option value="brackets">Use bracket notation</option>
            </select>
          </div>

          <div class="togglePanel">
            <div class="toggleRow">
              <div class="toggleLabel">Missing term</div>
              <label class="switch" aria-label="Missing term toggle">
                <input id="missingToggle" type="checkbox" checked />
                <span class="slider"></span>
              </label>
            </div>

            <div class="toggleRow">
              <div class="toggleLabel">Reveal groups</div>
              <label class="switch" aria-label="Reveal groups toggle">
                <input id="revealGroupsToggle" type="checkbox" />
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="btnRow">
          <button id="genBtn" class="primary">Generate worksheet</button>
          <button id="printBtn" class="ghost">Print (Ctrl+P)</button>
          <button id="resetBtn" class="danger">Reset</button>
        </div>
      </div>

      <div id="out" class="outWrap"></div>
    </div>
  </div>

  <div class="mmtFooter">
    This tool and more can be found at&nbsp;
    <a href="https://www.millsmathstools.au" target="_blank" rel="noopener noreferrer">www.millsmathstools.au</a>
  </div>

<script>
(() => {
  const LEVELS = {
    sweet: {
      name: 'Sweet',
      descriptor: '2–3 terms, totals to 10, simple algebra or numbers',
      totalMin: 2,
      totalMax: 10,
      termOptions: [2,3],
      numericChance: 0.45,
      singleLetterOnly: true,
      revealGroups: true
    },
    mild: {
      name: 'Mild',
      descriptor: '2–3 terms, totals to 10, simple algebra or numbers',
      totalMin: 2,
      totalMax: 10,
      termOptions: [2,3],
      numericChance: 0.50,
      singleLetterOnly: true,
      revealGroups: false
    },
    medium: {
      name: 'Medium',
      descriptor: '3–4 terms, totals to 12, simple algebra or numbers',
      totalMin: 5,
      totalMax: 12,
      termOptions: [3,4],
      numericChance: 0.50,
      singleLetterOnly: false,
      revealGroups: false
    },
    spicy: {
      name: 'Spicy',
      descriptor: '4–5 terms, totals to 20, simple algebra or numbers',
      totalMin: 6,
      totalMax: 20,
      termOptions: [4,5],
      numericChance: 0.50,
      singleLetterOnly: false,
      revealGroups: false
    }
  };

  const QUESTION_WEIGHTS = [
    { type:'simplify', weight:60 },
    { type:'missing', weight:40 }
  ];

  const FIRST_PAGE_COUNT = 8;
  const LATER_PAGE_COUNT = 10;
  const SITE = 'https://www.millsmathstools.au';

  const levelSel = document.getElementById('levelSel');
  const countInp = document.getElementById('countInp');
  const notationSel = document.getElementById('notationSel');
  const missingToggle = document.getElementById('missingToggle');
  const revealGroupsToggle = document.getElementById('revealGroupsToggle');
  const genBtn = document.getElementById('genBtn');
  const printBtn = document.getElementById('printBtn');
  const resetBtn = document.getElementById('resetBtn');
  const out = document.getElementById('out');

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function choice(arr){
    return arr[randInt(0, arr.length - 1)];
  }

  function weightedChoice(items){
    const total = items.reduce((sum, item) => sum + item.weight, 0);
    let roll = Math.random() * total;
    for(const item of items){
      roll -= item.weight;
      if(roll <= 0) return item.type;
    }
    return items[items.length - 1].type;
  }

  function shuffle(arr){
    const copy = [...arr];
    for(let i = copy.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function randomComposition(total, parts, minValue = 1){
    const values = [];
    let remaining = total;
    for(let i = 0; i < parts - 1; i++){
      const minRemaining = (parts - i - 1) * minValue;
      const maxForThis = remaining - minRemaining;
      const value = randInt(minValue, maxForThis);
      values.push(value);
      remaining -= value;
    }
    values.push(remaining);
    return shuffle(values);
  }

  function randomLetterFactor(singleLetterOnly = false){
    const singleLetters = 'abcdefghijkmnpqrstuvwxyz'.split('');
    if(singleLetterOnly) return choice(singleLetters);

    if(Math.random() < 0.2){
      let first = choice(singleLetters);
      let second = choice(singleLetters);
      while(second === first) second = choice(singleLetters);
      return first + second;
    }
    return choice(singleLetters);
  }

  function getNotationMode(){
    return notationSel.value === 'brackets' ? 'brackets' : 'times';
  }

  function getMissingMode(){
    return missingToggle.checked;
  }

  function getRevealGroupsMode(){
    return revealGroupsToggle.checked;
  }

  function makeFactor(cfg){
    const isNumeric = Math.random() < cfg.numericChance;
    return {
      kind: isNumeric ? 'numeric' : 'algebra',
      value: isNumeric ? randInt(3, 10) : randomLetterFactor(cfg.singleLetterOnly)
    };
  }

  function formattedSingleTerm(coef, factor, notationMode){
    if(factor.kind === 'numeric'){
      if(notationMode === 'brackets'){
        if(coef === 1) return String(factor.value);
        return `${coef}(${factor.value})`;
      }
      return `${coef} × ${factor.value}`;
    }

    if(notationMode === 'brackets'){
      return `${coef}${factor.value}`;
    }
    return `${coef} × ${factor.value}`;
  }

  function simplifiedValueText(total, factor, notationMode){
    if(factor.kind === 'numeric'){
      return String(total * factor.value);
    }
    return formattedSingleTerm(total, factor, notationMode);
  }

  function wrapTermHTML(inner){
    return `<span class="term">${inner}</span>`;
  }

  function operatorHTML(symbol, cls){
    return `<span class="${cls}">${escapeHtml(symbol)}</span>`;
  }

  function factorValueHTML(value){
    return `<span>${escapeHtml(String(value))}</span>`;
  }

  function termToHTML(coef, factor, colourGroups, notationMode){
    const coefHtml = colourGroups
      ? `<span class="coef">${coef}</span>`
      : `<span>${coef}</span>`;

    if(factor.kind === 'numeric'){
      if(notationMode === 'brackets'){
        if(coef === 1){
          return wrapTermHTML(factorValueHTML(factor.value));
        }
        return wrapTermHTML(`${coefHtml}<span>(${escapeHtml(String(factor.value))})</span>`);
      }

      return wrapTermHTML(
        `${coefHtml}<span class="times">×</span>${factorValueHTML(factor.value)}`
      );
    }

    if(notationMode === 'brackets'){
      return wrapTermHTML(`${coefHtml}<span>${escapeHtml(factor.value)}</span>`);
    }

    return wrapTermHTML(`${coefHtml}<span class="times">×</span><span>${escapeHtml(factor.value)}</span>`);
  }

  function targetExpressionHTML(question){
    const colourGroups = question.revealGroups === true;
    return termToHTML(question.total, question.factor, colourGroups, question.notationMode);
  }

  function missingToHTML(){
    return `<span class="blank">&nbsp;</span>`;
  }

  function plainTermsExpression(terms, factor, notationMode, hideIndex = -1){
    return terms.map((coef, idx) => {
      const txt = idx === hideIndex ? '___' : formattedSingleTerm(coef, factor, notationMode);
      return `${idx === 0 ? '' : ' + '}${txt}`;
    }).join('');
  }

  function termsExpressionHTML(question, hideIndex = -1){
    const colourGroups = question.revealGroups === true;
    return question.terms.map((coef, idx) => {
      const part = (idx === hideIndex)
        ? `<span class="term">${missingToHTML()}</span>`
        : termToHTML(coef, question.factor, colourGroups, question.notationMode);
      return `${idx === 0 ? '' : operatorHTML('+', 'op')}${part}`;
    }).join('');
  }

  function promptForType(type){
    if(type === 'simplify') return 'Simplify this expression.';
    if(type === 'missing') return 'What term is missing?';
    return '';
  }

  function chipLabel(q){
    if(q.type === 'simplify') return { text:'Simplify', cls:'chip-simplify' };
    if(q.type === 'missing') return { text:'Missing term', cls:'chip-missing' };
    return { text:'Question', cls:'' };
  }

  function expressionLengthScore(q){
    const factorLen = String(q.factor.value).length;
    const base = q.terms.length * (factorLen + 5);

    if(q.notationMode === 'brackets') return base + 2;
    if(q.type === 'missing') return base + 8;
    return base;
  }

  function expressionClass(question){
    const rawLen = expressionLengthScore(question);
    if(rawLen >= 28) return 'qExpr mega-tight';
    if(rawLen >= 20) return 'qExpr tighter';
    if(rawLen >= 14) return 'qExpr tight';
    return 'qExpr';
  }

  function makeSimplifyQuestion(cfg, opts){
    const factor = makeFactor(cfg);
    const total = randInt(cfg.totalMin, cfg.totalMax);
    const termCount = choice(cfg.termOptions);
    const terms = randomComposition(total, termCount, 1);

    return {
      type:'simplify',
      factor,
      total,
      terms,
      notationMode: opts.notationMode,
      revealGroups: opts.revealGroups,
      prompt:promptForType('simplify'),
      answer:simplifiedValueText(total, factor, opts.notationMode),
      keyStep:`${plainTermsExpression(terms, factor, opts.notationMode)} = ${simplifiedValueText(total, factor, opts.notationMode)}`
    };
  }

  function makeMissingQuestion(cfg, opts){
    const factor = makeFactor(cfg);
    const total = randInt(cfg.totalMin, cfg.totalMax);
    const termCount = choice(cfg.termOptions);
    const terms = randomComposition(total, termCount, 1);
    const hideIndex = randInt(0, terms.length - 1);
    const missingCoef = terms[hideIndex];

    return {
      type:'missing',
      factor,
      total,
      terms,
      hideIndex,
      missingCoef,
      notationMode: opts.notationMode,
      revealGroups: opts.revealGroups,
      prompt:promptForType('missing'),
      answer:formattedSingleTerm(missingCoef, factor, opts.notationMode),
      keyStep:`${plainTermsExpression(terms, factor, opts.notationMode)} = ${formattedSingleTerm(total, factor, opts.notationMode)}`
    };
  }

  function buildQuestion(cfg, opts){
    if(opts.allowMissing === false){
      return makeSimplifyQuestion(cfg, opts);
    }

    const type = weightedChoice(QUESTION_WEIGHTS);
    if(type === 'missing') return makeMissingQuestion(cfg, opts);
    return makeSimplifyQuestion(cfg, opts);
  }

  function questionHTML(question){
    if(question.type === 'simplify'){
      return termsExpressionHTML(question);
    }

    return `${termsExpressionHTML(question, question.hideIndex)}${operatorHTML('=', 'eq')}${targetExpressionHTML(question)}`;
  }

  function pageHeaderHTML(levelName, descriptor, pageLabel){
    return `
      <div class="pageHeader">
        <div class="hdrLeft">
          <img src="mmt.png" alt="MMT logo" onerror="this.style.display='none'">
          <div class="hdrText">
            <div class="hdrTitle">Collecting Like Terms Worksheet (${levelName})</div>
            <div class="hdrSub">${pageLabel}</div>
            <div class="hdrMeta">${escapeHtml(descriptor)}</div>
          </div>
        </div>

        <div class="lineField">
          <div class="lineLabel">Name</div>
          <div class="lineBox"></div>
        </div>

        <div class="lineField">
          <div class="lineLabel">Date</div>
          <div class="lineBox"></div>
        </div>
      </div>
    `;
  }

  function pageFooterHTML(){
    return `
      <div class="pageFooter">
        This tool and more can be found at <a href="${SITE}" target="_blank" rel="noopener noreferrer">www.millsmathstools.au</a>
      </div>
    `;
  }

  function makeQuestionCard(question, globalIndex, showAnswer){
    const wrap = document.createElement('div');
    wrap.className = 'qCard';

    const top = document.createElement('div');
    top.className = 'qTop';

    const qNum = document.createElement('div');
    qNum.className = 'qNum';
    qNum.textContent = `${globalIndex}.`;

    const qMain = document.createElement('div');
    qMain.className = 'qMain';

    const chip = chipLabel(question);
    const chipEl = document.createElement('div');
    chipEl.className = `qTypeChip ${chip.cls}`;
    chipEl.textContent = chip.text;

    const expr = document.createElement('div');
    expr.className = expressionClass(question);
    expr.innerHTML = questionHTML(question);

    const prompt = document.createElement('div');
    prompt.className = 'prompt';
    prompt.textContent = question.prompt;

    qMain.appendChild(chipEl);
    qMain.appendChild(expr);
    qMain.appendChild(prompt);

    top.appendChild(qNum);
    top.appendChild(qMain);
    wrap.appendChild(top);

    const answerBlock = document.createElement('div');
    answerBlock.className = 'answerBlock';

    if(!showAnswer){
      answerBlock.innerHTML = `
        <div class="ansLabel">Answer:</div>
        <div class="ansBox"></div>
      `;
    } else {
      answerBlock.innerHTML = `
        <div class="ansLabel">Answer:</div>
        <div class="ansBox key">${escapeHtml(question.answer)}</div>
        <div class="keyStep">${escapeHtml(question.keyStep)}</div>
      `;
    }

    wrap.appendChild(answerBlock);
    return wrap;
  }

  function chunkQuestions(items, firstCount = FIRST_PAGE_COUNT, laterCount = LATER_PAGE_COUNT){
    const pages = [];
    let i = 0;

    if(items.length){
      pages.push(items.slice(i, i + firstCount));
      i += firstCount;
    }

    while(i < items.length){
      pages.push(items.slice(i, i + laterCount));
      i += laterCount;
    }

    return pages;
  }

  function buildPages(questions, cfg, titleLabel, showAnswers){
    const pages = [];
    const chunks = chunkQuestions(questions, FIRST_PAGE_COUNT, LATER_PAGE_COUNT);

    chunks.forEach((slice, p) => {
      const page = document.createElement('div');
      const isFirstPageOfSection = p === 0;
      page.className = `page ${isFirstPageOfSection ? 'headerPage' : 'contPage'}`;

      if(isFirstPageOfSection){
        const pageLabel = `${titleLabel} — Page ${p + 1} of ${chunks.length}`;
        page.innerHTML = pageHeaderHTML(cfg.name, cfg.descriptor, pageLabel);
      }

      const grid = document.createElement('div');
      grid.className = 'grid';

      const startIndex = p === 0
        ? 0
        : FIRST_PAGE_COUNT + ((p - 1) * LATER_PAGE_COUNT);

      slice.forEach((question, idx) => {
        grid.appendChild(makeQuestionCard(question, startIndex + idx + 1, showAnswers));
      });

      page.appendChild(grid);

      const footerWrap = document.createElement('div');
      footerWrap.innerHTML = pageFooterHTML();
      page.appendChild(footerWrap.firstElementChild);

      pages.push(page);
    });

    return pages;
  }

  function clearOut(){
    out.innerHTML = '';
  }

  function generate(){
    clearOut();

    const key = levelSel.value;
    const cfg = LEVELS[key];

    let n = Number(countInp.value);
    if(!Number.isFinite(n)) n = 18;
    n = Math.max(1, Math.min(96, Math.round(n)));
    countInp.value = String(n);

    const opts = {
      notationMode: getNotationMode(),
      allowMissing: getMissingMode(),
      revealGroups: getRevealGroupsMode()
    };

    const questions = Array.from({ length:n }, () => buildQuestion(cfg, opts));

    const wsPages = buildPages(questions, cfg, 'Worksheet', false);
    const keyPages = buildPages(questions, cfg, 'Answer key', true);

    for(const pg of wsPages) out.appendChild(pg);
    for(const pg of keyPages) out.appendChild(pg);

    if(out.firstElementChild){
      out.firstElementChild.scrollIntoView({ behavior:'smooth', block:'start' });
    }
  }

  function resetAll(){
    clearOut();
    levelSel.value = 'mild';
    countInp.value = '18';
    notationSel.value = 'times';
    missingToggle.checked = true;
    revealGroupsToggle.checked = false;
  }

  genBtn.addEventListener('click', generate);
  printBtn.addEventListener('click', () => window.print());
  resetBtn.addEventListener('click', resetAll);

  generate();
})();
</script>
</body>
</html>
