<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Collecting Like Terms — Worksheet Maker</title>

  <style>
  :root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --ink:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --shadow: 0 14px 40px rgba(0,0,0,.10);
  --radius: 18px;

  --blue:#2563eb;
  --ans:#16a34a;

  --purple:#7c3aed;
  --bubbleStroke:#8b5cf6;

  --footer-h: 44px;

  /* Worksheet bubble sizing */
  --wbubbleDia: 136px;
  --wbubbleFont: 16px;

  --mathFont: "Cambria Math", "STIX Two Math", "STIXGeneral", "Times New Roman", serif;
}

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      color: var(--ink);
      padding-bottom: var(--footer-h);
    }

    .wrap{ max-width: 1200px; margin: 18px auto 40px; padding: 0 16px; }
    .card{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .title{
      font-size: 30px;
      font-weight: 1000;
      letter-spacing: .2px;
      margin: 0 0 6px;
    }
    .subtitle{
      margin: 0 0 16px;
      color: var(--muted);
      font-weight: 850;
      font-size: 18px;
    }

    .controls{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      flex-wrap:wrap;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg,#ffffff,#f9fafb);
    }

    .fieldRow{
      display:flex;
      gap: 18px;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    label{
      display:block;
      font-weight: 950;
      color: var(--ink);
      margin: 0 0 8px;
      font-size: 16px;
    }

    select, input[type="number"]{
      border: 2px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px 14px;
      font-weight: 950;
      font-size: 18px;
      background:#fff;
      min-width: 260px;
      outline:none;
    }
    input[type="number"]{ min-width: 220px; }

    .btnCluster{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:flex-end;
    }

    .btnRow{
      display:flex;
      gap: 12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .notationCard{
      border:1px solid #ddd6fe;
      background:#faf5ff;
      color:#4c1d95;
      border-radius:16px;
      padding:10px 14px;
      box-shadow: 0 10px 22px rgba(0,0,0,.06);
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
    }
    .notationLabel{
      font-size:14px;
      line-height:1.1;
      white-space:nowrap;
    }
    .toggleSwitch{
      position:relative;
      width:54px;
      height:30px;
      border-radius:999px;
      border:2px solid #c4b5fd;
      background:#e9ddff;
      cursor:pointer;
      transition:.18s ease;
      flex:0 0 auto;
    }
    .toggleSwitch.on{
      background:#8b5cf6;
      border-color:#7c3aed;
    }
    .toggleKnob{
      position:absolute;
      top:2px;
      left:2px;
      width:22px;
      height:22px;
      border-radius:999px;
      background:#fff;
      box-shadow: 0 4px 10px rgba(0,0,0,.18);
      transition:.18s ease;
    }
    .toggleSwitch.on .toggleKnob{
      left:26px;
    }

    button{
      border:none;
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: 1000;
      cursor:pointer;
      background:#f3f4f6;
      color:#111827;
      transition: transform .04s ease, filter .15s ease, opacity .2s ease;
      user-select:none;
      font-size: 18px;
    }
    button:active{ transform: scale(.98); }
    button.primary{ background:#2563eb; color:#fff; }
    button.ghost{ background:#eef2ff; color:#1d4ed8; }
    button.danger{ background:#fee2e2; color:#991b1b; }

    .outWrap{ margin-top: 16px; }

    /* Pages */
    .page{
      margin-top: 16px;
      background:#fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(15,23,42,.08);
      overflow:hidden;
    }

    .pageHeader{
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(229,231,235,.95);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      flex-wrap:wrap;
    }

    .hdrLeft{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 240px;
    }
    .hdrLeft img{
      width: 34px;
      height: 34px;
      object-fit: contain;
      display:block;
    }
    .hdrTitle{
      font-weight: 1000;
      font-size: 16px;
      line-height: 1.15;
    }
    .hdrSub{
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      margin-top: 2px;
    }

    .nameDate{
      display:flex;
      gap: 14px;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:flex-end;
      margin-left:auto;
    }
    .lineField{
      display:flex;
      flex-direction:column;
      gap: 6px;
      min-width: 180px;
    }
    .lineLabel{
      font-size: 12px;
      font-weight: 950;
      color: var(--muted);
    }
    .lineBox{
      height: 30px;
      border: 2px solid #111827;
      border-radius: 10px;
      background:#fff;
    }

    .grid{
      padding: 14px 16px 16px;
      display:grid;
      gap: 12px 16px;
    }
    .grid.twoCol{
      grid-template-columns: 1fr 1fr;
    }

    .qCard{
      border: 1px solid rgba(229,231,235,.95);
      border-radius: 16px;
      padding: 10px 10px 12px;
      background:#fff;
      break-inside: avoid;
    }

    /* Bubbles */
    .wbubbleWrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap: 12px;
      padding: 4px 4px 8px;
      width:100%;
      flex-wrap:wrap;
    }
    .wbubble{
      width: var(--wbubbleDia);
      height: var(--wbubbleDia);
      border-radius: 999px;
      border: 5px solid var(--bubbleStroke);
      background:#fff;
      box-shadow: 0 10px 26px rgba(0,0,0,.08);
      position:relative;
      overflow:hidden;
      flex: 0 0 auto;
      --dotScale: 1;
    }
  .wdot{
  position:absolute;
  transform: translate(-50%,-50%) scale(var(--dotScale));
  font-weight: 1000;
  font-size: var(--wbubbleFont);
  font-family: var(--mathFont);
  line-height: 1;
  user-select:none;
  white-space:nowrap;
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(255,255,255,.96);
  border: 2px solid rgba(139,92,246,.55);
  box-shadow: 0 6px 14px rgba(0,0,0,.10);
}
    .wdot.pos{ color:#16a34a; }
    .wdot.neg{ color:#dc2626; }

    .prompt{
      text-align:center;
      margin-top: 2px;
    }
    .promptSmall{
      font-weight: 950;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }
 .expr{
  font-weight: 1000;
  font-size: 28px;
  font-family: var(--mathFont);
  letter-spacing: .1px;
  color:#0f172a;
  line-height: 1.04;
}

    .ansRow{
      margin-top: 8px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      flex-wrap:wrap;
    }
    .ansLabel{
      font-weight: 950;
      font-size: 14px;
    }
    .ansBox{
      width: min(520px, 92%);
      height: 32px;
      border: 2px solid #111827;
      border-radius: 12px;
      background:#fff;
    }
  .ansBox.key{
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight: 1000;
  font-size: 16px;
  font-family: var(--mathFont);
  color: var(--ans);
  border-color: var(--ans);
  background: rgba(22,163,74,.08);
}

    .pageFooter{
      padding: 10px 16px;
      border-top: 1px solid rgba(229,231,235,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      font-weight: 950;
      color: #111827;
      font-size: 13px;
      background: rgba(255,255,255,.96);
    }
    .pageFooter a{
      color:#2563eb;
      text-decoration:none;
      font-weight: 1000;
    }
    .pageFooter a:hover{ text-decoration: underline; }

    .mmtFooter{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: var(--footer-h);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 0 12px;
      background: rgba(255,255,255,.92);
      border-top: 1px solid rgba(229,231,235,.95);
      backdrop-filter: blur(8px);
      z-index: 500;
      font-weight: 900;
      color: #111827;
      text-align:center;
      font-size: 13px;
    }
    .mmtFooter a{
      color: #2563eb;
      text-decoration:none;
      font-weight: 950;
    }
    .mmtFooter a:hover{ text-decoration: underline; }

    @media print{
      @page{
        size: A4;
        margin: 10mm;
      }

      :root{
        --wbubbleDia: 112px;
        --wbubbleFont: 14px;
      }

      body{
        background:#fff;
        padding-bottom: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .wrap{ max-width: none; margin: 0; padding: 0; }
      .card{ box-shadow:none; border-radius:0; padding: 0; }
      .controls, .title, .subtitle, .mmtFooter{ display:none !important; }

      .page{
        margin: 0;
        border: none;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
      }
      .page:last-child{ page-break-after: auto; }

      .pageHeader{
        padding: 4mm 4mm 3mm;
      }
      .hdrLeft img{
        width: 24px;
        height: 24px;
      }
      .hdrTitle{
        font-size: 11px;
      }
      .hdrSub{
        font-size: 9px;
      }
      .nameDate{
        gap: 8px;
      }
      .lineField{
        min-width: 110px;
        gap: 3px;
      }
      .lineLabel{
        font-size: 9px;
      }
      .lineBox{
        height: 20px;
        border-width: 1.5px;
        border-radius: 8px;
      }

      .grid{
        padding: 3mm 4mm 4mm;
        gap: 3mm 3mm;
      }

      .qCard{
        padding: 6px 6px 8px;
        border-radius: 12px;
      }

      .wbubbleWrap{
        gap: 8px;
        padding: 0 0 5px;
      }
      .wbubble{
        border-width: 4px;
        box-shadow: none;
      }
      .wdot{
        padding: 4px 7px;
        border-width: 1.5px;
        box-shadow: none;
      }

      .promptSmall{
        font-size: 10px;
        margin-bottom: 2px;
      }
      .expr{
        font-size: 18px;
        line-height: 1.02;
      }

      .ansRow{
        margin-top: 5px;
        gap: 6px;
      }
    .ansLabel{
  font-weight: 950;
  font-size: 14px;
  font-family: var(--mathFont);
}
      .ansBox{
        height: 24px;
        border-width: 1.5px;
        border-radius: 9px;
        width: min(100%, 300px);
      }
      .ansBox.key{
        font-size: 12px;
      }

      .pageFooter{
        padding: 2.5mm 4mm 0;
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">Collecting Like Terms — Worksheet Maker</h1>
      <p class="subtitle">Printable A4 worksheets + completed answer key. Level 1 - circles = 8 per page (2×4). Level 2 - no circles = 16 per page (2×8).</p>

      <div class="controls">
        <div class="fieldRow">
          <div>
            <label for="levelSel">Level</label>
            <select id="levelSel">
              <option value="circles" selected>Level 1 - circles</option>
              <option value="noCircles">Level 2 - no circles</option>
            </select>
          </div>

          <div>
            <label for="countInp">Number of questions (1–64)</label>
            <input id="countInp" type="number" min="1" max="64" value="16" />
          </div>
        </div>

        <div class="btnCluster">
          <div class="btnRow">
            <button id="genBtn" class="primary">Generate worksheet</button>
            <button id="printBtn" class="ghost">Print (Ctrl+P)</button>
            <button id="resetBtn" class="danger">Reset</button>
          </div>

          <div class="notationCard">
            <div class="notationLabel">Use bracket notation</div>
            <button class="toggleSwitch" id="notationToggle" type="button" aria-pressed="false" aria-label="Use bracket notation">
              <span class="toggleKnob"></span>
            </button>
          </div>
        </div>
      </div>

      <div id="out" class="outWrap"></div>
    </div>
  </div>

  <div class="mmtFooter">
    This tool and more can be found at&nbsp;
    <a href="https://www.millsmathstools.au">www.millsmathstools.au</a>
  </div>

<script>
(() => {
  const SITE = "https://www.millsmathstools.au";

  const LEVELS = {
    circles:   { name:"Level 1 - circles",    perPage: 8,  gridClass: "twoCol", showBubbles: true  },
    noCircles: { name:"Level 2 - no circles", perPage: 16, gridClass: "twoCol", showBubbles: false }
  };

  const DEFAULT_COUNTS = {
    circles: 16,
    noCircles: 32
  };

  const TERM_COUNT_WEIGHTS = [
    { n: 3, w: 30 },
    { n: 4, w: 40 },
    { n: 5, w: 20 },
    { n: 6, w: 10 },
  ];

  const DOTS = {
    1: [[50,50]],
    2: [[30,35],[70,65]],
    3: [[30,35],[50,50],[70,65]],
    4: [[30,30],[70,30],[30,70],[70,70]],
    5: [[30,30],[70,30],[50,50],[30,70],[70,70]],
    6: [[30,25],[70,25],[30,50],[70,50],[30,75],[70,75]],
    7: [[30,25],[70,25],[30,50],[70,50],[30,75],[70,75],[50,50]],
    8: [[30,25],[70,25],[30,50],[70,50],[30,75],[70,75],[50,37],[50,63]],
    9: [[30,25],[50,25],[70,25],[30,50],[50,50],[70,50],[30,75],[50,75],[70,75]]
  };
  function positionsForCount(n){
    const k = Math.max(1, Math.min(9, n));
    return DOTS[k];
  }

  const levelSel = document.getElementById("levelSel");
  const countInp = document.getElementById("countInp");
  const genBtn = document.getElementById("genBtn");
  const printBtn = document.getElementById("printBtn");
  const resetBtn = document.getElementById("resetBtn");
  const notationToggle = document.getElementById("notationToggle");
  const out = document.getElementById("out");

  let useBracketNotation = false;

  function syncNotationToggle(){
    notationToggle.classList.toggle('on', useBracketNotation);
    notationToggle.setAttribute('aria-pressed', useBracketNotation ? 'true' : 'false');
  }

  function shouldUseBracketNotation(unit){
    if(!useBracketNotation) return false;
    const u = String(unit || '').toLowerCase();
    return /^\d+$/.test(u) || /^\d+[a-z]+$/.test(u);
  }

  function buildGroupedBody(groups, unit){
    const u = String(unit).toLowerCase();
    const g = String(groups);

    if(/^[a-z]+$/.test(u)){
      return g + u;
    }

    if(shouldUseBracketNotation(u)){
      return g + '(' + u + ')';
    }

    return g + '×' + u;
  }

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function randPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function chance(p){ return Math.random() < p; }

  function weightedPick(pairs){
    const total = pairs.reduce((s,x)=>s+x.w,0);
    let r = Math.random() * total;
    for(const p of pairs){
      r -= p.w;
      if(r <= 0) return p.n;
    }
    return pairs[pairs.length-1].n;
  }

  function normalizeUnitLetters(u){
    return u.replace(/[^a-z]/g,'').split('').sort().join('');
  }

  function unitKey(unit){
    const u = String(unit||'').toLowerCase();
    if(!u) return '__const__';
    const m = u.match(/^(\d+)([a-z]+)$/);
    if(m){
      const num = m[1];
      const letters = normalizeUnitLetters(m[2]);
      return num + letters;
    }
    if(/^\d+$/.test(u)) return u;
    if(/^[a-z]+$/.test(u)) return normalizeUnitLetters(u);
    return u.replace(/[^0-9a-z]/g,'');
  }

  function buildExpressionDisplay(terms){
    const parts = [];
    for(let i=0;i<terms.length;i++){
      const t = terms[i];
      const sign = (i===0 ? '' : (t.op==='-' ? ' − ' : ' + '));
      const g = t.groups;
      const u = String(t.unit);

      let body = '';
      if(g === 1){
        body = u.toLowerCase();
      } else {
        body = buildGroupedBody(g, u);
      }
      parts.push(sign + body);
    }
    return parts.join('');
  }

  function collectedMapFromTerms(terms){
    const map = new Map();
    const order = [];
    for(let i=0;i<terms.length;i++){
      const t = terms[i];
      const sgn = (i===0 ? +1 : (t.op==='-' ? -1 : +1));
      const key = unitKey(t.unit);
      const coeff = sgn * t.groups;

      if(!map.has(key)){
        map.set(key, coeff);
        order.push(key);
      } else {
        map.set(key, map.get(key) + coeff);
      }
    }
    return { map, order };
  }

  function evaluateNumericAndCoeffAlgebra(map, order){
    let constSum = 0;
    const newMap = new Map();
    const newOrder = [];
    const seen = new Set();

    for(const k of order){
      const c = map.get(k);
      if(!c) continue;

      if(/^\d+$/.test(k)){
        constSum += c * parseInt(k,10);
        continue;
      }

      const m = k.match(/^(\d+)([a-z]+)$/);
      if(m){
        const n = parseInt(m[1],10);
        const letters = normalizeUnitLetters(m[2]);
        const merged = c * n;
        const key2 = letters || '__const__';
        if(key2 === '__const__'){
          constSum += merged;
        } else {
          if(!seen.has(key2)){
            seen.add(key2);
            newOrder.push(key2);
            newMap.set(key2, merged);
          } else {
            newMap.set(key2, newMap.get(key2) + merged);
          }
        }
        continue;
      }

      const key2 = k;
      if(!seen.has(key2)){
        seen.add(key2);
        newOrder.push(key2);
        newMap.set(key2, c);
      } else {
        newMap.set(key2, newMap.get(key2) + c);
      }
    }
    return { constSum, newMap, newOrder };
  }

  function buildFinalMap(terms){
    const { map, order } = collectedMapFromTerms(terms);
    const { constSum, newMap, newOrder } = evaluateNumericAndCoeffAlgebra(map, order);

    const out = new Map();

    if(constSum !== 0){
      out.set('__const__', constSum);
    }

    for(const k of newOrder){
      const c = newMap.get(k);
      if(!c) continue;
      out.set(k, c);
    }

    if(out.size === 0){
      out.set('__const__', 0);
    }
    return { map: out };
  }

  function mapToCanonicalString(map){
    const entries = [...map.entries()].filter(([k,v]) => v !== 0);
    if(entries.length === 0) return '0';

    entries.sort((a,b)=>{
      const ak=a[0], bk=b[0];
      const aConst = (ak==='__const__');
      const bConst = (bk==='__const__');
      if(aConst && !bConst) return 1;
      if(!aConst && bConst) return -1;
      return ak.localeCompare(bk);
    });

    const parts = [];
    for(const [k,c] of entries){
      if(k === '__const__'){
        parts.push({unit:'', coeff:c});
      } else {
        parts.push({unit:k, coeff:c});
      }
    }

    let s = '';
    for(let i=0;i<parts.length;i++){
      const {unit, coeff} = parts[i];
      const neg = coeff < 0;
      const abs = Math.abs(coeff);

      let body = '';
      if(unit === ''){
        body = String(abs);
      } else {
        body = (abs === 1) ? unit : String(abs) + unit;
      }

      if(i === 0){
        s += (neg ? '− ' : '') + body;
      } else {
        s += (neg ? ' − ' : ' + ') + body;
      }
    }
    return s;
  }

  function coeffSumMustBeLE12(level){
    return level === 'circles';
  }
  function finalMustBeLE3Terms(level){
    return level === 'noCircles';
  }
  function chooseTermCount(level){
    if(level === 'circles') return 2;
    if(level === 'noCircles') return weightedPick(TERM_COUNT_WEIGHTS);
    return 2;
  }

  function randomUnitSingle(){
    const letters = ['x','a','b','c','m','n','p','y','k'];
    const digits = ['2','3','4','5','6','7','8','9'];
    return randPick(letters.concat(digits));
  }

  function randomUnitDouble(allowTwoDigitNumberAsPureNumber){
    const letters = ['x','a','b','c','m','n','p','y','k','f','h','ab','xy','nc','uv','pq','cd','dc'];
    const digit = randInt(2,9);

    const modes = [
      {k:'letters', w: 55},
      {k:'digitLetters', w: 35},
      {k:'number', w: 10},
    ];
    const pick = (()=>{
      const tot = modes.reduce((s,x)=>s+x.w,0);
      let r = Math.random()*tot;
      for(const m of modes){ r -= m.w; if(r<=0) return m.k; }
      return 'letters';
    })();

    if(pick === 'letters') return randPick(letters);
    if(pick === 'digitLetters'){
      const L = randPick(letters.filter(x=>/^[a-z]+$/i.test(x)));
      return String(digit) + L;
    }
    if(allowTwoDigitNumberAsPureNumber && chance(0.35)){
      return String(randInt(12, 99));
    }
    return String(randInt(2,9));
  }

  function buildRandomTerms(level){
    const termCount = chooseTermCount(level);
    const terms = [];
    const useDouble = (level === 'noCircles');

    let baseUnits = [];
    if(level === 'circles'){
      const u = randomUnitSingle();
      baseUnits = [u];
    } else {
      const numUnits = chance(0.80) ? 2 : 3;
      const used = new Set();
      while(baseUnits.length < numUnits){
        const u = useDouble ? randomUnitDouble(false) : randomUnitSingle();
        const key = unitKey(u);
        if(!used.has(key)){
          used.add(key);
          baseUnits.push(u);
        }
      }
    }

    for(let i=0;i<termCount;i++){
      const unit = (level === 'circles') ? baseUnits[0] : randPick(baseUnits);
      const groups = randInt(1,9);
      const op = (i === 0) ? '+' : (chance(0.35) ? '-' : '+');
      terms.push({ op, groups, unit });
    }

    terms[0].op = '+';
    return terms;
  }

  function enforceCoeffSumLE12(terms){
    const { map, order } = collectedMapFromTerms(terms);
    for(const k of order){
      const c = map.get(k) || 0;
      if(!c) continue;

      const isNum = /^\d+$/.test(k);
      const isDigitLetters = /^\d+[a-z]+$/.test(k);
      if(isNum || isDigitLetters){
        if(Math.abs(c) > 12) return false;
      }
    }
    return true;
  }

  function enforceFinalLE3Terms(terms){
    const { map } = buildFinalMap(terms);
    const entries = [...map.entries()].filter(([k,v]) => v !== 0);
    if(entries.length === 1 && entries[0][0] === '__const__' && entries[0][1] === 0) return true;
    return entries.length <= 3;
  }

  function ensureHasCollectablePair(terms){
    const keys = terms.map(t => unitKey(t.unit));
    const seen = new Set();
    for(const k of keys){
      if(seen.has(k)) return true;
      seen.add(k);
    }
    return false;
  }

  function generateQuestion(level){
    for(let tries=0; tries<600; tries++){
      const terms = buildRandomTerms(level);

      if(level !== 'circles' && !ensureHasCollectablePair(terms)) continue;

      if(coeffSumMustBeLE12(level)){
        if(!enforceCoeffSumLE12(terms)) continue;
      }

      if(finalMustBeLE3Terms(level)){
        if(!enforceFinalLE3Terms(terms)) continue;
      }

      const target = buildFinalMap(terms);
      return {
        terms,
        exprDisplay: buildExpressionDisplay(terms),
        answer: mapToCanonicalString(target.map)
      };
    }

    const fallbackTerms = [
      {op:'+', groups: 5, unit:'x'},
      {op:'+', groups: 3, unit:'x'},
      {op:'-', groups: 2, unit:'x'},
    ];
    const t = buildFinalMap(fallbackTerms);
    return {
      terms: fallbackTerms,
      exprDisplay: buildExpressionDisplay(fallbackTerms),
      answer: mapToCanonicalString(t.map)
    };
  }

  function pageHeaderHTML(levelName, pageLabel){
    return `
      <div class="pageHeader">
        <div class="hdrLeft">
          <img src="mmt.png" alt="MMT logo" />
          <div>
            <div class="hdrTitle">Collecting Like Terms — Worksheet (${levelName})</div>
            <div class="hdrSub">${pageLabel}</div>
          </div>
        </div>

        <div class="nameDate">
          <div class="lineField">
            <div class="lineLabel">Name</div>
            <div class="lineBox"></div>
          </div>
          <div class="lineField">
            <div class="lineLabel">Date</div>
            <div class="lineBox"></div>
          </div>
        </div>
      </div>
    `;
  }

  function pageFooterHTML(){
    return `
      <div class="pageFooter">
        This tool and more can be found at <a href="${SITE}">www.millsmathstools.au</a>
      </div>
    `;
  }

  function buildBubble(termsItem){
    const bubble = document.createElement("div");
    bubble.className = "wbubble";
    bubble.style.setProperty('--dotScale', (termsItem.groups >= 8 ? '0.92' : '1'));

    const signNeg = (termsItem.op === '-');
    const cls = signNeg ? 'neg' : 'pos';
    const token = String(termsItem.unit).toLowerCase();
    const shownToken = signNeg ? ('-' + token) : token;

    const pos = positionsForCount(termsItem.groups);
    for(const [x,y] of pos){
      const d = document.createElement("div");
      d.className = "wdot " + cls;
      d.style.left = x + "%";
      d.style.top = y + "%";
      d.textContent = shownToken;
      bubble.appendChild(d);
    }
    return bubble;
  }

  function makeQuestionCard(q, levelKey, showAnswer){
    const cfg = LEVELS[levelKey];
    const wrap = document.createElement("div");
    wrap.className = "qCard";

    if(cfg.showBubbles){
      const bw = document.createElement("div");
      bw.className = "wbubbleWrap";
      for(const t of q.terms){
        bw.appendChild(buildBubble(t));
      }
      wrap.appendChild(bw);
    }

    const prompt = document.createElement("div");
    prompt.className = "prompt";
    prompt.innerHTML = `
      <div class="promptSmall">Simplify:</div>
      <div class="expr">${q.exprDisplay}</div>
    `;
    wrap.appendChild(prompt);

    const ansRow = document.createElement("div");
    ansRow.className = "ansRow";
    ansRow.innerHTML = `
      <div class="ansLabel">Answer =</div>
      <div class="ansBox ${showAnswer ? "key" : ""}">${showAnswer ? q.answer : ""}</div>
    `;
    wrap.appendChild(ansRow);

    return wrap;
  }

  function buildPages(questions, levelKey, titleLabel, showAnswers){
    const cfg = LEVELS[levelKey];
    const perPage = cfg.perPage;
    const totalPages = Math.ceil(questions.length / perPage);
    const pages = [];

    for(let p=0; p<totalPages; p++){
      const page = document.createElement("div");
      page.className = "page";

      const pageLabel = `${titleLabel} — Page ${p+1} of ${totalPages}`;
      page.innerHTML = pageHeaderHTML(cfg.name, pageLabel);

      const grid = document.createElement("div");
      grid.className = "grid " + cfg.gridClass;

      const start = p * perPage;
      const slice = questions.slice(start, start + perPage);
      for(const q of slice){
        grid.appendChild(makeQuestionCard(q, levelKey, showAnswers));
      }

      page.appendChild(grid);

      const footer = document.createElement("div");
      footer.innerHTML = pageFooterHTML();
      page.appendChild(footer.firstElementChild);

      pages.push(page);
    }

    return pages;
  }

  function clearOut(){ out.innerHTML = ""; }

  function updateDefaultCountForLevel(){
    countInp.value = String(DEFAULT_COUNTS[levelSel.value] || 16);
  }

  function generate(){
    clearOut();

    const levelKey = levelSel.value;
    let n = Number(countInp.value);
    if(!Number.isFinite(n)) n = DEFAULT_COUNTS[levelKey] || 16;
    n = Math.max(1, Math.min(64, Math.round(n)));
    countInp.value = String(n);

    const questions = Array.from({length:n}, () => generateQuestion(levelKey));

    const wsPages = buildPages(questions, levelKey, "Worksheet", false);
    const keyPages = buildPages(questions, levelKey, "Answer key", true);

    for(const pg of wsPages) out.appendChild(pg);
    for(const pg of keyPages) out.appendChild(pg);

    if(out.firstElementChild) out.firstElementChild.scrollIntoView({ behavior:"smooth", block:"start" });
  }

  function resetAll(){
    clearOut();
    levelSel.value = "circles";
    updateDefaultCountForLevel();
  }

  notationToggle.addEventListener('click', () => {
    useBracketNotation = !useBracketNotation;
    try{
      localStorage.setItem('mmt_collect_like_terms_ws_brackets', useBracketNotation ? '1' : '0');
    }catch(_){}
    syncNotationToggle();
  });

  levelSel.addEventListener("change", updateDefaultCountForLevel);
  genBtn.addEventListener("click", generate);
  printBtn.addEventListener("click", () => window.print());
  resetBtn.addEventListener("click", resetAll);

  try{
    const saved = localStorage.getItem('mmt_collect_like_terms_ws_brackets');
    if(saved === '1') useBracketNotation = true;
  }catch(_){}

  syncNotationToggle();
  updateDefaultCountForLevel();
})();
</script>
</body>
</html>
