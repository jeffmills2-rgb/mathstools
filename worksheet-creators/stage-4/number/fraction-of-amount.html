<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculating Fractions of Amounts — Worksheet Generator</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow:0 14px 40px rgba(0,0,0,.10);
      --radius:18px;

      --blue:#2563eb;
      --green:#16a34a;
      --red:#dc2626;

      --medium1:#facc15; --medium2:#d97706;
      --spicy1:#fb923c; --spicy2:#ea580c;

      --footer-h:44px;
      --mathFont:"Cambria Math","STIX Two Math","STIXGeneral","Times New Roman",serif;
      --uiFont:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--uiFont);
      padding-bottom:var(--footer-h);
    }

    .wrap{
      max-width:1280px;
      margin:14px auto 32px;
      padding:0 14px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    .title{
      margin:0 0 4px;
      font-size:28px;
      font-weight:1000;
      letter-spacing:.2px;
    }

    .subtitle{
      margin:0 0 14px;
      color:var(--muted);
      font-weight:850;
      font-size:15px;
      line-height:1.35;
    }

    .controls{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      padding:12px;
      border:1px solid var(--border);
      border-radius:18px;
      background:linear-gradient(180deg,#ffffff,#f9fafb);
    }

    .fieldRow{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    label{
      display:block;
      margin:0 0 7px;
      font-size:15px;
      font-weight:950;
    }

    select, input[type="number"]{
      border:2px solid #e5e7eb;
      border-radius:14px;
      padding:12px 13px;
      font-weight:950;
      font-size:17px;
      background:#fff;
      min-width:220px;
      outline:none;
    }

    input[type="number"]{ min-width:180px; }

    .btnRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:1000;
      cursor:pointer;
      background:#f3f4f6;
      color:#111827;
      transition:transform .04s ease, filter .15s ease, opacity .2s ease;
      user-select:none;
      font-size:16px;
    }
    button:active{ transform:scale(.98); }
    button.primary{ background:#2563eb; color:#fff; }
    button.ghost{ background:#eef2ff; color:#1d4ed8; }
    button.danger{ background:#fee2e2; color:#991b1b; }

    .outWrap{ margin-top:14px; }

    .page{
      margin-top:14px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 10px 26px rgba(15,23,42,.08);
      overflow:hidden;
    }

    .pageHeader{
      padding:10px 14px 8px;
      border-bottom:1px solid rgba(229,231,235,.95);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .hdrTitle{
      font-weight:1000;
      font-size:15px;
      line-height:1.12;
    }

    .hdrSub{
      color:var(--muted);
      font-weight:850;
      font-size:12px;
      margin-top:2px;
    }

    .nameDate{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:flex-end;
      margin-left:auto;
    }

    .lineField{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:126px;
    }

    .lineLabel{
      font-size:11px;
      font-weight:950;
      color:var(--muted);
    }

    .lineBox{
      height:22px;
      border:1.8px solid #111827;
      border-radius:9px;
      background:#fff;
    }

    .grid{
      padding:16px 16px 18px;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      grid-template-rows:repeat(6, minmax(0, 1fr));
      gap:12px 14px;
      min-height:1120px;
      align-content:stretch;
    }

    .qCard{
      border:1px solid rgba(229,231,235,.95);
      border-radius:14px;
      padding:12px 12px 10px;
      background:#fff;
      break-inside:avoid;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:0;
      height:100%;
      position:relative;
      overflow:hidden;
    }

    .qBadge{
      position:absolute;
      top:8px;
      right:8px;
      min-width:28px;
      height:28px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:1000;
      color:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
    }

    .qBadge.medium{
      background:linear-gradient(180deg,var(--medium1),var(--medium2));
    }

    .qBadge.spicy{
      background:linear-gradient(180deg,var(--spicy1),var(--spicy2));
    }

    .prompt{
      text-align:center;
      margin:2px 0 0;
      padding:0 8px;
    }

    .promptSmall{
      font-weight:900;
      font-size:10px;
      color:var(--muted);
      margin-bottom:6px;
      line-height:1.15;
      min-height:12px;
      letter-spacing:.15px;
    }

    .questionLine{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-family:var(--mathFont);
      font-weight:1000;
      color:#0f172a;
      line-height:1.15;
      text-align:center;
      font-size:29px;
      min-height:78px;
    }

    .questionLine .ofWord{
      font-family:var(--uiFont);
      font-weight:900;
      font-size:.72em;
      color:#374151;
      margin:0 2px;
    }

    .questionLine .eq{
      color:#111827;
    }

    .fraction{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1;
      vertical-align:middle;
      min-width:24px;
      transform:translateY(1px);
    }

    .fraction .top,
    .fraction .bottom{
      display:block;
      text-align:center;
      line-height:1;
    }

    .fraction .bar{
      width:100%;
      min-width:18px;
      height:2.8px;
      background:#111;
      border-radius:999px;
      margin:2px 0;
    }

    .ansRow{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .ansLabel{
      font-weight:950;
      font-size:15px;
      font-family:var(--mathFont);
      line-height:1;
    }

    .ansBox{
      width:110px;
      height:30px;
      border:1.8px solid #111827;
      border-radius:999px;
      background:#fff;
    }

    .ansBox.key{
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:16px;
      font-family:var(--mathFont);
      color:var(--green);
      border-color:var(--green);
      background:rgba(22,163,74,.08);
      padding:0 8px;
    }

    .pageFooter{
      padding:7px 14px;
      border-top:1px solid rgba(229,231,235,.95);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:950;
      color:#111827;
      font-size:12px;
      background:rgba(255,255,255,.96);
    }

    .pageFooter a{
      color:#2563eb;
      text-decoration:none;
      font-weight:1000;
    }
    .pageFooter a:hover{ text-decoration:underline; }

    .mmtFooter{
      position:fixed;
      left:0; right:0; bottom:0;
      height:var(--footer-h);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 12px;
      background:rgba(255,255,255,.92);
      border-top:1px solid rgba(229,231,235,.95);
      backdrop-filter:blur(8px);
      z-index:500;
      font-weight:900;
      color:#111827;
      text-align:center;
      font-size:13px;
    }

    .mmtFooter a{
      color:#2563eb;
      text-decoration:none;
      font-weight:950;
    }
    .mmtFooter a:hover{ text-decoration:underline; }

    @media print{
      @page{
        size:A4;
        margin:7mm;
      }

      html, body{
        width:210mm;
        height:auto;
      }

      body{
        background:#fff;
        padding-bottom:0;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;
      }

      .wrap{
        max-width:none;
        margin:0;
        padding:0;
      }

      .card{
        box-shadow:none;
        border-radius:0;
        padding:0;
      }

      .controls, .title, .subtitle, .mmtFooter{
        display:none !important;
      }

      .page{
        margin:0;
        border:none;
        border-radius:0;
        box-shadow:none;
        page-break-after:always;
      }
      .page:last-child{ page-break-after:auto; }

      .pageHeader{
        padding:2.4mm 3.2mm 2mm;
      }

      .hdrTitle{ font-size:10px; }
      .hdrSub{ font-size:8.4px; }

      .nameDate{ gap:6px; }
      .lineField{ min-width:86px; gap:2px; }
      .lineLabel{ font-size:8px; }
      .lineBox{
        height:15px;
        border-width:1.2px;
        border-radius:7px;
      }

      .grid{
        padding:3.6mm 3.2mm 3.2mm;
        gap:2.2mm 2.5mm;
        min-height:221mm;
      }

      .qCard{
        padding:3.2mm 2.2mm 2.4mm;
        border-radius:10px;
        border-color:#d5dae1;
      }

      .qBadge{
        top:2mm;
        right:2mm;
        min-width:6.2mm;
        height:6.2mm;
        font-size:8px;
      }

      .prompt{
        padding:0 2mm;
      }

      .promptSmall{
        font-size:7px;
        min-height:3mm;
        margin-bottom:1.2mm;
      }

      .questionLine{
        font-size:17px;
        min-height:22mm;
        gap:4px;
      }

      .questionLine .ofWord{
        margin:0 1px;
      }

      .fraction{
        min-width:14px;
      }

      .fraction .bar{
        min-width:12px;
        height:2px;
        margin:1px 0;
      }

      .ansRow{
        margin-top:2.4mm;
        gap:3px;
      }

      .ansLabel{
        font-size:9px;
      }

      .ansBox{
        width:18mm;
        height:4.8mm;
        border-width:1.2px;
      }

      .ansBox.key{
        font-size:10px;
      }

      .pageFooter{
        padding:1.8mm 3.2mm 1.3mm;
        font-size:7.8px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">Calculating Fractions of Amounts — Worksheet Generator</h1>
      <p class="subtitle">Printable A4 worksheets in a clean no-model layout. Medium uses the 1–12 times-table range. Spicy extends into the 13–20 range for harder integer-only questions.</p>

      <div class="controls">
        <div class="fieldRow">
          <div>
            <label for="levelSel">Level</label>
            <select id="levelSel">
              <option value="medium">Medium</option>
              <option value="spicy">Spicy</option>
            </select>
          </div>

          <div>
            <label for="countInp">Number of questions (1–72)</label>
            <input id="countInp" type="number" min="1" max="72" value="18" />
          </div>
        </div>

        <div class="btnRow">
          <button id="genBtn" class="primary">Generate worksheet</button>
          <button id="printBtn" class="ghost">Print (Ctrl+P)</button>
          <button id="resetBtn" class="danger">Reset</button>
        </div>
      </div>

      <div id="out" class="outWrap"></div>
    </div>
  </div>

  <div class="mmtFooter">
    This tool and more can be found at&nbsp;
    <a href="https://www.millsmathstools.au">www.millsmathstools.au</a>
  </div>

<script>
(() => {
  const SITE = "https://www.millsmathstools.au";
  const PER_PAGE = 18;

  const LEVELS = {
    medium:{ name:"Medium", minFactor:1, maxFactor:12, badge:"medium" },
    spicy:{ name:"Spicy", minFactor:13, maxFactor:20, badge:"spicy" }
  };

  const DEFAULT_COUNTS = { medium:18, spicy:18 };

  const levelSel = document.getElementById("levelSel");
  const countInp = document.getElementById("countInp");
  const genBtn = document.getElementById("genBtn");
  const printBtn = document.getElementById("printBtn");
  const resetBtn = document.getElementById("resetBtn");
  const out = document.getElementById("out");

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function choice(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function fractionHTML(num, den){
    return `
      <span class="fraction">
        <span class="top">${num}</span>
        <span class="bar"></span>
        <span class="bottom">${den}</span>
      </span>
    `;
  }

  function buildQuestion(levelKey){
    const cfg = LEVELS[levelKey];
    for(let tries = 0; tries < 4000; tries++){
      const denominator = randInt(2, cfg.maxFactor);
      const numerator = randInt(1, denominator - 1);
      const rowFactor = randInt(cfg.minFactor, cfg.maxFactor);
      const amount = denominator * rowFactor;
      const answer = numerator * rowFactor;

      if(denominator === 1) continue;
      if(numerator >= denominator) continue;

      return {
        numerator,
        denominator,
        amount,
        answer
      };
    }
    return { numerator:1, denominator:2, amount:10, answer:5 };
  }

  function buildQuestions(levelKey, count){
    return Array.from({length:count}, () => buildQuestion(levelKey));
  }

  function pageHeaderHTML(levelName, pageLabel, showNameDate){
    return `
      <div class="pageHeader">
        <div>
          <div class="hdrTitle">Calculating Fractions of Amounts — Worksheet (${levelName})</div>
          <div class="hdrSub">${pageLabel}</div>
        </div>

        ${showNameDate ? `
        <div class="nameDate">
          <div class="lineField">
            <div class="lineLabel">Name</div>
            <div class="lineBox"></div>
          </div>
          <div class="lineField">
            <div class="lineLabel">Date</div>
            <div class="lineBox"></div>
          </div>
        </div>` : ``}
      </div>
    `;
  }

  function pageFooterHTML(){
    return `
      <div class="pageFooter">
        This tool and more can be found at <a href="${SITE}">www.millsmathstools.au</a>
      </div>
    `;
  }

  function makeQuestionCard(q, levelKey, qNumber, showAnswer){
    const card = document.createElement("div");
    card.className = "qCard";

    const badge = document.createElement("div");
    badge.className = `qBadge ${LEVELS[levelKey].badge}`;
    badge.textContent = qNumber;
    card.appendChild(badge);

    const prompt = document.createElement("div");
    prompt.className = "prompt";
    prompt.innerHTML = `
      <div class="promptSmall">Calculate the fraction of the amount.</div>
      <div class="questionLine">
        ${fractionHTML(q.numerator, q.denominator)}
        <span class="ofWord">of</span>
        <span>${q.amount}</span>
        <span class="eq">=</span>
      </div>
    `;
    card.appendChild(prompt);

    const ansRow = document.createElement("div");
    ansRow.className = "ansRow";
    ansRow.innerHTML = `
      <div class="ansLabel">Answer:</div>
      <div class="ansBox ${showAnswer ? "key" : ""}">${showAnswer ? q.answer : ""}</div>
    `;
    card.appendChild(ansRow);

    return card;
  }

  function buildPages(questions, levelKey, titleLabel, showAnswers){
    const cfg = LEVELS[levelKey];
    const totalPages = Math.ceil(questions.length / PER_PAGE);
    const pages = [];

    for(let p = 0; p < totalPages; p++){
      const page = document.createElement("div");
      page.className = "page";
      const pageLabel = `${titleLabel} — Page ${p + 1} of ${totalPages}`;
      page.innerHTML = pageHeaderHTML(cfg.name, pageLabel, !showAnswers);

      const grid = document.createElement("div");
      grid.className = "grid";

      const start = p * PER_PAGE;
      const slice = questions.slice(start, start + PER_PAGE);

      slice.forEach((q, i) => {
        grid.appendChild(makeQuestionCard(q, levelKey, start + i + 1, showAnswers));
      });

      page.appendChild(grid);

      const footerWrap = document.createElement("div");
      footerWrap.innerHTML = pageFooterHTML();
      page.appendChild(footerWrap.firstElementChild);

      pages.push(page);
    }

    return pages;
  }

  function clearOut(){
    out.innerHTML = "";
  }

  function updateDefaultCountForLevel(){
    countInp.value = String(DEFAULT_COUNTS[levelSel.value] || 18);
  }

  function generate(){
    clearOut();

    const levelKey = levelSel.value;
    let n = Number(countInp.value);
    if(!Number.isFinite(n)) n = DEFAULT_COUNTS[levelKey] || 18;
    n = Math.max(1, Math.min(72, Math.round(n)));
    countInp.value = String(n);

    const questions = buildQuestions(levelKey, n);
    const wsPages = buildPages(questions, levelKey, "Worksheet", false);
    const keyPages = buildPages(questions, levelKey, "Answer key", true);

    wsPages.forEach(pg => out.appendChild(pg));
    keyPages.forEach(pg => out.appendChild(pg));

    if(out.firstElementChild){
      out.firstElementChild.scrollIntoView({ behavior:"smooth", block:"start" });
    }
  }

  function resetAll(){
    clearOut();
    levelSel.value = "medium";
    updateDefaultCountForLevel();
  }

  levelSel.addEventListener("change", updateDefaultCountForLevel);
  genBtn.addEventListener("click", generate);
  printBtn.addEventListener("click", () => window.print());
  resetBtn.addEventListener("click", resetAll);

  updateDefaultCountForLevel();
})();
</script>
</body>
</html>
