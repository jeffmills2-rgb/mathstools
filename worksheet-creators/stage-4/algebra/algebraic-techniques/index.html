<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MMT Worksheet Generator — Algebraic Techniques</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --ink:#111827; --muted:#6b7280; --border:#e5e7eb;
      --shadow:0 14px 40px rgba(0,0,0,.10); --radius:18px; --ok:#16a34a; --footer-h:44px; --pagePad:12mm;
      --mathFont:"Cambria Math","STIX Two Math","STIXGeneral","Times New Roman",serif;
      --uiFont:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--uiFont);background:var(--bg);color:var(--ink);padding-bottom:var(--footer-h)}
    .wrap{max-width:1120px;margin:18px auto 40px;padding:0 16px}
    .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .controls{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:14px;border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg,#fff,#f9fafb)}
    .topSelectors{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;width:100%}
    .outcomeControl{flex:1 1 360px;min-width:300px}.languageControl{flex:0 1 300px;min-width:240px;display:flex;flex-direction:column;align-items:flex-end}
    label{display:block;font-weight:950;color:var(--ink);margin:0 0 8px;font-size:13px}
    select,input[type="number"]{border:2px solid #e5e7eb;border-radius:14px;padding:12px;font-weight:950;font-size:16px;background:#fff;min-width:240px;outline:none}
    select:focus,input[type="number"]:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.14)}
    .outcomeControl select,.languageControl select{width:100%}.languageControl label{text-align:right}
    .checks{display:flex;gap:12px 14px;flex-wrap:wrap;align-items:center;padding:10px 0 0;width:100%}
    .checksHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;width:100%;margin-bottom:2px}
    .checksTitle{margin:0;font-size:13px;font-weight:950;color:var(--muted)}
    .miniBtn{border:none;border-radius:999px;padding:8px 12px;font-weight:950;cursor:pointer;background:#eef2ff;color:#1d4ed8;font-size:12px;line-height:1;box-shadow:0 8px 18px rgba(0,0,0,.04)}
    .chk{display:flex;gap:10px;align-items:center;border:1px solid rgba(229,231,235,.95);background:#fff;border-radius:999px;padding:10px 12px;box-shadow:0 8px 18px rgba(0,0,0,.04);user-select:none}
    .chk input{width:18px;height:18px;accent-color:#2563eb}.chk span{font-weight:950;font-size:13px;color:#111827;white-space:nowrap}
    .chk .typeAlt{display:block;color:#6b7280;font-size:12px;white-space:normal;direction:rtl;text-align:right}
    .countActions{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    button{border:none;border-radius:14px;padding:12px 16px;font-weight:1000;cursor:pointer;background:#f3f4f6;color:#111827;transition:transform .04s ease,filter .15s ease,opacity .2s ease;user-select:none;font-size:16px}
    button:active,.miniBtn:active{transform:scale(.98)}button.primary{background:#2563eb;color:#fff}button.ghost{background:#eef2ff;color:#1d4ed8}button.danger{background:#fee2e2;color:#991b1b}
    .warn{display:none;margin-top:12px;border:2px solid rgba(220,38,38,.28);background:#fee2e2;color:#991b1b;border-radius:14px;padding:10px 12px;font-weight:950;width:100%}.warn.show{display:block}
    .outWrap{margin-top:16px}
    .page{margin-top:16px;background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 10px 26px rgba(15,23,42,.08);overflow:hidden;position:relative}
    .pageBorder{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none}
    .pageInner{position:relative;z-index:1;padding:0}.pageContent{margin:var(--pagePad);background:#fff;border-radius:14px;padding:16px;box-shadow:0 0 0 1px rgba(229,231,235,.9) inset}
    .pageHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px}
    .hdrLeft{min-width:240px}.hdrTitle{font-weight:1000;font-size:18px;line-height:1.15;margin-bottom:2px}.hdrSub{color:var(--muted);font-weight:900;font-size:12px;line-height:1.2}
    .nameRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end;min-width:min(420px,100%)}
    .lineField{display:flex;flex-direction:column;gap:6px;min-width:0}.lineLabel{font-size:12px;font-weight:950;color:var(--muted)}.lineBox{height:30px;border:2px solid #111827;border-radius:10px;background:#fff;width:100%}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;margin-top:10px}
    .qCard{border:1px solid rgba(229,231,235,.95);border-radius:16px;padding:12px;background:#fff;min-height:190px;display:flex;flex-direction:column;gap:8px;break-inside:avoid}
    .qTop{display:flex;align-items:flex-start;justify-content:flex-start;gap:12px}
    .qNum{font-weight:1000;font-size:18px;min-width:44px;color:#111827}
    .qText{font-weight:1000;font-size:16px;line-height:1.18;color:#111827;flex:1}
    .qInstruction{display:block;margin-bottom:6px}
    .qExprLine{display:block;text-align:center;font-family:var(--mathFont);font-weight:700;font-size:20px;line-height:1.25;direction:ltr;unicode-bidi:isolate;margin-top:4px}
    .workBox{margin-top:2px;border:2px solid #111827;border-radius:16px;padding:10px;background:#fff;flex:1;min-height:92px}
    .workBox.key{border-color:var(--ok);background:rgba(22,163,74,.08);color:#111827;display:flex;align-items:center;justify-content:center;text-align:center;font-weight:1000;font-size:18px;overflow-wrap:anywhere;font-family:var(--mathFont)}
    .tableMini{width:100%;border-collapse:collapse;font-family:var(--mathFont);font-weight:700;font-size:16px;background:#fff;border-radius:12px;overflow:hidden;margin-top:4px}
    .tableMini th,.tableMini td{border:1.5px solid rgba(17,24,39,.35);padding:7px 8px;text-align:center;min-width:40px;height:34px}
    .tableMini th{background:#f9fafb}.tableMini .blank{height:34px;background:#fff}
    .var{font-family:var(--mathFont);font-style:italic;font-weight:650}.math,.exprLTR{font-family:var(--mathFont);font-weight:650;direction:ltr;unicode-bidi:isolate}
    .frac{display:inline-flex;flex-direction:column;align-items:stretch;justify-content:center;vertical-align:middle;line-height:1.05;transform:translateY(-1px);margin:0 2px;min-width:34px}
    .frac .top,.frac .bottom{text-align:center;padding:0 4px;white-space:nowrap}.frac .bar{height:0;border-top:2px solid #111827;margin:2px 0;border-radius:999px}
    .mulSign{display:inline-block;padding:0 .35em;font-style:normal}
    .page.lang-rtl .pageHeader,.page.lang-rtl .qTop{direction:rtl}.page.lang-rtl .qText,.page.lang-rtl .hdrTitle,.page.lang-rtl .hdrSub,.page.lang-rtl .lineLabel{text-align:right}.page.lang-rtl .qNum{text-align:left}.page.lang-rtl .math,.page.lang-rtl .exprLTR,.page.lang-rtl .frac,.page.lang-rtl .tableMini{direction:ltr}
    .mmtFooter{position:fixed;left:0;right:0;bottom:0;height:var(--footer-h);display:flex;align-items:center;justify-content:center;padding:0 12px;background:rgba(255,255,255,.92);border-top:1px solid rgba(229,231,235,.95);backdrop-filter:blur(8px);z-index:500;font-weight:900;color:#111827;text-align:center;font-size:13px}
    .mmtFooter a{color:#2563eb;text-decoration:none;font-weight:950}.mmtFooter a:hover{text-decoration:underline}
    @media print{
      @page{size:A4;margin:12mm}body{background:#fff!important;padding:0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}.controls,.mmtFooter{display:none!important}.wrap{max-width:none!important;margin:0!important;padding:0!important}:root{--pagePad:6mm}.page{width:186mm;height:273mm;margin:0 auto;border:none;box-shadow:none;page-break-after:always;border-radius:0}.page:last-child{page-break-after:auto}.pageContent{margin:var(--pagePad);padding:12px}.pageHeader{flex-wrap:nowrap!important;gap:10px!important}.grid{gap:12px!important}.qCard{padding:12px!important;min-height:190px}.frac .bar{border-top-width:2px!important}
    }
  </style>
</head>
<body>
  <div class="wrap"><div class="panel"><div class="controls" aria-label="Worksheet controls">
    <div style="min-width:320px;flex:1 1 620px">
      <div class="topSelectors">
        <div class="outcomeControl"><label for="levelSel" data-ui="levelLabel">Level</label><select id="levelSel"><option value="basic">Basic — Algebraic Techniques (D/E)</option><option value="expected">Expected — Algebraic Techniques (C)</option></select></div>
        <div class="languageControl"><label for="languageSel" data-ui="languageLabel">Worksheet language</label><select id="languageSel"><option value="en">English</option><option value="fa">فارسی (Farsi / Persian)</option><option value="ar">العربية (Arabic)</option></select></div>
      </div>
      <div class="checks" aria-label="Question types"><div class="checksHeader"><label class="checksTitle" data-ui="questionTypes">Question types</label><button id="toggleAllBtn" type="button" class="miniBtn">Deselect all</button></div><div id="chkWrap" style="display:flex;gap:12px 14px;flex-wrap:wrap;align-items:center"></div></div>
      <div id="warn" class="warn">Please tick at least one question type.</div>
    </div>
    <div class="countActions"><div><label for="countInp" data-ui="totalQuestions">Total questions (multiples of 8 recommended)</label><input id="countInp" type="number" min="8" max="96" step="8" value="16" /></div><div class="btnRow"><button id="genBtn" class="primary" data-ui="generateBtn">Generate</button><button id="printBtn" class="ghost" data-ui="printBtn">Print / Save as PDF</button><button id="resetBtn" class="danger" data-ui="resetBtn">Reset</button></div></div>
  </div><div id="out" class="outWrap"></div></div></div>
  <div class="mmtFooter">This tool and more can be found at&nbsp;<a href="https://www.millsmathstools.au">www.millsmathstools.au</a></div>

  function canonical(s){return String(s).toLowerCase().trim().replace(/[−–—]/g,'-').replace(/[×·]/g,'*').replace(/÷/g,'/').replace(/[²]/g,'^2').replace(/\s+/g,'').replace(/\*/g,'').replace(/\{/g,'(').replace(/\}/g,')').replace(/\[/g,'(').replace(/\]/g,')').replace(/−/g,'-')}
  function normalizeFractionText(s){return canonical(s).replace(/^\((.*)\)$/,'$1')}
  function answerOK(input,q){const raw=String(input||'');if(!raw.trim())return false;const a=canonical(raw),targets=[q.answerText,...(q.alts||[])].map(canonical);
    if(targets.includes(a))return true;
    const plainTarget=canonical(q.answerText).replace(/,/g,''); if(a===plainTarget)return true;
    // allow simple fraction answers with or without parentheses around numerator/denominator
    const af=normalizeFractionText(raw),tf=normalizeFractionText(q.answerText); if(af===tf)return true;
    // accept x/2 for stacked fractions and coefficientless 1x variants
    if(targets.some(t=>t.replace(/^1([a-z])/,'$1')===a.replace(/^1([a-z])/,'$1')))return true;
    return false;
  }
  function parseSimpleFactorisation(input,v){
    let s=canonical(input).replace(/\*/g,'');
    const esc=String(v).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re=new RegExp('^(-?\d+)\((-?\d*)'+esc+'([+-]\d+)\)$');
    const m=s.match(re);
    if(!m)return null;
    const outside=Number(m[1]);
    let innerCoeff=m[2];
    if(innerCoeff===''||innerCoeff==='+')innerCoeff=1;
    else if(innerCoeff==='-')innerCoeff=-1;
    else innerCoeff=Number(innerCoeff);
    const innerConst=Number(m[3]);
    if(!Number.isFinite(outside)||!Number.isFinite(innerCoeff)||!Number.isFinite(innerConst))return null;
    return {outside,innerCoeff,innerConst,A:outside*innerCoeff,B:outside*innerConst};
  }
  function parseLinearFactorisation(input){
    const s=canonical(input).replace(/\*/g,'');
    const m=s.match(/^(-?\d+)\((.+)\)$/);
    if(!m)return null;
    const outside=Number(m[1]);
    if(!Number.isFinite(outside)||outside===0)return null;
    let inner=m[2].replace(/-/g,'+-');
    if(inner.startsWith('+'))inner=inner.slice(1);
    const pieces=inner.split('+').filter(Boolean);
    if(!pieces.length)return null;
    const terms={};
    for(const piece of pieces){
      const tm=piece.match(/^(-?\d*)([a-z]*)$/);
      if(!tm)return null;
      let coeffTxt=tm[1], vars=tm[2]||'';
      let coeff;
      if(coeffTxt===''||coeffTxt==='+') coeff=1;
      else if(coeffTxt==='-') coeff=-1;
      else coeff=Number(coeffTxt);
      if(!Number.isFinite(coeff))return null;
      const key=vars.split('').sort((a,b)=>a.localeCompare(b)).join('');
      terms[key]=(terms[key]||0)+outside*coeff;

  }

    for(const k of keys){if((a[k]||0)!==(b[k]||0))return false;}

  }
  function factorisePartialHCF(input,q){
