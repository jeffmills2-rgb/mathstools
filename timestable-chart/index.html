  function applyDivisionCellVisibility(direction){
    const { row, col } = currentSelection;
    zoomBoard?.classList.toggle('rows-mode', direction==='rows');
    zoomBoard?.classList.toggle('columns-mode', direction==='columns');

    for(let r=1;r<=row;r++){
      for(let c=1;c<=col;c++){
        const cell = getZoomCell(r,c);
        cell.classList.remove('active','ghost','hiddenish','division-faded','division-keep','division-row-divider','division-col-divider','division-last-row','division-last-col');
        if(direction==='rows'){
          cell.classList.add('division-faded');
          if(c===col) cell.classList.add('division-keep');
          if(r<row) cell.classList.add('division-row-divider');
          if(r===row) cell.classList.add('division-last-row');
        }else{
          cell.classList.add('division-faded');
          if(r===row) cell.classList.add('division-keep');
          if(c<col) cell.classList.add('division-col-divider');
          if(c===col) cell.classList.add('division-last-col');
        }
      }
    }
  }

  function setupDivisionCards(direction){
    clearDivisionGroupCards();
    const { row, col } = currentSelection;
    const cards=[];
    const totalGroups = direction==='rows' ? row : col;

    if(direction==='rows'){
      for(let r=1;r<=row;r++){
        const groupIndex = r;
        const groupClass = getDivisionGroupClass(groupIndex, totalGroups);
        const card = createGroupCard(`Group ${r}`, r*col, groupClass);
        card.classList.toggle('group-featured', groupClass !== 'group-neutral');
        cards.push({ el:card, start:getCellCenterInBoard(r,col), end:getInnerWhiteRowCenter(r), groupIndex, totalGroups });
      }
    }else{
      for(let c=1;c<=col;c++){
        const groupIndex = c;
        const groupClass = getDivisionGroupClass(groupIndex, totalGroups);
        const card = createGroupCard(`Group ${c}`, row*c, groupClass);
        card.classList.toggle('group-featured', groupClass !== 'group-neutral');
        cards.push({ el:card, start:getCellCenterInBoard(row,c), end:getInnerWhiteColumnCenter(c), groupIndex, totalGroups });
      }
    }

    cards.forEach(item=>{
      item.el.style.left=`${item.start.x}px`;
      item.el.style.top=`${item.start.y}px`;
      item.el.classList.remove('visible');
    });
    return cards;
  }

  function startDivisionAnimation(direction){
    cancelDivisionAnimation();
    clearTimers();
    hideExpression();
    hideFloatingTotal();
    updateDivisionToggleButtons();
    applyDivisionCellVisibility(direction);

    const cards = setupDivisionCards(direction);
    divisionAnimationStart = performance.now();

    function getCardWindow(item){
      const totalGroups = item.totalGroups || 1;
      if(totalGroups <= 1) return { start:0, end:1 };

      if(item.groupIndex === 1) return { start:0.00, end:0.32 };
      if(item.groupIndex === totalGroups) return { start:0.18, end:0.50 };

      const middleCount = Math.max(1, totalGroups - 2);
      const middleOrder = item.groupIndex - 2;
      const start = 0.46 + (middleOrder * (0.30 / middleCount));
      const end = Math.min(0.96, start + 0.24);
      return { start, end };
    }

    function frame(now){
      const t = Math.min(1, (now - divisionAnimationStart) / DIVISION_SWITCH_MS);

      cards.forEach(item=>{
        const window = getCardWindow(item);
        const localT = t <= window.start
          ? 0
          : t >= window.end
            ? 1
            : (t - window.start) / Math.max(0.001, window.end - window.start);

        const eased = 1 - Math.pow(1 - localT, 3);
        const x = item.start.x + (item.end.x - item.start.x) * eased;
        const y = item.start.y + (item.end.y - item.start.y) * eased;
        item.el.style.left = `${x}px`;
        item.el.style.top = `${y}px`;
        item.el.classList.toggle('visible', localT > 0.02);
      });

      if(t < 1){
        divisionAnimFrame = requestAnimationFrame(frame);
      }else{
        cards.forEach(item=>item.el.classList.add('visible'));
        divisionAnimFrame = 0;
        showExpressionForCurrentMode();
      }
    }
    divisionAnimFrame = requestAnimationFrame(frame);
  }

  function setDivisionShareMode(next){
    if(mode!=='division') return;
    if(divisionShareMode===next && !divisionAnimFrame) return;
    divisionShareMode = next;
    updateDivisionToggleButtons();
    startDivisionAnimation(next);
  }

  /* -------------------- FRACTION MODE -------------------- */

  function getFractionTargetRect(){
    const shell = chartShell.getBoundingClientRect();
    const width = Math.min(shell.width*0.9, 1060);
    const height = Math.min(width/3, Math.min(chartShell.offsetHeight*0.56, 280));
    const left = (shell.width-width)/2;
    const top = Math.max(84,(chartShell.offsetHeight-height)/2+12);
    return { left, top, width, height };
  }

  function createFractionMarkup(n,d){
    const outer=document.createElement('div');
    outer.style.width='100%';
    outer.style.height='100%';
    outer.style.display='grid';
    outer.style.placeItems='center';

    const wrapper=document.createElement('div');
    wrapper.className='fraction';

    const top=document.createElement('div');
    top.textContent=String(n);
    const bar=document.createElement('div');
    bar.className='bar';
    const bottom=document.createElement('div');
    bottom.textContent=String(d);

    wrapper.append(top,bar,bottom);
    outer.appendChild(wrapper);
    return outer;
  }

  function createFractionWrap(selection){
    const { row, col } = selection;
    const start = getCell(row,1);
    const end = getCell(row,col);
    const a = getRectRelativeToShell(start);
    const b = getRectRelativeToShell(end);

    const startLeft=a.left;
    const startTop=a.top;
    const startWidth=b.right-a.left;
    const startHeight=a.height*2;

    fractionWrap=document.createElement('div');
    fractionWrap.className='fraction-wrap';
    if(showGroups) fractionWrap.classList.add('groups-mode');
    fractionWrap.style.left=`${startLeft}px`;
    fractionWrap.style.top=`${startTop}px`;
    fractionWrap.style.width=`${startWidth}px`;
    fractionWrap.style.height=`${startHeight}px`;

    const box=document.createElement('div');
    box.className='fraction-box';

    const fracRow=document.createElement('div');
    fracRow.className='frac-row';
    fracRow.style.gridTemplateColumns=`repeat(${col}, minmax(0,1fr))`;

    const valueRow=document.createElement('div');
    valueRow.className='value-row';
    valueRow.style.gridTemplateColumns=`repeat(${col}, minmax(0,1fr))`;

    fracCells=[]; valueCells=[]; fractionNodes=[]; valueNodes=[];

    for(let i=1;i<=col;i++){
      const fc=document.createElement('button');
      fc.className='frac-cell clickable';
      fc.type='button';
      fc.appendChild(createFractionMarkup(i,col));
      fc.addEventListener('click',()=>selectFractionPartition(i));
      fc.addEventListener('mouseenter',()=>setFractionPreview(i));
      fc.addEventListener('mouseleave',clearFractionPreview);

      const vc=document.createElement('button');
      vc.className='value-cell clickable';
      vc.type='button';
      const vn=document.createElement('div');
      vn.className='value-text';
      vn.textContent=String(row*i);
      vc.appendChild(vn);
      vc.addEventListener('click',()=>selectFractionPartition(i));
      vc.addEventListener('mouseenter',()=>setFractionPreview(i));
      vc.addEventListener('mouseleave',clearFractionPreview);

      fracCells.push(fc);
      valueCells.push(vc);
      fractionNodes.push(fc.firstChild);
      valueNodes.push(vn);

      fracRow.appendChild(fc);
      valueRow.appendChild(vc);
    }

    box.append(fracRow,valueRow);
    fractionWrap.appendChild(box);
    overlay.innerHTML='';
    overlay.appendChild(fractionWrap);
    overlay.classList.add('active');
  }

  function updateFractionZoomTextSizing(){
    if(!fractionWrap || !currentSelection) return;
    const col = currentSelection.col;
    const w = fractionWrap.getBoundingClientRect().width || 1;
    const seg = (w-2)/col;
    const fracSize = Math.max(13,Math.min(52,seg*0.36));
    const valSize = Math.max(13,Math.min(54,seg*0.4));
    const fracWidth = Math.max(26,Math.min(seg*0.78,84));

    fractionNodes.forEach(node=>{
      const frac=node.querySelector('.fraction');
      if(frac){
        frac.style.fontSize=`${fracSize}px`;
        frac.style.width=`${fracWidth}px`;
        frac.style.margin='0 auto';
      }
    });
    valueNodes.forEach(n=>n.style.fontSize=`${valSize}px`);
  }

  function setFractionPreview(index){
    if(currentPartition || isAnimating) return;
    fracCells.forEach((c,i)=>c.classList.toggle('preview', i<index));
    valueCells.forEach((c,i)=>c.classList.toggle('preview', i<index));
  }

  function clearFractionPreview(){
    fracCells.forEach(c=>c.classList.remove('preview'));
    valueCells.forEach(c=>c.classList.remove('preview'));
  }

  function clearFractionPartitionSelection(){
    currentPartition=null;
    selectionTimers.forEach(id=>clearTimeout(id));
    selectionTimers=[];
    fracCells.forEach(c=>c.classList.remove('active','preview'));
    valueCells.forEach(c=>c.classList.remove('active','preview'));
    updateFractionExpression();
  }

  function selectFractionPartition(index){
    if(!currentSelection||isAnimating) return;
    clearFractionPreview();
    selectionTimers.forEach(id=>clearTimeout(id));
    selectionTimers=[];

    const prev=currentPartition||0;
    currentPartition=index;

    const apply=u=>{
      fracCells.forEach((c,i)=>c.classList.toggle('active',i<u));
      valueCells.forEach((c,i)=>c.classList.toggle('active',i<u));
    };

    if(prev===0 || prev===index){
      apply(index);
    }else if(index>prev){
      apply(prev);
      const steps=index-prev;
      for(let s=1;s<=steps;s++){
        selectionTimers.push(setTimeout(()=>apply(prev+s), Math.round((260/Math.max(1,steps))*s)));
      }
    }else{
      const steps=prev-index;
      for(let s=1;s<=steps;s++){
        selectionTimers.push(setTimeout(()=>apply(prev-s), Math.round((220/Math.max(1,steps))*s)));
      }
    }

    updateFractionExpression();
  }

  function showFractionToggles(){
    fractionModeToggles.classList.add('visible');
  }

  function hideFractionToggles(){
    fractionModeToggles.classList.remove('visible');
  }

  function animateFractionToZoom(selection){
    isAnimating=true;
    currentSelection=selection;
    currentPartition=null;

    clearMainPreview();
    setPromptVisible(false);
    setBackVisible(true);
    chartShell.classList.add('spotlight');
    createFractionWrap(selection);
    showFractionToggles();

    const t=getFractionTargetRect();
    screenFade.classList.add('active');

    requestAnimationFrame(()=>{
      fractionWrap.style.transition=`
        left ${FRACTION_ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1),
        top ${FRACTION_ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1),
        width ${FRACTION_ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1),
        height ${FRACTION_ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1)
      `;
      fractionWrap.style.left=`${t.left}px`;
      fractionWrap.style.top=`${t.top}px`;
      fractionWrap.style.width=`${t.width}px`;
      fractionWrap.style.height=`${t.height}px`;
    });

    const tick=setInterval(updateFractionZoomTextSizing,30);
    stageTimers.push(setTimeout(()=>{
      clearInterval(tick);
      updateFractionZoomTextSizing();
      isAnimating=false;
      clearFractionPartitionSelection();
      if(showEquationToggle.checked) updateFractionExpression();
    }, FRACTION_ZOOM_IN_MS + 30));
  }

  function animateFractionBack(){
    if(isAnimating||!currentSelection||!fractionWrap) return;
    isAnimating=true;
    hideExpression();
    hideFractionToggles();

    const r=currentSelection.row, c=currentSelection.col;
    const first=getCell(r,1), last=getCell(r,c);
    const a=getRectRelativeToShell(first), b=getRectRelativeToShell(last);

    fractionWrap.style.transition=`
      left ${FRACTION_ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      top ${FRACTION_ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      width ${FRACTION_ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      height ${FRACTION_ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      opacity 180ms ease
    `;
    fractionWrap.style.left=`${a.left}px`;
    fractionWrap.style.top=`${a.top}px`;
    fractionWrap.style.width=`${b.right-a.left}px`;
    fractionWrap.style.height=`${a.height*2}px`;

    stageTimers.push(setTimeout(()=>{
      clearOverlay();
      screenFade.classList.remove('active');
      currentSelection=null;
      currentPartition=null;
      isAnimating=false;
      setBackVisible(false);
      setPromptVisible(true);
    }, FRACTION_ZOOM_OUT_MS + 40));
  }

  /* -------------------- COMMON -------------------- */

  function animateToZoom(selection){
    if(isAnimating || currentSelection) return;

    if(mode==='symmetry'){
      toggleSymmetrySelection(selection.row, selection.col);
      return;
    }

    if(mode==='multiples'){
      toggleMultipleSelection(selection.row, selection.col);
      return;
    }

    if(mode==='fraction_of_amount'){
      animateFractionToZoom(selection);
      return;
    }

    isAnimating=true;
    currentSelection=selection;
    touchMoved=false;

    clearMainPreview();
    setPromptVisible(false);
    setBackVisible(true);
    chartShell.classList.add('spotlight');
    screenFade.classList.add('active');

    createZoomBoard(selection);

    const target = getTargetRectSquareUnits(selection.row, selection.col, modeUsesHeaders());

    requestAnimationFrame(()=>{
      zoomBoard.style.transition=`
        left ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1),
        top ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1),
        width ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1),
        height ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1)
      `;
      zoomBoard.style.left=`${target.left}px`;
      zoomBoard.style.top=`${target.top}px`;
      zoomBoard.style.width=`${target.width}px`;
      zoomBoard.style.height=`${target.height}px`;
    });

    stageTimers.push(setTimeout(()=>{
      isAnimating=false;
      resizeFloatingCardForShape();
      updateDivisionToggleButtons();
      positionReplayButton();

      if(mode==='area'){
        highlightAreaRowsSequentially();
      }else if(mode==='product'){
        hideFloatingTotal();
        highlightProductLShape();
      }else if(mode==='division'){
        divisionShareMode='rows';
        updateDivisionToggleButtons();
        startDivisionAnimation('rows');
      }
    }, ZOOM_IN_MS + 40));
  }

  function animateBack(){
    if(isAnimating || !currentSelection) return;

    if(mode==='fraction_of_amount' && fractionWrap){
      animateFractionBack();
      return;
    }

    if(!zoomBoard) return;

    isAnimating=true;
    clearTimers();
    cancelDivisionAnimation();
    hideExpression();
    hideFloatingTotal();
    clearDivisionGroupCards();

    const includeHeaders = modeUsesHeaders();

    const startCell = getCell(1,1);
    const endCell = getCell(currentSelection.row, currentSelection.col);
    const a = getRectRelativeToShell(startCell);
    const b = getRectRelativeToShell(endCell);

    const endLeft = includeHeaders ? Math.max(0, a.left - a.width) : a.left;
    const endTop = includeHeaders ? Math.max(0, a.top - a.height) : a.top;
    const endWidth = (b.right - a.left) + (includeHeaders ? a.width : 0);
    const endHeight = (b.bottom - a.top) + (includeHeaders ? a.height : 0);

    zoomBoard.style.transition=`
      left ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      top ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      width ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1),
      height ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1)
    `;

    zoomBoard.style.left=`${endLeft}px`;
    zoomBoard.style.top=`${endTop}px`;
    zoomBoard.style.width=`${endWidth}px`;
    zoomBoard.style.height=`${endHeight}px`;

    stageTimers.push(setTimeout(()=>{
      clearOverlay();
      screenFade.classList.remove('active');
      currentSelection=null;
      isAnimating=false;
      setBackVisible(false);
      setPromptVisible(true);
    }, ZOOM_OUT_MS + 40));
  }

  function replayCurrentModeAnimation(){
    if(!currentSelection || isAnimating) return;

    clearTimers();
    cancelDivisionAnimation();
    clearDivisionGroupCards();
    hideExpression();
    hideFloatingTotal();

    if(mode==='fraction_of_amount'){
      if(!fractionWrap) return;
      clearFractionPartitionSelection();
      fractionWrap.classList.toggle('groups-mode', showGroups);
      updateFractionZoomTextSizing();
      showFractionToggles();
      if(showEquationToggle.checked) updateFractionExpression();
      return;
    }

    for(let r=0;r<zoomCells.length;r++){
      for(let c=0;c<zoomCells[r].length;c++){
        const cell = zoomCells[r][c];
        if(cell) cell.classList.remove('active','ghost','hiddenish');
      }
    }

    resizeFloatingCardForShape();
    updateDivisionToggleButtons();
    positionExpression();

    if(mode==='area'){
      highlightAreaRowsSequentially();
    }else if(mode==='product'){
      highlightProductLShape();
    }else if(mode==='division'){
      startDivisionAnimation(divisionShareMode);
    }
  }

  function rebuildZoomForMode(nextMode){
    if(!currentSelection) return;

    const selection = currentSelection;
    let currentRect;

    if(mode==='fraction_of_amount' && fractionWrap){
      currentRect = {
        left: parseFloat(fractionWrap.style.left || '0'),
        top: parseFloat(fractionWrap.style.top || '0'),
        width: parseFloat(fractionWrap.style.width || '0'),
        height: parseFloat(fractionWrap.style.height || '0')
      };
    }else{
      currentRect = {
        left: parseFloat(zoomBoard.style.left || '0'),
        top: parseFloat(zoomBoard.style.top || '0'),
        width: parseFloat(zoomBoard.style.width || '0'),
        height: parseFloat(zoomBoard.style.height || '0')
      };
    }

    clearOverlay();
    mode = nextMode;
    updateModeButtons();

    if(mode==='fraction_of_amount'){
      createFractionWrap(selection);
      fractionWrap.style.left=`${currentRect.left}px`;
      fractionWrap.style.top=`${currentRect.top}px`;
      fractionWrap.style.width=`${currentRect.width}px`;
      fractionWrap.style.height=`${currentRect.height}px`;
      overlay.classList.add('active');
      screenFade.classList.add('active');
      chartShell.classList.add('spotlight');
      showFractionToggles();
      updateFractionZoomTextSizing();
    }else{
      createZoomBoard(selection);
      zoomBoard.style.left=`${currentRect.left}px`;
      zoomBoard.style.top=`${currentRect.top}px`;
      zoomBoard.style.width=`${currentRect.width}px`;
      zoomBoard.style.height=`${currentRect.height}px`;
      overlay.classList.add('active');
      screenFade.classList.add('active');
      chartShell.classList.add('spotlight');
      resizeFloatingCardForShape();
    }

    replayCurrentModeAnimation();
  }

  function changeMode(nextMode){
    if(mode===nextMode) return;

    if(nextMode==='symmetry' || nextMode==='multiples'){
      if(currentSelection){
        clearOverlay();
        screenFade.classList.remove('active');
        chartShell.classList.remove('spotlight');
        currentSelection=null;
        currentPartition=null;
        isAnimating=false;
        setBackVisible(false);
        hideFractionToggles();
      }
      mode=nextMode;
      if(nextMode==='symmetry') symmetrySelection=null;
      if(nextMode==='multiples') multiplesSelections=[];
      updateModeButtons();
      applyChartVisualMode();
      return;
    }

    if(mode==='symmetry' || mode==='multiples'){
      symmetrySelection=null;
      multiplesSelections=[];
      mode=nextMode;
      updateModeButtons();
      if(mode!=='fraction_of_amount') hideFractionToggles();
      applyChartVisualMode();
      return;
    }

    if(currentSelection){
      rebuildZoomForMode(nextMode);
    }else{
      mode=nextMode;
      updateModeButtons();
      if(mode!=='fraction_of_amount') hideFractionToggles();
      applyChartVisualMode();
    }
  }

  function updateModeButtons(){
    const isArea = mode==='area';
    const isProduct = mode==='product';
    const isDivision = mode==='division';
    const isFraction = mode==='fraction_of_amount';
    const isSymmetry = mode==='symmetry';
    const isMultiples = mode==='multiples';

    modeAreaBtn.classList.toggle('active', isArea);
    modeProductBtn.classList.toggle('active', isProduct);
    modeDivisionBtn.classList.toggle('active', isDivision);
    modeFractionBtn.classList.toggle('active', isFraction);
    modeSymmetryBtn.classList.toggle('active', isSymmetry);
    modeMultiplesBtn.classList.toggle('active', isMultiples);

    modeAreaBtn.setAttribute('aria-selected', String(isArea));
    modeProductBtn.setAttribute('aria-selected', String(isProduct));
    modeDivisionBtn.setAttribute('aria-selected', String(isDivision));
    modeFractionBtn.setAttribute('aria-selected', String(isFraction));
    modeSymmetryBtn.setAttribute('aria-selected', String(isSymmetry));
    modeMultiplesBtn.setAttribute('aria-selected', String(isMultiples));

    replayBtn.classList.toggle('visible', !!currentSelection && !isSymmetry && !isMultiples);
    chartShell.dataset.mode = mode;
    updatePromptText();
    try{ localStorage.setItem('mmt-timestable-mode', mode); }catch(err){}
  }

  function onCellClick(e){
    if(touchMoved) return;
    const btn=e.currentTarget;
    animateToZoom({ row:Number(btn.dataset.row), col:Number(btn.dataset.col), value:Number(btn.dataset.value) });
  }

  function handleReplayClick(){
    if(mode==='symmetry' || mode==='multiples') return;
    if(currentSelection && !isAnimating) replayCurrentModeAnimation();
  }


  function handleKeydown(e){
    if(e.key==='Escape' && currentSelection && !isAnimating){
      e.preventDefault();
      animateBack();
      return;
    }

    if(mode==='fraction_of_amount' && currentSelection && !isAnimating){
      if(e.key==='ArrowRight'){
        e.preventDefault();
        selectFractionPartition(Math.min(currentSelection.col, (currentPartition||0)+1 || 1));
      }else if(e.key==='ArrowLeft'){
        e.preventDefault();
        selectFractionPartition(Math.max(1, (currentPartition||currentSelection.col)-1));
      }else if(e.key==='Enter'){
        e.preventDefault();
        selectFractionPartition(currentPartition || currentSelection.col);
      }
    }
  }

  function handleStagePointerDown(e){
    if(!currentSelection || isAnimating) return;

    const activeWrap = mode==='fraction_of_amount' ? fractionWrap : zoomBoard;
    if(activeWrap && activeWrap.contains(e.target)) return;
    if(backBtn.contains(e.target)) return;
    if(fractionModeToggles.contains(e.target)) return;

    animateBack();
  }

  function refreshDuringResize(){
    if(!currentSelection || isAnimating) return;

    if(mode==='fraction_of_amount' && fractionWrap){
      const t=getFractionTargetRect();
      fractionWrap.style.left=`${t.left}px`;
      fractionWrap.style.top=`${t.top}px`;
      fractionWrap.style.width=`${t.width}px`;
      fractionWrap.style.height=`${t.height}px`;
      updateFractionZoomTextSizing();
      updateFractionExpression();
      positionReplayButton();
      return;
    }

    const target = getTargetRectSquareUnits(currentSelection.row, currentSelection.col, modeUsesHeaders());
    zoomBoard.style.left=`${target.left}px`;
    zoomBoard.style.top=`${target.top}px`;
    zoomBoard.style.width=`${target.width}px`;
    zoomBoard.style.height=`${target.height}px`;

    resizeFloatingCardForShape();
    updateDivisionToggleButtons();
    positionExpression();

    if(mode==='area' && floatingTotal?.classList.contains('visible')){
      const centre = getInnerWhiteCenter();
      moveFloatingTotalTo(centre.x, centre.y, false);
    }else if(mode==='product' && floatingTotal?.classList.contains('visible')){
      const br = getCellCenterInBoard(currentSelection.row, currentSelection.col);
      moveFloatingTotalTo(br.x, br.y, false, true);
    }else if(mode==='division'){
      startDivisionAnimation(divisionShareMode);
    }
  }

  function handleChartPointerMove(e){
    if(currentSelection || isAnimating) return;
    const pos=getPointerGridPosition(e.clientX,e.clientY);
    if(!pos){ clearMainPreview(); return; }

    if(mode==='symmetry' || mode==='multiples'){ clearMainPreview(); return; }
    if(mode==='area') previewRectangle(pos.row,pos.col);
    else if(mode==='fraction_of_amount') previewFractionRow(pos.row,pos.col);
    else previewLShape(pos.row,pos.col);
  }

  function handleChartPointerLeave(){
    if(!currentSelection) clearMainPreview();
  }

  function handleChartTouchMove(e){
    if(currentSelection || isAnimating) return;
    const touch=e.touches[0];
    if(!touch) return;
    touchMoved=true;
    const pos=getPointerGridPosition(touch.clientX,touch.clientY);
    if(!pos){ clearMainPreview(); return; }

    if(mode==='symmetry' || mode==='multiples'){ clearMainPreview(); return; }
    if(mode==='area') previewRectangle(pos.row,pos.col);
    else if(mode==='fraction_of_amount') previewFractionRow(pos.row,pos.col);
    else previewLShape(pos.row,pos.col);
  }

  function handleChartTouchEnd(e){
    if(currentSelection || isAnimating) return;
    const touch=e.changedTouches[0];
    if(!touch) return;
    const pos=getPointerGridPosition(touch.clientX,touch.clientY);
    if(!pos){ clearMainPreview(); return; }
    const btn=getCell(pos.row,pos.col)?.querySelector('.cell-btn');
    if(btn){
      animateToZoom({ row:Number(btn.dataset.row), col:Number(btn.dataset.col), value:Number(btn.dataset.value) });
    }
  }

  function handleShowEquationChange(){
    hideEquation = !showEquationToggle.checked;
    updateFractionExpression();
  }

  function handleShowGroupsChange(){
    showGroups = showGroupsToggle.checked;
    if(fractionWrap){
      fractionWrap.classList.toggle('groups-mode', showGroups);
      updateFractionZoomTextSizing();
    }
  }

  backBtn.addEventListener('click', animateBack);
  replayBtn.addEventListener('click', handleReplayClick);
  window.addEventListener('keydown', handleKeydown);
  window.addEventListener('resize', refreshDuringResize);

  stage.addEventListener('pointerdown', handleStagePointerDown);
  chart.addEventListener('pointermove', handleChartPointerMove);
  chart.addEventListener('pointerleave', handleChartPointerLeave);
  chart.addEventListener('touchmove', handleChartTouchMove, { passive:true });
  chart.addEventListener('touchend', handleChartTouchEnd, { passive:true });

  modeAreaBtn.addEventListener('click', ()=>changeMode('area'));
  modeProductBtn.addEventListener('click', ()=>changeMode('product'));
  modeDivisionBtn.addEventListener('click', ()=>changeMode('division'));
  modeFractionBtn.addEventListener('click', ()=>changeMode('fraction_of_amount'));
  modeSymmetryBtn.addEventListener('click', ()=>changeMode('symmetry'));
  modeMultiplesBtn.addEventListener('click', ()=>changeMode('multiples'));

  showEquationToggle.addEventListener('change', handleShowEquationChange);
  showGroupsToggle.addEventListener('change', handleShowGroupsChange);
  symmetrySelect.addEventListener('change', ()=>{
    symmetryView = symmetrySelect.value;
    symmetrySelection = null;
    applyChartVisualMode();
  });

  buildChart();
  try{
    const savedMode = localStorage.getItem('mmt-timestable-mode');
    if(savedMode && ['area','product','division','fraction_of_amount','symmetry','multiples'].includes(savedMode)) mode = savedMode;
  }catch(err){}
  updateModeButtons();
  symmetrySelect.value = symmetryView;
  applyChartVisualMode();
})();
</script>
</body>
</html>
