<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Times Table Chart – Fractions of an Amount</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --panel:#eceff3;
      --ink:#111827;
      --teal:#67c8bf;
      --line:2px;
      --mathFont:"Cambria Math","STIX Two Math","STIXGeneral","Times New Roman",serif;
      --uiFont:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      --toolbar-h:64px;
      --back-h:44px;
      --grid-size:min(72vw,860px);
      --prompt-size:clamp(20px,2.5vw,34px);
      --body-size:clamp(18px,2vw,30px);
      --header-size:clamp(18px,2vw,28px);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--uiFont);
      overflow-x:hidden
    }

    .app{min-height:100%;padding:12px 18px 28px}
    .topbar{
      height:var(--toolbar-h);
      background:var(--panel);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px;
      gap:12px
    }
    .left-controls,.right-controls{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0
    }

    .chip,.btn{
      border:none;
      border-radius:16px;
      background:#f3f4f6;
      color:var(--ink);
      min-height:40px;
      padding:0 16px;
      font-size:15px;
      font-weight:600;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)
    }

    .btn.inert{cursor:default}
    .btn.reset{color:#6b7280;font-weight:700;cursor:pointer}

    .practice-dropdown{
      position:relative;
    }

    .practice-btn{
      cursor:pointer;
    }

    .practice-menu{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      background:#fff;
      border-radius:18px;
      box-shadow:0 12px 28px rgba(0,0,0,.12);
      padding:8px;
      display:none;
      flex-direction:column;
      min-width:240px;
      z-index:120;
      border:1px solid rgba(17,24,39,.06);
    }

    .practice-dropdown.open .practice-menu{
      display:flex;
    }

    .practice-link{
      text-decoration:none;
      color:var(--ink);
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      border-radius:14px;
      transition:background-color 140ms ease, transform 80ms ease;
    }

    .practice-link:hover,
    .practice-link:focus-visible{
      background:#f3f4f6;
      outline:none;
      transform:translateY(-1px);
    }

    .practice-icon{
      width:32px;
      height:32px;
      border-radius:10px;
      background:#dbeafe;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      flex:0 0 32px;
      box-shadow:inset 0 0 0 1px rgba(37,99,235,.08);
    }

    .practice-text{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .practice-text strong{
      font-size:14px;
      line-height:1.15;
      font-weight:700;
      letter-spacing:-.01em;
    }

    .practice-text span{
      font-size:12px;
      line-height:1.2;
      color:#6b7280;
    }

    .content{
      max-width:1260px;
      margin:0 auto;
      padding-top:12px;
      position:relative
    }

    .back-row{
      height:var(--back-h);
      display:flex;
      align-items:center;
      margin-bottom:8px
    }

    .back-btn{
      border:none;
      background:#f3f4f6;
      border-radius:14px;
      min-height:40px;
      padding:0 16px 0 14px;
      font-size:15px;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
      opacity:0;
      pointer-events:none;
      transform:translateY(-4px);
      transition:opacity 220ms ease,transform 220ms ease
    }

    .back-btn.visible{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0)
    }

    .stage{position:relative;min-height:620px}
    .prompt{
      text-align:center;
      font-size:var(--prompt-size);
      font-weight:700;
      margin:8px 0 18px;
      line-height:1.2;
      transition:opacity 280ms ease;
      user-select:none
    }
    .prompt.fade{opacity:0}

    .chart-shell{
      position:relative;
      width:fit-content;
      margin:0 auto;
      touch-action:manipulation
    }

    .chart-shell.spotlight .chart{
      opacity:.42;
      transition:opacity 220ms ease
    }

    table.chart{
      border-collapse:collapse;
      table-layout:fixed;
      width:var(--grid-size);
      background:transparent;
      position:relative;
      z-index:1
    }

    .chart td{
      border:var(--line) solid rgba(17,17,17,.88);
      width:calc(var(--grid-size)/13);
      height:calc(var(--grid-size)/13);
      text-align:center;
      vertical-align:middle;
      background:#fff;
      padding:0;
      position:relative;
      overflow:hidden;
      transition:opacity 220ms ease, background-color 120ms ease
    }

    .chart td.header,.chart td.corner{
      background:var(--teal);
      font-family:var(--mathFont);
      font-size:var(--header-size);
      font-weight:600;
      user-select:none
    }

    .cell-btn{
      appearance:none;
      border:none;
      background:transparent;
      margin:0;
      width:100%;
      height:100%;
      padding:0;
      cursor:pointer;
      font-family:var(--mathFont);
      font-size:var(--body-size);
      font-weight:500;
      color:#111;
      display:grid;
      place-items:center;
      transition:box-shadow 160ms ease,background-color 160ms ease,transform 160ms ease;
      position:relative;
      z-index:1;
      -webkit-tap-highlight-color:transparent
    }

    .cell-btn:hover,.cell-btn:focus-visible{
      box-shadow:inset 0 0 0 2px rgba(0,0,0,.05),0 6px 14px rgba(0,0,0,.10);
      background:transparent;
      outline:none
    }

    .screen-fade{
      position:absolute;
      inset:0;
      background:transparent;
      pointer-events:none;
      transition:background-color 260ms ease;
      z-index:2
    }

    .screen-fade.active{background:rgba(243,244,246,.94)}

    .overlay{
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none
    }

    .overlay.active,.overlay.active *{pointer-events:auto}

    .morph-wrap{
      position:absolute;
      transform-origin:center center;
      will-change:left,top,width,height,opacity;
      pointer-events:auto
    }

    .morph-wrap.groups-mode .frac-row,
    .morph-wrap.groups-mode .value-row{column-gap:10px}

    .morph-box{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column
    }

    .frac-row,.value-row{
      display:grid;
      width:100%;
      height:50%;
      column-gap:0;
      transition:column-gap 180ms ease
    }

    .frac-cell,.value-cell{
      appearance:none;
      border:var(--line) solid rgba(17,17,17,.88);
      display:grid;
      place-items:center;
      min-width:0;
      overflow:hidden;
      position:relative;
      transition:background-color 220ms ease,opacity 220ms ease,transform 150ms ease;
      color:var(--ink);
      padding:0;
      margin:0
    }

    .frac-cell{background:#fff;border-bottom:none}
    .value-cell{background:#fff;border-top:var(--line) solid rgba(17,17,17,.88)}

    .frac-cell.clickable,.value-cell.clickable{
      cursor:pointer;
      -webkit-tap-highlight-color:transparent
    }

    .frac-cell.clickable:hover,
    .frac-cell.clickable:focus-visible,
    .value-cell.clickable:hover,
    .value-cell.clickable:focus-visible{
      box-shadow:inset 0 0 0 2px rgba(0,0,0,.06);
      outline:none
    }

    .frac-cell.active,.value-cell.active{background:#d7ef9f;opacity:1}
    .frac-cell.preview,.value-cell.preview{background:#e8f4c9}

    .fraction{
      display:grid;
      grid-template-rows:1fr auto 1fr;
      align-items:center;
      justify-items:center;
      width:min(78%,92px);
      height:64%;
      font-family:var(--mathFont);
      line-height:1;
      font-variant-numeric:lining-nums;
      transition:font-size 200ms ease,width 200ms ease;
      margin:0 auto
    }

    .fraction .bar{
      width:100%;
      height:3px;
      background:#111;
      align-self:center
    }

    .value-text{
      font-family:var(--mathFont);
      line-height:1;
      font-weight:500;
      transition:font-size 200ms ease
    }

    .zoom-expression{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      font-family:var(--mathFont);
      color:var(--ink);
      z-index:4;
      pointer-events:none;
      width:fit-content;
      max-width:100%;
      text-align:center;
      background:#fff;
      border-radius:18px;
      padding:12px 18px;
      box-shadow:0 2px 12px rgba(0,0,0,.06);
      opacity:0;
      transition:opacity 180ms ease
    }

    .zoom-expression[hidden]{display:none}
    .zoom-expression.visible{opacity:1}

    .expr-part{
      font-size:clamp(26px,3.2vw,56px);
      line-height:1;
      white-space:nowrap
    }

    .expr-word{
      font-size:clamp(22px,2.3vw,38px);
      line-height:1;
      white-space:nowrap
    }

    .expr-frac{
      display:grid;
      grid-template-rows:1fr auto 1fr;
      align-items:center;
      justify-items:center;
      width:min(84px,10vw);
      height:clamp(52px,7vw,90px);
      font-size:clamp(26px,3.2vw,56px);
      line-height:1
    }

    .expr-frac .bar{width:100%;height:4px;background:#111}

    .zoom-toggles{
      display:none;
      position:absolute;
      left:calc(100% + 16px);
      top:50%;
      transform:translate(-30%, -50%);
      z-index:11;
      flex-direction:column;
      gap:12px
    }

    .zoom-toggles.visible{display:flex}

    .toggle-card{
      background:#fff;
      border-radius:16px;
      padding:10px 14px;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
      display:flex;
      align-items:center;
      gap:10px;
      min-width:120px;
      justify-content:space-between
    }

    .toggle-label{
      font-size:14px;
      font-weight:700;
      color:var(--ink)
    }

    .switch{
      position:relative;
      width:44px;
      height:24px
    }

    .switch input{
      opacity:0;
      width:0;
      height:0
    }

    .slider{
      position:absolute;
      cursor:pointer;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:#e5e7eb;
      border-radius:999px;
      transition:.25s
    }

    .slider:before{
      position:absolute;
      content:"";
      height:18px;
      width:18px;
      left:3px;
      top:3px;
      background:white;
      border-radius:50%;
      transition:.25s;
      box-shadow:0 2px 6px rgba(0,0,0,.2)
    }

    .switch input:checked + .slider{background:#2563eb}
    .switch input:checked + .slider:before{transform:translateX(20px)}

    .toggle-chip{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      font-weight:700;
      color:var(--ink);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      cursor:pointer
    }

    @media (max-width:900px){
      :root{
        --grid-size:min(92vw,720px);
        --body-size:clamp(14px,2.5vw,24px);
        --header-size:clamp(14px,2.4vw,22px)
      }

      .topbar{padding:0 8px}
      .right-controls{gap:8px}
      .chip,.btn{font-size:14px;padding:0 12px}
      .stage{min-height:520px}
      .expr-part{font-size:clamp(20px,3vw,42px)}
      .expr-word{font-size:clamp(18px,2vw,28px)}
      .expr-frac{width:min(64px,11vw);height:clamp(44px,8vw,72px);font-size:clamp(20px,3vw,42px)}
      .practice-menu{min-width:220px}
    }

    @media (max-width:640px){
      .app{padding:8px 10px 18px}
      .topbar{height:auto;padding:8px;align-items:flex-start}
      .left-controls,.right-controls{flex-wrap:wrap}
      .content{padding-top:8px}
      .prompt{margin-top:6px}
      .stage{min-height:420px}
      .back-row{margin-bottom:4px}
      .zoom-expression{gap:8px;width:min(96%,520px);flex-wrap:wrap}
      .expr-word{font-size:18px}
      .expr-part{font-size:26px}
      .expr-frac{width:52px;height:52px;font-size:26px}
      .zoom-toggles{position:static;justify-content:flex-end;margin-bottom:8px;flex-wrap:wrap}
      .practice-menu{
        right:auto;
        left:0;
        min-width:100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar" aria-label="Toolbar">
      <div class="left-controls">
        <a href="https://www.millsmathstools.au" class="chip" aria-label="Back to Mills Maths Tools" style="text-decoration:none">
          <img src="mmt.png" alt="MMT logo" style="width:18px;height:18px;border-radius:4px" />
          <span>Back to Mills Maths Tools</span>
        </a>
      </div>

      <div class="right-controls">
        <div class="practice-dropdown" id="practiceDropdown">
          <button class="btn practice-btn" id="practiceBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="practiceMenu">
            <span aria-hidden="true">🧰</span>
            <span>Practice ▼</span>
          </button>

          <div class="practice-menu" id="practiceMenu" role="menu" aria-label="Practice links">
            <a class="practice-link" href="./student-quiz.html" target="_blank" rel="noopener" role="menuitem">
              <span class="practice-icon" aria-hidden="true">✅</span>
              <span class="practice-text">
                <strong>Student Quiz</strong>
                <span>Open interactive student practice</span>
              </span>
            </a>

            <a class="practice-link" href="./worksheet-creator.html" target="_blank" rel="noopener" role="menuitem">
              <span class="practice-icon" aria-hidden="true">🧾</span>
              <span class="practice-text">
                <strong>Worksheet Creator</strong>
                <span>Generate printable questions</span>
              </span>
            </a>
          </div>
        </div>

        <button class="btn reset" id="resetBtn" type="button">Reset</button>
      </div>
    </div>

    <main class="content">
      <div class="back-row">
        <button class="back-btn" id="backBtn" type="button" aria-label="Back to chart">
          <span aria-hidden="true">←</span>
          <span>Back</span>
        </button>
      </div>

      <section class="stage" id="stage">
        <div id="zoomToggles" class="zoom-toggles">
          <div class="toggle-card">
            <span class="toggle-label">Equation</span>
            <label class="switch">
              <input id="showEquationToggle" type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>

          <div class="toggle-card">
            <span class="toggle-label">Groups</span>
            <label class="switch">
              <input id="showGroupsToggle" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <div class="prompt" id="prompt">Click a value to explore fractions of the whole</div>

        <div class="chart-shell" id="chartShell">
          <table class="chart" id="chart" aria-label="Times table chart from 1 to 12"></table>
          <div class="screen-fade" id="screenFade"></div>
          <div class="overlay" id="overlay" aria-hidden="true"></div>
          <div class="zoom-expression" id="zoomExpression" hidden></div>
        </div>
      </section>
    </main>
  </div>

<script>
(() => {
  const SIZE = 12, ZOOM_IN_MS = 2000, ZOOM_OUT_MS = 1000;

  const chart = document.getElementById('chart');
  const chartShell = document.getElementById('chartShell');
  const overlay = document.getElementById('overlay');
  const screenFade = document.getElementById('screenFade');
  const prompt = document.getElementById('prompt');
  const zoomExpression = document.getElementById('zoomExpression');
  const backBtn = document.getElementById('backBtn');
  const resetBtn = document.getElementById('resetBtn');
  const stage = document.getElementById('stage');
  const showEquationToggle = document.getElementById('showEquationToggle');
  const showGroupsToggle = document.getElementById('showGroupsToggle');
  const zoomToggles = document.getElementById('zoomToggles');

  const practiceDropdown = document.getElementById('practiceDropdown');
  const practiceBtn = document.getElementById('practiceBtn');

  let currentSelection = null, currentPartition = null, isAnimating = false, morphWrap = null;
  let fractionNodes = [], valueNodes = [], fracCells = [], valueCells = [], selectionTimers = [];
  let hideEquation = false, showGroups = false;

  function buildChart(){
    const frag = document.createDocumentFragment();
    for(let r=0;r<=SIZE;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<=SIZE;c++){
        const td=document.createElement('td');
        if(r===0&&c===0){
          td.className='corner';
          td.setAttribute('aria-hidden','true');
        } else if(r===0||c===0){
          td.className='header';
          td.textContent=String(r===0?c:r);
        } else {
          const btn=document.createElement('button');
          btn.className='cell-btn';
          btn.type='button';
          btn.textContent=String(r*c);
          btn.dataset.row=String(r);
          btn.dataset.col=String(c);
          btn.dataset.value=String(r*c);
          btn.addEventListener('click', onCellClick);
          td.appendChild(btn);
        }
        tr.appendChild(td);
      }
      frag.appendChild(tr);
    }
    chart.innerHTML='';
    chart.appendChild(frag);
  }

  function getCell(r,c){
    return chart.rows[r]?.cells[c] || null;
  }

  function getRectRelativeToShell(el){
    const s=chartShell.getBoundingClientRect(), r=el.getBoundingClientRect();
    return {left:r.left-s.left, top:r.top-s.top, width:r.width, height:r.height, right:r.right-s.left};
  }

  function setBackVisible(v){
    backBtn.classList.toggle('visible', v);
  }

  function setPromptVisible(v){
    prompt.classList.toggle('fade', !v);
  }

  function hideSelectedRowValues(row,col,hide){
    for(let c=1;c<=col;c++){
      const cell=getCell(row,c);
      if(cell) cell.style.opacity = hide ? '0' : '';
    }
  }

  function clearMainPreview(){
    for(let r=1;r<=SIZE;r++){
      for(let c=1;c<=SIZE;c++){
        const cell=getCell(r,c);
        if(cell) cell.style.background='';
      }
    }
  }

  function previewMainRow(row,col){
    if(currentSelection||isAnimating) return;
    clearMainPreview();
    for(let c=1;c<=col;c++){
      const cell=getCell(row,c);
      if(cell) cell.style.background='#e8f4c9';
    }
  }

  function handleChartPointerMove(e){
    if(currentSelection||isAnimating) return;
    const rect=chart.getBoundingClientRect();
    const x=e.clientX-rect.left, y=e.clientY-rect.top;
    const cellW=rect.width/13, cellH=rect.height/13;
    const col=Math.floor(x/cellW), row=Math.floor(y/cellH);
    if(row<1||row>SIZE||col<1||col>SIZE){
      clearMainPreview();
      return;
    }
    previewMainRow(row,col);
  }

  function handleChartLeave(){
    if(!currentSelection) clearMainPreview();
  }

  function clearMorph(){
    if(morphWrap){
      morphWrap.remove();
      morphWrap=null;
    }
    overlay.classList.remove('active');
    chartShell.classList.remove('spotlight');
    fractionNodes=[];
    valueNodes=[];
    fracCells=[];
    valueCells=[];
    selectionTimers.forEach(id=>clearTimeout(id));
    selectionTimers=[];
    zoomExpression.hidden=true;
    zoomExpression.classList.remove('visible');
    zoomExpression.innerHTML='';
    zoomToggles.classList.remove('visible');
  }

  function createFractionMarkup(n,d){
    const outer=document.createElement('div');
    outer.style.width='100%';
    outer.style.height='100%';
    outer.style.display='grid';
    outer.style.placeItems='center';

    const wrapper=document.createElement('div');
    wrapper.className='fraction';

    const top=document.createElement('div');
    top.textContent=String(n);

    const bar=document.createElement('div');
    bar.className='bar';

    const bottom=document.createElement('div');
    bottom.textContent=String(d);

    wrapper.append(top,bar,bottom);
    outer.appendChild(wrapper);
    return outer;
  }

  function createExprFraction(n,d){
    const w=document.createElement('div');
    w.className='expr-frac';
    const t=document.createElement('div');
    t.textContent=String(n);
    const b=document.createElement('div');
    b.className='bar';
    const d2=document.createElement('div');
    d2.textContent=String(d);
    w.append(t,b,d2);
    return w;
  }

  function getTargetRect(){
    const s=chartShell.getBoundingClientRect();
    const width=Math.min(s.width*0.9,1060);
    const height=Math.min(width/3, Math.min(chartShell.offsetHeight*0.56,280));
    const left=(s.width-width)/2;
    const top=Math.max(84,(chartShell.offsetHeight-height)/2+12);
    return {left,top,width,height};
  }

  function updateZoomTextSizing(col, host=morphWrap){
    if(!host) return;
    const w=host.getBoundingClientRect().width||1;
    const seg=(w-2)/col;
    const fracSize=Math.max(13,Math.min(52,seg*0.36));
    const valSize=Math.max(13,Math.min(54,seg*0.4));
    const fracWidth=Math.max(26,Math.min(seg*0.78,84));

    fractionNodes.forEach(node=>{
      const frac=node.querySelector('.fraction');
      if(frac){
        frac.style.fontSize=`${fracSize}px`;
        frac.style.width=`${fracWidth}px`;
        frac.style.margin='0 auto';
      }
    });

    valueNodes.forEach(n=>n.style.fontSize=`${valSize}px`);
  }

  function updateExpression(){
    if(hideEquation || !currentSelection || !currentPartition || !morphWrap){
      zoomExpression.hidden=true;
      zoomExpression.classList.remove('visible');
      zoomExpression.innerHTML='';
      return;
    }

    const whole=currentSelection.row*currentSelection.col;
    const part=currentSelection.row*currentPartition;

    zoomExpression.hidden=false;
    zoomExpression.classList.remove('visible');
    zoomExpression.innerHTML='';
    zoomExpression.append(
      createExprFraction(currentPartition,currentSelection.col),
      Object.assign(document.createElement('div'),{className:'expr-word',textContent:'of'}),
      Object.assign(document.createElement('div'),{className:'expr-part',textContent:String(whole)}),
      Object.assign(document.createElement('div'),{className:'expr-part',textContent:'='}),
      Object.assign(document.createElement('div'),{className:'expr-part',textContent:String(part)})
    );

    const shell=chartShell.getBoundingClientRect();
    const m=morphWrap.getBoundingClientRect();
    const relativeTop=m.top-shell.top;
    const exprHeight=zoomExpression.getBoundingClientRect().height||60;
    zoomExpression.style.top=`${Math.max(4, relativeTop-exprHeight-28)}px`;

    requestAnimationFrame(()=>zoomExpression.classList.add('visible'));
  }

  function clearPartitionSelection(){
    currentPartition=null;
    selectionTimers.forEach(id=>clearTimeout(id));
    selectionTimers=[];
    fracCells.forEach(c=>c.classList.remove('active','preview'));
    valueCells.forEach(c=>c.classList.remove('active','preview'));
    zoomExpression.hidden=true;
    zoomExpression.classList.remove('visible');
    zoomExpression.innerHTML='';
  }

  function setPreview(index){
    if(currentPartition || isAnimating) return;
    fracCells.forEach((c,i)=>c.classList.toggle('preview', i<index));
    valueCells.forEach((c,i)=>c.classList.toggle('preview', i<index));
  }

  function clearPreview(){
    fracCells.forEach(c=>c.classList.remove('preview'));
    valueCells.forEach(c=>c.classList.remove('preview'));
  }

  function selectPartition(index){
    if(!currentSelection||isAnimating) return;

    clearPreview();
    selectionTimers.forEach(id=>clearTimeout(id));
    selectionTimers=[];

    const prev=currentPartition||0;
    currentPartition=index;

    const apply=u=>{
      fracCells.forEach((c,i)=>c.classList.toggle('active',i<u));
      valueCells.forEach((c,i)=>c.classList.toggle('active',i<u));
    };

    if(prev===0||prev===index){
      apply(index);
    } else if(index>prev){
      apply(prev);
      const steps=index-prev;
      for(let s=1;s<=steps;s++){
        selectionTimers.push(setTimeout(()=>apply(prev+s), Math.round((260/Math.max(1,steps))*s)));
      }
    } else {
      const steps=prev-index;
      for(let s=1;s<=steps;s++){
        selectionTimers.push(setTimeout(()=>apply(prev-s), Math.round((220/Math.max(1,steps))*s)));
      }
    }

    updateExpression();

    const targets=[...fracCells.slice(0,index), ...valueCells.slice(0,index)];
    targets.forEach(el=>el.animate(
      [{transform:'scale(1)'},{transform:'scale(1.02)'},{transform:'scale(1)'}],
      {duration:150,easing:'cubic-bezier(.22,.61,.36,1)'}
    ));
  }

  function createMorph(selection){
    const {row,col}=selection;
    const start=getCell(row,1), end=getCell(row,col);
    const a=getRectRelativeToShell(start), b=getRectRelativeToShell(end);
    const startLeft=a.left, startTop=a.top, startWidth=b.right-a.left, startHeight=a.height*2;

    fractionNodes=[];
    valueNodes=[];
    fracCells=[];
    valueCells=[];

    morphWrap=document.createElement('div');
    morphWrap.className='morph-wrap';
    if(showGroups) morphWrap.classList.add('groups-mode');
    morphWrap.style.left=`${startLeft}px`;
    morphWrap.style.top=`${startTop}px`;
    morphWrap.style.width=`${startWidth}px`;
    morphWrap.style.height=`${startHeight}px`;

    const box=document.createElement('div');
    box.className='morph-box';

    const fracRow=document.createElement('div');
    fracRow.className='frac-row';
    fracRow.style.gridTemplateColumns=`repeat(${col}, minmax(0,1fr))`;

    const valueRow=document.createElement('div');
    valueRow.className='value-row';
    valueRow.style.gridTemplateColumns=`repeat(${col}, minmax(0,1fr))`;

    for(let i=1;i<=col;i++){
      const fc=document.createElement('button');
      fc.className='frac-cell clickable';
      fc.type='button';
      fc.appendChild(createFractionMarkup(i,col));
      fc.addEventListener('click',()=>selectPartition(i));
      fc.addEventListener('mouseenter',()=>setPreview(i));
      fc.addEventListener('mouseleave',clearPreview);
      fc.addEventListener('pointerdown',()=>fc.style.transform='scale(0.97)');
      fc.addEventListener('pointerup',()=>fc.style.transform='');
      fc.addEventListener('pointerleave',()=>fc.style.transform='');

      const vc=document.createElement('button');
      vc.className='value-cell clickable';
      vc.type='button';
      const vn=document.createElement('div');
      vn.className='value-text';
      vn.textContent=String(row*i);
      vc.appendChild(vn);
      vc.addEventListener('click',()=>selectPartition(i));
      vc.addEventListener('mouseenter',()=>setPreview(i));
      vc.addEventListener('mouseleave',clearPreview);
      vc.addEventListener('pointerdown',()=>vc.style.transform='scale(0.97)');
      vc.addEventListener('pointerup',()=>vc.style.transform='');
      vc.addEventListener('pointerleave',()=>vc.style.transform='');

      fracCells.push(fc);
      valueCells.push(vc);
      fractionNodes.push(fc.firstChild);
      valueNodes.push(vn);
      fracRow.appendChild(fc);
      valueRow.appendChild(vc);
    }

    box.append(fracRow,valueRow);
    morphWrap.appendChild(box);
    overlay.appendChild(morphWrap);
    overlay.classList.add('active');
    zoomToggles.classList.add('visible');
    updateZoomTextSizing(col,morphWrap);
  }

  function animateToZoom(selection){
    if(isAnimating||currentSelection) return;
    isAnimating=true;
    currentSelection=selection;
    currentPartition=null;
    setPromptVisible(false);
    setBackVisible(true);
    chartShell.classList.add('spotlight');
    createMorph(selection);

    const t=getTargetRect();
    hideSelectedRowValues(selection.row,selection.col,true);
    screenFade.classList.add('active');

    requestAnimationFrame(()=>{
      morphWrap.style.transition=`left ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1), top ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1), width ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1), height ${ZOOM_IN_MS}ms cubic-bezier(.22,.61,.36,1)`;
      morphWrap.style.left=`${t.left}px`;
      morphWrap.style.top=`${t.top}px`;
      morphWrap.style.width=`${t.width}px`;
      morphWrap.style.height=`${t.height}px`;
    });

    const tick=setInterval(()=>updateZoomTextSizing(selection.col,morphWrap),30);

    setTimeout(()=>{
      clearInterval(tick);
      updateZoomTextSizing(selection.col,morphWrap);
      isAnimating=false;
      clearPartitionSelection();
    }, ZOOM_IN_MS+30);
  }

  function animateBack(){
    if(isAnimating||!currentSelection) return;
    isAnimating=true;

    const r=currentSelection.row, c=currentSelection.col;
    const startRect=getTargetRect();
    const first=getCell(r,1), last=getCell(r,c);
    const a=getRectRelativeToShell(first), b=getRectRelativeToShell(last);
    const endLeft=a.left, endTop=a.top, endWidth=b.right-a.left, endHeight=a.height;

    clearMorph();
    screenFade.classList.remove('active');
    hideSelectedRowValues(r,c,true);

    const valueMorph=document.createElement('div');
    valueMorph.className='morph-wrap';
    valueMorph.style.pointerEvents='none';
    valueMorph.style.left=`${startRect.left}px`;
    valueMorph.style.top=`${startRect.top+startRect.height/2}px`;
    valueMorph.style.width=`${startRect.width}px`;
    valueMorph.style.height=`${startRect.height/2}px`;

    const valueRow=document.createElement('div');
    valueRow.className='value-row';
    valueRow.style.gridTemplateColumns=`repeat(${c}, minmax(0,1fr))`;
    valueRow.style.height='100%';

    const temp=[];
    for(let i=1;i<=c;i++){
      const cell=document.createElement('div');
      cell.className='value-cell';
      const node=document.createElement('div');
      node.className='value-text';
      node.textContent=String(r*i);
      temp.push(node);
      cell.appendChild(node);
      valueRow.appendChild(cell);
    }

    valueMorph.appendChild(valueRow);
    overlay.appendChild(valueMorph);
    overlay.classList.add('active');

    const tick=setInterval(()=>{
      const w=valueMorph.getBoundingClientRect().width||1, seg=(w-2)/c, size=Math.max(13,Math.min(54,seg*0.4));
      temp.forEach(n=>n.style.fontSize=`${size}px`);
    },30);

    requestAnimationFrame(()=>{
      valueMorph.style.transition=`left ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1), top ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1), width ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1), height ${ZOOM_OUT_MS}ms cubic-bezier(.22,.61,.36,1)`;
      valueMorph.style.left=`${endLeft}px`;
      valueMorph.style.top=`${endTop}px`;
      valueMorph.style.width=`${endWidth}px`;
      valueMorph.style.height=`${endHeight}px`;
    });

    setTimeout(()=>{
      clearInterval(tick);
      valueMorph.remove();
      overlay.classList.remove('active');
      hideSelectedRowValues(r,c,false);
      currentSelection=null;
      currentPartition=null;
      isAnimating=false;
      setBackVisible(false);
      setPromptVisible(true);
      zoomToggles.classList.remove('visible');
    }, ZOOM_OUT_MS+40);
  }

  function onCellClick(e){
    const btn=e.currentTarget;
    clearMainPreview();
    animateToZoom({
      row:Number(btn.dataset.row),
      col:Number(btn.dataset.col),
      value:Number(btn.dataset.value)
    });
  }

  function handleReset(){
    if(currentSelection) animateBack();
  }

  function handleKeydown(e){
    if(e.key==='Escape'&&currentSelection&&!isAnimating){
      e.preventDefault();
      animateBack();
      return;
    }

    if(!currentSelection||isAnimating) return;

    if(e.key==='ArrowRight'){
      e.preventDefault();
      selectPartition(Math.min(currentSelection.col,(currentPartition||0)+1||1));
      return;
    }

    if(e.key==='ArrowLeft'){
      e.preventDefault();
      selectPartition(Math.max(1,(currentPartition||currentSelection.col)-1));
      return;
    }

    if(e.key==='Enter'){
      e.preventDefault();
      selectPartition(currentPartition||currentSelection.col);
    }
  }

  function handleStagePointerDown(e){
    if(!currentSelection||isAnimating||!morphWrap) return;
    if(morphWrap.contains(e.target)||backBtn.contains(e.target)||zoomToggles.contains(e.target)) return;
    animateBack();
  }

  function refreshDuringResize(){
    if(!currentSelection||!morphWrap||isAnimating) return;
    const t=getTargetRect();
    morphWrap.style.left=`${t.left}px`;
    morphWrap.style.top=`${t.top}px`;
    morphWrap.style.width=`${t.width}px`;
    morphWrap.style.height=`${t.height}px`;
    updateZoomTextSizing(currentSelection.col,morphWrap);
    requestAnimationFrame(updateExpression);
  }

  function handleShowEquationChange(){
    hideEquation=!showEquationToggle.checked;
    updateExpression();
  }

  function handleShowGroupsChange(){
    showGroups=showGroupsToggle.checked;
    if(morphWrap) morphWrap.classList.toggle('groups-mode',showGroups);
  }

  function closePracticeMenu(){
    practiceDropdown.classList.remove('open');
    practiceBtn.setAttribute('aria-expanded', 'false');
  }

  function togglePracticeMenu(){
    const isOpen = practiceDropdown.classList.toggle('open');
    practiceBtn.setAttribute('aria-expanded', String(isOpen));
  }

  practiceBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    togglePracticeMenu();
  });

  document.addEventListener('click', (e) => {
    if(!practiceDropdown.contains(e.target)){
      closePracticeMenu();
    }
  });

  window.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && practiceDropdown.classList.contains('open')){
      closePracticeMenu();
    }
  });

  backBtn.addEventListener('click',animateBack);
  resetBtn.addEventListener('click',handleReset);
  window.addEventListener('keydown',handleKeydown);
  window.addEventListener('resize',refreshDuringResize);
  stage.addEventListener('pointerdown',handleStagePointerDown);
  chart.addEventListener('pointermove',handleChartPointerMove);
  chart.addEventListener('pointerleave',handleChartLeave);
  showEquationToggle.addEventListener('change',handleShowEquationChange);
  showGroupsToggle.addEventListener('change',handleShowGroupsChange);

  buildChart();
})();
</script>
</body>
</html>
