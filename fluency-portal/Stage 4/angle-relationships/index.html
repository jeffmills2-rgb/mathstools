<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Angle Relationships — Worksheet Maker</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --ink:#111827; --muted:#6b7280; --border:#e5e7eb;
      --shadow:0 14px 40px rgba(0,0,0,.10); --radius:18px;
      --blue:#2563eb; --blue-dark:#1d4ed8; --ans:#16a34a; --green:#16a34a; --orange:#f97316; --red:#ef4444;
      --line:#111827; --footer-h:44px;

      --uiFont:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--uiFont);background:radial-gradient(circle at top left,rgba(37,99,235,.10),transparent 30rem),radial-gradient(circle at top right,rgba(124,58,237,.09),transparent 30rem),var(--bg);color:var(--ink);padding-bottom:var(--footer-h)}
    .topbar{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#0f172a,#123b7a 55%,#2563eb);color:white;padding:14px 24px;display:grid;grid-template-columns:minmax(180px,1fr) auto minmax(180px,1fr);align-items:center;gap:18px;box-shadow:0 10px 28px rgba(15,23,42,.22)}
    .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;justify-self:start;border-radius:14px;padding:8px 12px;margin-left:-12px;transition:background .18s ease,transform .18s ease,box-shadow .18s ease}
    .brand:hover{background:rgba(255,255,255,.12);transform:translateY(-1px);box-shadow:0 0 10px rgba(124,58,237,.6),0 0 18px rgba(37,99,235,.4)}
    .brand-logo{width:44px;height:44px;object-fit:contain;background:white;border-radius:6px;padding:3px}
    .brand-text strong{display:block;font-size:1.18rem;line-height:1;letter-spacing:-.03em}.brand-text span{display:block;font-size:.78rem;opacity:.82;font-weight:650}
    .top-title{font-weight:900;font-size:clamp(1.25rem,2vw,1.7rem);letter-spacing:-.04em;text-align:center}
    .wrap{max-width:1280px;margin:14px auto 32px;padding:0 14px}.card{background:rgba(255,255,255,.96);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border:1px solid rgba(226,232,240,.9)}
    .title{font-size:28px;font-weight:1000;letter-spacing:.2px;margin:0 0 4px}.subtitle{margin:0 0 14px;color:var(--muted);font-weight:850;font-size:15px;line-height:1.35}
    .controls{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px;border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg,#fff,#f9fafb);margin-bottom:12px}
    .fieldRow{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}.controlGroup{min-width:220px}.wideGroup{flex:1 1 680px}
    label{display:block;font-weight:950;color:var(--ink);margin:0 0 7px;font-size:15px} select,input[type="number"]{border:2px solid #e5e7eb;border-radius:14px;padding:12px 13px;font-weight:950;font-size:17px;background:#fff;min-width:220px;outline:none} input[type="number"]{min-width:160px}
    .checks{display:flex;gap:9px 10px;flex-wrap:wrap;align-items:center}.chk{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:#fff;border-radius:999px;padding:9px 12px;font-weight:950;font-size:14px;color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.04);user-select:none}.chk input{width:18px;height:18px;accent-color:var(--blue)}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}button{border:none;border-radius:14px;padding:12px 16px;font-weight:1000;cursor:pointer;background:#f3f4f6;color:#111827;transition:transform .04s ease,filter .15s ease,opacity .2s ease;user-select:none;font-size:16px;font-family:var(--uiFont)}button:active{transform:scale(.98)}button.primary{background:#2563eb;color:#fff}button.ghost{background:#eef2ff;color:#1d4ed8}button.danger{background:#fee2e2;color:#991b1b}
    .outWrap{margin-top:14px}.page{margin-top:14px;background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 10px 26px rgba(15,23,42,.08);overflow:hidden}.pageHeader{padding:10px 14px 8px;border-bottom:1px solid rgba(229,231,235,.95);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}.hdrTitle{font-weight:1000;font-size:15px;line-height:1.12}.hdrSub{color:var(--muted);font-weight:850;font-size:12px;margin-top:2px}.nameDate{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;justify-content:flex-end;margin-left:auto}.lineField{display:flex;flex-direction:column;gap:4px;min-width:126px}.lineLabel{font-size:11px;font-weight:950;color:var(--muted)}.lineBox{height:22px;border:1.8px solid #111827;border-radius:9px;background:#fff}
    .grid{padding:18px 16px;display:grid;gap:14px 16px;align-content:stretch}.grid.twoCol{grid-template-columns:1fr 1fr}.grid.threeCol{grid-template-columns:1fr 1fr 1fr}.grid.rows-4{min-height:1120px;grid-template-rows:repeat(4,minmax(0,1fr))}.grid.rows-6{min-height:1120px;grid-template-rows:repeat(6,minmax(0,1fr))}.qCard{border:1px solid rgba(229,231,235,.95);border-radius:14px;padding:8px 10px;background:#fff;break-inside:avoid;display:flex;flex-direction:column;justify-content:flex-start;min-height:0;height:100%}.prompt{text-align:center;margin-top:0}.promptSmall{font-weight:900;font-size:10px;color:var(--muted);margin-bottom:2px;line-height:1;letter-spacing:.15px}.promptSmall .supportEnglish{display:block;font-size:.82em;opacity:.78;margin-top:2px}.promptSmall.rtlPrompt{direction:rtl;line-height:1.15}.ansLabel .supportEnglish{display:block;font-size:.78em;opacity:.78;margin-top:1px}.lang-rtl .qCard{direction:rtl}.lang-rtl .vizWrap,.lang-rtl .ansRow{direction:ltr}.lang-rtl .prompt{text-align:center}.lang-rtl .ansLabel{text-align:center}.expr{font-weight:1000;font-size:18px;font-family:var(--mathFont);letter-spacing:0;color:#0f172a;line-height:1;display:flex;justify-content:center;align-items:center;min-height:22px}.expr:empty{display:none;min-height:0}.vizWrap{display:flex;justify-content:center;align-items:center;padding:0;margin-top:4px;flex:1 1 auto;min-height:0}.angleViz{width:100%;height:190px;display:block;overflow:visible}.ansRow{margin-top:5px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}.ansLabel{font-weight:950;font-size:15px;font-family:var(--mathFont);line-height:1}.ansBox{width:min(120px,48%);height:25px;border:1.8px solid #111827;border-radius:12px;background:#fff}.ansBox.key{display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:14px;font-family:var(--mathFont);color:var(--ans);border-color:var(--ans);background:rgba(22,163,74,.08)}.pageFooter{padding:7px 14px;border-top:1px solid rgba(229,231,235,.95);display:flex;align-items:center;justify-content:center;gap:10px;font-weight:950;color:#111827;font-size:12px;background:rgba(255,255,255,.96)}.pageFooter a{color:#2563eb;text-decoration:none;font-weight:1000}.pageFooter a:hover{text-decoration:underline}.mmtFooter{position:fixed;left:0;right:0;bottom:0;height:var(--footer-h);display:flex;align-items:center;justify-content:center;padding:0 12px;background:rgba(255,255,255,.92);border-top:1px solid rgba(229,231,235,.95);backdrop-filter:blur(8px);z-index:500;font-weight:900;color:#111827;text-align:center;font-size:13px}.mmtFooter a{color:#2563eb;text-decoration:none;font-weight:950}.mmtFooter a:hover{text-decoration:underline}
    .ray,.baseLine{stroke:#111827;stroke-width:4;stroke-linecap:round;fill:none}.arc{stroke:var(--blue);stroke-width:3;stroke-linecap:round;fill:none;opacity:.72}.arc.green{stroke:var(--green)}.arc.orange{stroke:var(--orange)}.arcArrow{fill:var(--blue);stroke:none;opacity:1}.arcArrow.green{fill:var(--green)}.arcArrow.orange{fill:var(--orange)}.pointLabel,.angleLabel{font-family:var(--mathFont);font-weight:1000;fill:#111827;text-anchor:middle;dominant-baseline:middle}.pointLabel{font-size:18px}.angleLabel{font-size:16px;paint-order:stroke;stroke:#fff;stroke-width:4px;stroke-linejoin:round}.equationAngleLabel{font-size:11px}.vertexDot{fill:#111827}.rightMarker,.parallelMarker{stroke:#111827;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;fill:none}.protLine{stroke:#111827;stroke-width:1.2;stroke-linecap:round;fill:none}.protArc{stroke:#111827;stroke-width:2;fill:none}.protTickMinor{stroke:#111827;stroke-width:.8;stroke-linecap:round}.protTickMajor{stroke:#111827;stroke-width:1.4;stroke-linecap:round}.protNumber{font-family:var(--mathFont);font-weight:700;font-size:10px;fill:#111827;text-anchor:middle;dominant-baseline:middle}.protNumber.big{font-size:15px;font-weight:1000}
    @media(max-width:780px){.topbar{grid-template-columns:1fr auto;gap:10px}.top-title{grid-column:1/-1;grid-row:2;text-align:center}.brand-text span{display:none}.controls{align-items:stretch}.fieldRow,.btnRow{width:100%}select,input[type="number"]{width:100%}.grid.twoCol,.grid.threeCol{grid-template-columns:1fr}}
    @media print{@page{size:A4;margin:7mm}html,body{width:210mm;height:auto}body{background:#fff;padding-bottom:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}.wrap{max-width:none;margin:0;padding:0}.card{box-shadow:none;border-radius:0;padding:0}.topbar,.controls,.title,.subtitle,.mmtFooter{display:none!important}.page{margin:0;border:none;border-radius:0;box-shadow:none;page-break-after:always}.page:last-child{page-break-after:auto}.pageHeader{padding:2.6mm 3.2mm 2mm}.hdrTitle{font-size:10px}.hdrSub{font-size:8.4px}.nameDate{gap:6px}.lineField{min-width:86px;gap:2px}.lineLabel{font-size:8px}.lineBox{height:15px;border-width:1.2px;border-radius:7px}.grid{padding:4mm 3.2mm 2.6mm;gap:2.6mm 2.8mm}.grid.twoCol{grid-template-columns:1fr 1fr!important}.grid.threeCol{grid-template-columns:1fr 1fr 1fr!important}.grid.rows-4{min-height:255mm;grid-template-rows:repeat(4,minmax(0,1fr))}.grid.rows-6{min-height:255mm;grid-template-rows:repeat(6,minmax(0,1fr))}.qCard{padding:5px 6px 6px;border-radius:10px;min-height:0;border-color:#d5dae1}.promptSmall{font-size:7px;min-height:1px;margin-bottom:0}.expr{font-size:12px;line-height:1}.angleViz{height:142px}.ansRow{margin-top:2px;gap:4px}.ansLabel{font-size:9px}.ansBox{height:14px;border-width:1.2px;border-radius:7px;width:min(72px,36%)}.ansBox.key{font-size:10px}.pageFooter{padding:2mm 3.2mm 1.3mm;font-size:7.8px}.ray,.baseLine{stroke-width:3}.arc{stroke-width:2.4}.rightMarker,.parallelMarker{stroke-width:3}.pointLabel{font-size:14px}.angleLabel{font-size:13px;paint-order:stroke;stroke:#fff;stroke-width:3px;stroke-linejoin:round}.equationAngleLabel{font-size:8.5px}.protNumber{font-size:8px}.protNumber.big{font-size:12px}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://www.millsmathstools.au" aria-label="Back to Mills Maths Tools"><img src="mmt.png" alt="Mills Maths Tools logo" class="brand-logo" onerror="this.style.visibility='hidden'"><div class="brand-text"><strong>MMT</strong><span>Mills Maths Tools</span></div></a>
    <div class="top-title">Angle Relationships</div><div></div>
  </header>
  <div class="wrap"><div class="card">
    <h1 class="title">Angle Relationships — Worksheet Maker</h1>
    <p class="subtitle">Printable A4 worksheets plus completed answer key. Version 1 includes angle facts, protractor reading and parallel-line relationships.</p>
    <div class="controls">
      <div class="fieldRow">
        <div class="controlGroup"><label for="levelSel">Level</label><select id="levelSel"><option value="basic" selected>Basic</option><option value="expected">Expected</option></select></div>
        <div class="controlGroup"><label for="languageSel">Worksheet language</label><select id="languageSel"><option value="en" selected>English</option><option value="fa">فارسی (Farsi / Persian)</option><option value="ar">العربية (Arabic)</option></select></div>
        <div class="controlGroup"><label for="countInp">Number of questions</label><input id="countInp" type="number" min="1" max="48" value="12"></div>
      </div>
      <div class="btnRow"><button id="selectBtn" class="ghost">Deselect all</button><button id="genBtn" class="primary">Generate worksheet</button><button id="printBtn" class="ghost">Print (Ctrl+P)</button><button id="resetBtn" class="danger">Reset</button></div>
    </div>
    <div class="controls"><div class="wideGroup"><label>Question types</label><div id="chkWrap" class="checks"></div></div></div>
    <div class="controls"><div class="wideGroup"><label>Diagram options</label><div class="checks"><label class="chk"><input id="togglePointLabels" type="checkbox" checked> Show vertex pronumerals</label><label class="chk"><input id="toggleAngleArcs" type="checkbox" checked> Show angle lines</label><label class="chk"><input id="toggleGreek" type="checkbox" checked> Use Greek alphabet</label><label class="chk" id="requireEqWrap"><input id="toggleRequireEquations" type="checkbox"> Require equations</label></div></div></div>
    <div id="out" class="outWrap"></div>
  </div></div>
  <div class="mmtFooter">This tool and more can be found at&nbsp;<a href="https://www.millsmathstools.au">www.millsmathstools.au</a></div>
<script>
(() => {
  const SITE='https://www.millsmathstools.au';
  const SVG_NS='http://www.w3.org/2000/svg';
  const VIEW={w:420,h:260};
  const GREEK=['α','β','θ','γ'];
  const ENGLISH='abcdefghijklmnopqrstuvwxyz'.split('').filter(ch=>ch!=='o'&&ch!=='l');
  const levelSel=document.getElementById('levelSel'), languageSel=document.getElementById('languageSel'), countInp=document.getElementById('countInp'), chkWrap=document.getElementById('chkWrap'), out=document.getElementById('out');
  const togglePointLabels=document.getElementById('togglePointLabels'), toggleAngleArcs=document.getElementById('toggleAngleArcs'), toggleGreek=document.getElementById('toggleGreek'), toggleRequireEquations=document.getElementById('toggleRequireEquations'), requireEqWrap=document.getElementById('requireEqWrap');
  const genBtn=document.getElementById('genBtn'), printBtn=document.getElementById('printBtn'), resetBtn=document.getElementById('resetBtn'), selectBtn=document.getElementById('selectBtn');

  const LANG={
    en:{dir:'ltr',question:'Q',worksheet:'Worksheet',answerKey:'Answer key',page:'Page',name:'Name',date:'Date',answer:'Answer:',findMissing:'Find the missing angle.',readAngle:'What is the size of the angle?',readReflex:'What is the size of the reflex angle?',noTypes:'Please tick at least one question type.'},
    fa:{dir:'rtl',question:'سؤال',worksheet:'برگه تمرین',answerKey:'پاسخ‌نامه',page:'صفحه',name:'نام',date:'تاریخ',answer:'پاسخ:',findMissing:'اندازه زاویه نامعلوم را پیدا کنید.',readAngle:'اندازه زاویه چقدر است؟',readReflex:'اندازه زاویه بازتابی چقدر است؟',noTypes:'لطفاً حداقل یک نوع پرسش را انتخاب کنید.'},
    ar:{dir:'rtl',question:'سؤال',worksheet:'ورقة عمل',answerKey:'دليل الإجابات',page:'صفحة',name:'الاسم',date:'التاريخ',answer:'الإجابة:',findMissing:'أوجد قياس الزاوية المجهولة.',readAngle:'ما قياس الزاوية؟',readReflex:'ما قياس الزاوية المنعكسة؟',noTypes:'يرجى اختيار نوع سؤال واحد على الأقل.'}
  };
  function currentLang(){return LANG[languageSel?.value]||LANG.en}
  function promptKey(q){
    if(q.type==='protractor' && q.reflex) return 'readReflex';
    if(q.type==='protractor') return 'readAngle';
    return 'findMissing';
  }
  function promptHTML(q,idx){
    const L=currentLang(), key=promptKey(q), en=LANG.en[key], local=L[key];
    if(languageSel.value==='en') return `${LANG.en.question}${idx} · ${en}`;
    return `<span dir="${L.dir}">${L.question}${idx} · ${local}</span><span class="supportEnglish">Q${idx} · ${en}</span>`;
  }
  function answerLabelHTML(){
    const L=currentLang();
    if(languageSel.value==='en') return LANG.en.answer;
    return `<span dir="${L.dir}">${L.answer}</span><span class="supportEnglish">${LANG.en.answer}</span>`;
  }
  function headerLabel(base){
    const L=currentLang();
    if(languageSel.value==='en') return base;
    const trans = base==='Worksheet' ? L.worksheet : base==='Answer key' ? L.answerKey : base;
    return `${trans}<br><span style="font-size:.82em;color:var(--muted)">${base}</span>`;
  }

  const TYPE_SETS={
    basic:[
      ['straight','Angles on a straight line',true],['right','Angles on a right angle',true],['point','Angles around a point',true],['vertical','Vertically opposite angles',true],['protractor','Read a protractor',false],['protractorReflex','Read a protractor — reflex',false]
    ],
    expected:[
      ['mixedBasic','Mixed angle relationships',true],['parallelCorresponding','Parallel lines — corresponding',false],['parallelAlternate','Parallel lines — alternate interior',false],['parallelCointerior','Parallel lines — co-interior',false],['parallelMixed','Parallel lines — mixed',true]
    ]
  };

  function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a} function choice(arr){return arr[randInt(0,arr.length-1)]} function degToRad(d){return d*Math.PI/180} function positiveSweep(a,b){let s=b-a;while(s<0)s+=360;return s}
  function randomPronumeral(){return choice(toggleGreek.checked?GREEK:ENGLISH)}
  function requireEquationsOn(){return levelSel.value==='expected' && toggleRequireEquations && toggleRequireEquations.checked}
  function makeUnknown(value){
    const u=randomPronumeral();
    if(!requireEquationsOn()){
      return {display:u, answer:`${u} = ${value}°`, value};
    }
    const forms=[];
    for(let k=5;k<=30;k+=5){
      if(value-k>=5) forms.push({display:`${u} + ${k}`, answer:`${u} = ${value-k}°`});
      if(value+k<=180) forms.push({display:`${u} − ${k}`, answer:`${u} = ${value+k}°`});
    }
    [2,3,4,5,6].forEach(k=>{ if(value%k===0 && value/k>=2) forms.push({display:`${k}${u}`, answer:`${u} = ${value/k}°`}); });
    if(!forms.length){ return {display:u, answer:`${u} = ${value}°`, value}; }
    return {...choice(forms), value};
  }
  function pointFromAngle(cx,cy,a,len){const r=degToRad(a);return{x:cx+Math.cos(r)*len,y:cy-Math.sin(r)*len}}
  function svgEl(name,attrs={},children=[]){const el=document.createElementNS(SVG_NS,name);for(const[k,v]of Object.entries(attrs))el.setAttribute(k,String(v));for(const c of children)el.appendChild(c);return el}
  function makeSvg(){return svgEl('svg',{class:'angleViz',viewBox:`0 0 ${VIEW.w} ${VIEW.h}`,preserveAspectRatio:'xMidYMid meet'})}
  function describeArc(cx,cy,r,a,b){const st=pointFromAngle(cx,cy,a,r), en=pointFromAngle(cx,cy,b,r);let sw=positiveSweep(a,b);while(sw>360)sw-=360;return`M ${st.x.toFixed(2)} ${st.y.toFixed(2)} A ${r} ${r} 0 ${sw>180?1:0} 0 ${en.x.toFixed(2)} ${en.y.toFixed(2)}`}
  function drawRay(svg,cx,cy,a,len=145,cls='ray'){const p=pointFromAngle(cx,cy,a,len);svg.appendChild(svgEl('line',{class:cls,x1:cx,y1:cy,x2:p.x,y2:p.y}));return p}
  function drawLine(svg,x1,y1,x2,y2,cls='ray'){svg.appendChild(svgEl('line',{class:cls,x1,y1,x2,y2}))}
  
  function arcArrowClass(className){
    if(String(className).includes('green')) return 'arcArrow green';
    if(String(className).includes('orange')) return 'arcArrow orange';
    return 'arcArrow';
  }
  function arcArrowSize(radius,startAngle,endAngle){
    // Scales arrowheads to the arc length so short arcs still show a clear curve.
    const sweep=positiveSweep(startAngle,endAngle);
    const arcLength=radius*degToRad(sweep);
    const length=Math.max(4.4,Math.min(11.5,arcLength*.16));
    const halfWidth=Math.max(2.7,Math.min(6.8,length*.58));
    return{length,halfWidth};
  }
  function drawArcArrowHead(svg,cx,cy,angleDeg,sweepDirection=1,radius=48,className='arc',size={length:8,halfWidth:4.5}){
    // Tip sits exactly on the arc endpoint; base is tangent to the curve.
    const p=pointFromAngle(cx,cy,angleDeg,radius);
    const tangentDeg=angleDeg+(sweepDirection>=0?90:-90);
    const back=pointFromAngle(p.x,p.y,tangentDeg+180,size.length);
    const left=pointFromAngle(back.x,back.y,tangentDeg+90,size.halfWidth);
    const right=pointFromAngle(back.x,back.y,tangentDeg-90,size.halfWidth);
    svg.appendChild(svgEl('polygon',{class:arcArrowClass(className),points:`${p.x.toFixed(2)},${p.y.toFixed(2)} ${left.x.toFixed(2)},${left.y.toFixed(2)} ${right.x.toFixed(2)},${right.y.toFixed(2)}`}));
  }
  function drawAngleArc(svg,cx,cy,a,b,r=48,cls='arc'){
    if(!toggleAngleArcs.checked)return;
    svg.appendChild(svgEl('path',{class:cls,d:describeArc(cx,cy,r,a,b)}));
    const size=arcArrowSize(r,a,b);
    drawArcArrowHead(svg,cx,cy,a,-1,r,cls,size);
    drawArcArrowHead(svg,cx,cy,b,1,r,cls,size);
  }
  function drawLabel(svg,text,x,y,cls='pointLabel'){const t=svgEl('text',{class:cls,x:Number(x).toFixed(1),y:Number(y).toFixed(1)});t.textContent=text;svg.appendChild(t)}
  function drawPointLabel(svg,text,x,y){if(togglePointLabels.checked)drawLabel(svg,text,x,y,'pointLabel')}
  function drawLabelNearRay(svg,text,cx,cy,a,d=160,offsetY=0){const p=pointFromAngle(cx,cy,a,d);drawPointLabel(svg,text,p.x,p.y+offsetY)}
  function isEquationLabel(text){return /[+−-]|^\d/.test(String(text));}
  function drawAngleLabel(svg,text,cx,cy,a,b,d=78){const mid=a+positiveSweep(a,b)/2,p=pointFromAngle(cx,cy,mid,d);drawLabel(svg,text,p.x,p.y,'angleLabel'+(isEquationLabel(text)?' equationAngleLabel':''))}
  function drawVertex(svg,cx,cy){svg.appendChild(svgEl('circle',{class:'vertexDot',cx,cy,r:4}))}
  function drawRightAngleMarker(svg,cx,cy,a,b,size=24){if(!toggleAngleArcs.checked)return;const p1=pointFromAngle(cx,cy,a,size),p2=pointFromAngle(cx,cy,b,size);const corner={x:p1.x+Math.cos(degToRad(b))*size,y:p1.y-Math.sin(degToRad(b))*size};svg.appendChild(svgEl('polyline',{class:'rightMarker',points:`${p1.x},${p1.y} ${corner.x},${corner.y} ${p2.x},${p2.y}`}))}
  function drawParallelMarker(svg,x,y,a=0,size=16){const r=degToRad(a),ux=Math.cos(r),uy=-Math.sin(r),nx=-Math.sin(r),ny=-Math.cos(r),back=size*.72,spread=size*.48;const tip={x:x+ux*back,y:y+uy*back},bc={x:x-ux*back,y:y-uy*back},arm1={x:bc.x+nx*spread,y:bc.y+ny*spread},arm2={x:bc.x-nx*spread,y:bc.y-ny*spread};drawLine(svg,arm1.x,arm1.y,tip.x,tip.y,'parallelMarker');drawLine(svg,arm2.x,arm2.y,tip.x,tip.y,'parallelMarker')}

  function qStraight(){const known=randInt(35,145),missing=180-known,u=makeUnknown(missing);return{type:'straight',prompt:'Find the missing angle.',answer:u.answer,unknown:u.display,known,missing}}
  function drawStraight(q){const svg=makeSvg(),cx=210,cy=160,divider=q.known;drawRay(svg,cx,cy,180,170);drawRay(svg,cx,cy,0,170);drawRay(svg,cx,cy,divider,120);drawAngleArc(svg,cx,cy,divider,180,52,'arc green');drawAngleArc(svg,cx,cy,0,divider,52,'arc');drawAngleLabel(svg,`${q.known}°`,cx,cy,divider,180,83);drawAngleLabel(svg,q.unknown,cx,cy,0,divider,72);drawVertex(svg,cx,cy);drawLabelNearRay(svg,'A',cx,cy,180,185);drawPointLabel(svg,'B',cx-2,cy+25);drawLabelNearRay(svg,'C',cx,cy,0,185);drawLabelNearRay(svg,'D',cx,cy,divider,135);return svg}
  function qRight(){const known=randInt(20,70),missing=90-known,u=makeUnknown(missing);return{type:'right',prompt:'Find the missing angle.',answer:u.answer,unknown:u.display,known,missing}}
  function drawRight(q){const svg=makeSvg(),cx=180,cy=175,divider=q.known;drawRay(svg,cx,cy,0,165);drawRay(svg,cx,cy,90,125);drawRay(svg,cx,cy,divider,120);drawRightAngleMarker(svg,cx,cy,0,90,22);drawAngleArc(svg,cx,cy,divider,90,52,'arc green');drawAngleArc(svg,cx,cy,0,divider,52,'arc');drawAngleLabel(svg,`${90-q.known}°`,cx,cy,divider,90,83);drawAngleLabel(svg,q.unknown,cx,cy,0,divider,72);drawVertex(svg,cx,cy);drawPointLabel(svg,'B',cx-10,cy+25);drawLabelNearRay(svg,'A',cx,cy,90,145);drawLabelNearRay(svg,'C',cx,cy,0,180);drawLabelNearRay(svg,'D',cx,cy,divider,135);return svg}
  function qPoint(){const n=choice([2,3,4]),start=randInt(0,35);let parts=[];if(n===2){const a=randInt(70,170);parts=[a,360-a]}else if(n===3){let a,b,m;do{a=randInt(45,130);b=randInt(45,130);m=360-a-b}while(m<55||m>180);parts=[a,b,m]}else{let a,b,c,m;do{a=randInt(45,105);b=randInt(45,105);c=randInt(45,105);m=360-a-b-c}while(m<55||m>140);parts=[a,b,c,m]}const missing=parts[parts.length-1],u=makeUnknown(missing);const bounds=[start];parts.forEach(p=>bounds.push(bounds[bounds.length-1]+p));return{type:'point',prompt:'Find the missing angle.',answer:u.answer,unknown:u.display,parts,bounds,n}}
  function drawPoint(q){const svg=makeSvg(),cx=210,cy=135,classes=['arc','arc green','arc orange','arc'];const rays=q.bounds.slice(0,-1);rays.forEach(a=>drawRay(svg,cx,cy,a,125));for(let i=0;i<q.parts.length;i++){drawAngleArc(svg,cx,cy,q.bounds[i],q.bounds[i+1],54,classes[i%classes.length]);drawAngleLabel(svg,i===q.parts.length-1?q.unknown:`${q.parts[i]}°`,cx,cy,q.bounds[i],q.bounds[i+1],i===q.parts.length-1?90:84)}drawVertex(svg,cx,cy);['A','B','C','D'].forEach((l,i)=>{if(rays[i]!=null)drawLabelNearRay(svg,l,cx,cy,rays[i],145)});drawPointLabel(svg,'O',cx+17,cy+18);return svg}
  function qVertical(){const acute=randInt(35,145),u=makeUnknown(acute);return{type:'vertical',prompt:'Find the missing angle.',answer:u.answer,unknown:u.display,known:acute}}
  function drawVertical(q){const svg=makeSvg(),cx=210,cy=135,a=randInt(15,55);drawRay(svg,cx,cy,a,150);drawRay(svg,cx,cy,a+180,150);drawRay(svg,cx,cy,180-a,150);drawRay(svg,cx,cy,360-a,150);drawAngleArc(svg,cx,cy,a,180-a,48,'arc');drawAngleArc(svg,cx,cy,a+180,360-a,48,'arc green');drawAngleLabel(svg,`${q.known}°`,cx,cy,a,180-a,78);drawAngleLabel(svg,q.unknown,cx,cy,a+180,360-a,78);drawVertex(svg,cx,cy);drawLabelNearRay(svg,'A',cx,cy,a,165);drawLabelNearRay(svg,'B',cx,cy,180-a,165);drawLabelNearRay(svg,'C',cx,cy,a+180,165);drawLabelNearRay(svg,'D',cx,cy,360-a,165);return svg}

  function qParallel(kind='mixed'){
    const relationship=kind==='mixed'?choice(['corresponding','alternate interior','co-interior']):kind;
    const xL=55,xR=365,y1=76,y2=184,acute=randInt(25,65),slopeRight=Math.random()<.5,lineAngle=slopeRight?acute:180-acute,dy=y2-y1,xStep=dy/Math.tan(degToRad(acute));
    let topX,botX;
    if(slopeRight){topX=randInt(Math.ceil(xL+85+xStep),xR-85);botX=topX-xStep}else{topX=randInt(xL+85,Math.floor(xR-85-xStep));botX=topX+xStep}
    function val(pos){return (pos==='above-left'||pos==='below-right') ? (slopeRight?180-acute:acute) : (slopeRight?acute:180-acute)}
    let kp,up,known,missing;
    if(relationship==='corresponding'){
      [kp,up]=choice([['above-right','above-right'],['above-left','above-left'],['below-right','below-right'],['below-left','below-left']]); known=val(kp); missing=known;
    }else if(relationship==='alternate interior'){
      [kp,up]=choice(slopeRight?[['below-right','above-left'],['below-left','above-right']]:[['below-left','above-right'],['below-right','above-left']]); known=val(kp); missing=known;
    }else{
      [kp,up]=choice([['below-left','above-left'],['below-right','above-right']]); known=val(kp); missing=180-known;
    }
    const u=makeUnknown(missing);
    return{type:'parallel',prompt:'Find the missing angle.',relationship,unknown:u.display,answer:u.answer,known,missing,acute,slopeRight,lineAngle,xL,xR,y1,y2,top:{x:topX,y:y1},bot:{x:botX,y:y2},knownPosition:kp,unknownPosition:up};
  }
  function drawParallel(q){const svg=makeSvg(),xL=q.xL,xR=q.xR,y1=q.y1,y2=q.y2,acute=q.acute,slopeRight=q.slopeRight,lineAngle=q.lineAngle,top=q.top,bot=q.bot;drawLine(svg,xL,y1,xR,y1);drawLine(svg,xL,y2,xR,y2);drawParallelMarker(svg,285,y1,0,16);drawParallelMarker(svg,285,y2,0,16);const transA=pointFromAngle(top.x,top.y,lineAngle,125),transB=pointFromAngle(bot.x,bot.y,lineAngle+180,125);drawLine(svg,transB.x,transB.y,transA.x,transA.y);
    function angleData(pos){if(slopeRight){if(pos==='above-right')return{start:0,end:acute};if(pos==='above-left')return{start:acute,end:180};if(pos==='below-left')return{start:180,end:180+acute};if(pos==='below-right')return{start:180+acute,end:360}}else{if(pos==='above-left')return{start:180-acute,end:180};if(pos==='above-right')return{start:0,end:180-acute};if(pos==='below-right')return{start:360-acute,end:360};if(pos==='below-left')return{start:180,end:360-acute}}return{start:0,end:acute}}
    function mark(at,pos,text,cls,dist=64){const d=angleData(pos);drawAngleArc(svg,at.x,at.y,d.start,d.end,36,cls);drawAngleLabel(svg,text,at.x,at.y,d.start,d.end,dist)}
    // Co-interior + equation labels are the most crowded because both labels sit between the two parallel lines.
    // Keep both labels close to their own vertex rather than pushing them into the middle strip.
    const coIntEq = q.relationship==='co-interior' && isEquationLabel(q.unknown);
    if(coIntEq){
      mark(top,q.knownPosition,`${q.known}°`,'arc',40);
      mark(bot,q.unknownPosition,q.unknown,'arc green',40);
    }else{
      mark(top,q.knownPosition,`${q.known}°`,'arc',62);
      mark(bot,q.unknownPosition,q.unknown,'arc green',64);
    }
    drawVertex(svg,top.x,top.y);drawVertex(svg,bot.x,bot.y);return svg}

  const FRIENDLY_PROTRACTOR=[20,25,30,35,40,45,50,55,60,65,70,75,80,85,95,100,105,110,115,120,125,130,135,140,145,150,155,160];
  function qProtractor(){const side=choice(['left','right']),angle=choice(FRIENDLY_PROTRACTOR);return{type:'protractor',prompt:'What is the size of the angle?',answer:`${angle}°`,angle,side,reflex:false}}
  function qProtractorReflex(){const side=choice(['left','right']),small=choice(FRIENDLY_PROTRACTOR),angle=360-small;return{type:'protractor',prompt:'What is the size of the reflex angle?',answer:`${angle}°`,angle,smallAngle:small,side,reflex:true}}
  function drawProtractor(q){const svg=makeSvg(),cx=210,cy=205,R=154,inner=55,bandIn=88,bandOut=128;function lineBetween(a,r1,r2,cls='protLine'){const p1=pointFromAngle(cx,cy,a,r1),p2=pointFromAngle(cx,cy,a,r2);drawLine(svg,p1.x,p1.y,p2.x,p2.y,cls)}function arc(r,cls='protArc'){svg.appendChild(svgEl('path',{class:cls,d:describeArc(cx,cy,r,0,180)}))}arc(R);arc(138);arc(108);arc(inner);drawLine(svg,cx-R,cy,cx+R,cy,'protArc');for(let a=0;a<=180;a+=5){const major=a%10===0;lineBetween(a,major?R-15:R-9,R,major?'protTickMajor':'protTickMinor');if(a%10===0)lineBetween(a,inner,bandIn,'protLine')}svg.appendChild(svgEl('path',{d:`${describeArc(cx,cy,bandOut,0,180)} L ${pointFromAngle(cx,cy,180,bandIn).x} ${pointFromAngle(cx,cy,180,bandIn).y} ${describeArc(cx,cy,bandIn,180,0)} Z`,fill:'#fff'}));arc(bandOut);arc(bandIn);for(let a=0;a<=180;a+=10){const pOuter=pointFromAngle(cx,cy,a,118),pInner=pointFromAngle(cx,cy,a,96),outerVal=a,innerVal=180-a;const t1=svgEl('text',{class:'protNumber'+(a===90?' big':''),x:pOuter.x,y:pOuter.y,transform:`rotate(${90-a} ${pOuter.x} ${pOuter.y})`});t1.textContent=String(outerVal);svg.appendChild(t1);const t2=svgEl('text',{class:'protNumber',x:pInner.x,y:pInner.y,transform:`rotate(${90-a} ${pInner.x} ${pInner.y})`});t2.textContent=String(innerVal);svg.appendChild(t2)}const small=q.reflex?(q.smallAngle||360-q.angle):q.angle;const baseAngle=q.side==='left'?180:0;const rayAngle=q.side==='left'?180-small:small;drawRay(svg,cx,cy,baseAngle,155,'arc');drawRay(svg,cx,cy,rayAngle,155,'arc');if(q.reflex){
    if(q.side==='left') drawAngleArc(svg,cx,cy,baseAngle,rayAngle+360,50,'arc');
    else drawAngleArc(svg,cx,cy,rayAngle,360,50,'arc');
  }else{
    if(q.side==='left') drawAngleArc(svg,cx,cy,rayAngle,baseAngle,62,'arc');
    else drawAngleArc(svg,cx,cy,baseAngle,rayAngle,62,'arc');
  }drawVertex(svg,cx,cy);drawPointLabel(svg,'O',cx,cy+22);drawLabelNearRay(svg,'A',cx,cy,baseAngle,170,7);drawLabelNearRay(svg,'B',cx,cy,rayAngle,170);return svg}

  const DRAW={straight:drawStraight,right:drawRight,point:drawPoint,vertical:drawVertical,protractor:drawProtractor,parallel:drawParallel};
  const GEN={straight:qStraight,right:qRight,point:qPoint,vertical:qVertical,protractor:qProtractor,protractorReflex:qProtractorReflex,mixedBasic:()=>choice([qStraight,qRight,qPoint,qVertical])(),parallelCorresponding:()=>qParallel('corresponding'),parallelAlternate:()=>qParallel('alternate interior'),parallelCointerior:()=>qParallel('co-interior'),parallelMixed:()=>qParallel('mixed')};
  function renderCheckboxes(){chkWrap.innerHTML='';TYPE_SETS[levelSel.value].forEach(([id,label,on])=>{const lab=document.createElement('label');lab.className='chk';lab.innerHTML=`<input type="checkbox" id="chk_${id}" checked> ${label}`;chkWrap.appendChild(lab)});updateRequireEquationsVisibility();updateSelectBtn()}
  function activeIds(){return TYPE_SETS[levelSel.value].map(x=>x[0]).filter(id=>document.getElementById(`chk_${id}`)?.checked)}
  function updateSelectBtn(){const boxes=[...chkWrap.querySelectorAll('input[type="checkbox"]')];selectBtn.textContent=boxes.some(b=>b.checked)?'Deselect all':'Select all'}
  function updateRequireEquationsVisibility(){if(!requireEqWrap)return;const expected=levelSel.value==='expected';requireEqWrap.style.display=expected?'inline-flex':'none';if(!expected&&toggleRequireEquations)toggleRequireEquations.checked=false}
  function pageHeaderHTML(levelName,pageLabel,showNameDate){const L=currentLang();const isRtl=L.dir==='rtl';const title=languageSel.value==='en'?`Angle Relationships — Worksheet (${levelName})`:`${isRtl?'روابط زاویه‌ای':'Angle Relationships'} — ${L.worksheet} (${levelName})<br><span style="font-size:.82em;color:var(--muted)">Angle Relationships — Worksheet (${levelName})</span>`;return `<div class="pageHeader"><div><div class="hdrTitle" ${isRtl?'dir="rtl"':''}>${title}</div><div class="hdrSub">${pageLabel}</div></div>${showNameDate?`<div class="nameDate"><div class="lineField"><div class="lineLabel">${L.name}${languageSel.value==='en'?'':`<br><span style="font-size:.82em">Name</span>`}</div><div class="lineBox"></div></div><div class="lineField"><div class="lineLabel">${L.date}${languageSel.value==='en'?'':`<br><span style="font-size:.82em">Date</span>`}</div><div class="lineBox"></div></div></div>`:''}</div>`}
  function pageFooterHTML(){return `<div class="pageFooter">This tool and more can be found at <a href="${SITE}">www.millsmathstools.au</a></div>`}
  function makeQuestionCard(q,showAnswer,idx){const wrap=document.createElement('div');wrap.className='qCard';const actualType=q.type==='parallel'?'parallel':q.type;const prompt=document.createElement('div');prompt.className='prompt';prompt.innerHTML=`<div class="promptSmall ${currentLang().dir==='rtl'?'rtlPrompt':''}">${promptHTML(q,idx)}</div><div class="expr"></div>`;wrap.appendChild(prompt);const viz=document.createElement('div');viz.className='vizWrap';viz.appendChild(DRAW[actualType](q));wrap.appendChild(viz);const ans=document.createElement('div');ans.className='ansRow';ans.innerHTML=`<div class="ansLabel">${answerLabelHTML()}</div><div class="ansBox ${showAnswer?'key':''}">${showAnswer?q.answer:''}</div>`;wrap.appendChild(ans);return wrap}
  function buildPages(qs,titleLabel,showAnswers){const per=12,total=Math.ceil(qs.length/per),pages=[];for(let p=0;p<total;p++){const page=document.createElement('div');page.className='page'+(currentLang().dir==='rtl'?' lang-rtl':'')+(showAnswers?' answerKeyPage':'');const titleText=showAnswers?'Answer key':'Worksheet';const pageLabel=languageSel.value==='en'?`${titleText} — Page ${p+1} of ${total}`:`${headerLabel(titleText)} — ${currentLang().page} ${p+1} / ${total}`;page.innerHTML=pageHeaderHTML(levelSel.value==='basic'?'Basic':'Expected',pageLabel,!showAnswers);const grid=document.createElement('div');grid.className='grid threeCol rows-4';qs.slice(p*per,p*per+per).forEach((q,i)=>grid.appendChild(makeQuestionCard(q,showAnswers,p*per+i+1)));page.appendChild(grid);const footer=document.createElement('div');footer.innerHTML=pageFooterHTML();page.appendChild(footer.firstElementChild);pages.push(page)}return pages}
  function generate(){out.innerHTML='';let ids=activeIds();if(!ids.length){out.innerHTML=`<div style="padding:12px;font-weight:950;color:#991b1b">${currentLang().noTypes}</div>`;return}let n=Math.max(1,Math.min(48,Math.round(Number(countInp.value)||12)));countInp.value=String(n);const qs=[];let safety=0;while(qs.length<n&&safety<5000){safety++;const id=choice(ids),q=GEN[id]();q.sourceType=id;qs.push(q)}buildPages(qs,'Worksheet',false).forEach(p=>out.appendChild(p));buildPages(qs,'Answer key',true).forEach(p=>out.appendChild(p));out.firstElementChild?.scrollIntoView({behavior:'smooth',block:'start'})}
  function resetAll(){out.innerHTML='';levelSel.value='basic';countInp.value='12';togglePointLabels.checked=true;toggleAngleArcs.checked=true;toggleGreek.checked=true;if(toggleRequireEquations)toggleRequireEquations.checked=false;renderCheckboxes()}
  levelSel.addEventListener('change',()=>{out.innerHTML='';countInp.value='12';renderCheckboxes()});languageSel.addEventListener('change',()=>{if(out.children.length)generate()});chkWrap.addEventListener('change',updateSelectBtn);selectBtn.addEventListener('click',e=>{e.preventDefault();const boxes=[...chkWrap.querySelectorAll('input[type="checkbox"]')],any=boxes.some(b=>b.checked);boxes.forEach(b=>b.checked=!any);updateSelectBtn()});genBtn.addEventListener('click',generate);printBtn.addEventListener('click',()=>window.print());resetBtn.addEventListener('click',resetAll);[togglePointLabels,toggleAngleArcs,toggleGreek,toggleRequireEquations].forEach(el=>el&&el.addEventListener('change',()=>{if(out.children.length)generate()}));renderCheckboxes();
})();
</script>
