  function canonical(s){return String(s).toLowerCase().trim().replace(/[тИТтАУтАФ]/g,'-').replace(/[├Ч┬╖]/g,'*').replace(/├╖/g,'/').replace(/[┬▓]/g,'^2').replace(/\s+/g,'').replace(/\*/g,'').replace(/\{/g,'(').replace(/\}/g,')').replace(/\[/g,'(').replace(/\]/g,')').replace(/тИТ/g,'-')}

  function answerOK(input,q){const raw=String(input||'');if(!raw.trim())return false;const a=canonical(raw),targets=[q.answerText,...(q.alts||[])].map(canonical);
    if(targets.includes(a))return true;

    const af=normalizeFractionText(raw),tf=normalizeFractionText(q.answerText); if(af===tf)return true;

    if(targets.some(t=>t.replace(/^1([a-z])/,'$1')===a.replace(/^1([a-z])/,'$1')))return true;

  function parseSimpleFactorisation(input,v){

    if(!m)return null;
    const outside=Number(m[1]);
    let innerCoeff=m[2];
    if(innerCoeff===''||innerCoeff==='+')innerCoeff=1;
    else if(innerCoeff==='-')innerCoeff=-1;
    else innerCoeff=Number(innerCoeff);
    const innerConst=Number(m[3]);
    if(!Number.isFinite(outside)||!Number.isFinite(innerCoeff)||!Number.isFinite(innerConst))return null;

  function parseLinearFactorisation(input){
    const s=canonical(input).replace(/\*/g,'');
    const m=s.match(/^(-?\d+)\((.+)\)$/);
    if(!m)return null;

      if(!Number.isFinite(coeff))return null;

    const vals=showAnswers?q.tableVals.map(v=>fmtInt(v)):q.tableNs.map(()=>'<span class="blank"></span>');
    return `<table class="tableMini"><tr><th><span class="var">n</span></th>${q.tableNs.map(n=>`<th>${n}</th>`).join('')}</tr><tr><th>${tr('value')}</th>${vals.map(v=>`<td>${v}</td>`).join('')}</tr></table>`;
  }
  function makeCard(q,idx,showAnswers){
    const card=document.createElement('div');card.className='qCard';
    const top=document.createElement('div');top.className='qTop';
    const num=document.createElement('div');num.className='qNum';num.textContent=`Q${idx}`;
    const text=document.createElement('div');text.className='qText';text.innerHTML=makePromptHTML(q);
    top.append(num,text);card.appendChild(top);
    if(q.mode==='table'){card.insertAdjacentHTML('beforeend',tableHTML(q,showAnswers)); if(showAnswers){const wb=document.createElement('div');wb.className='workBox key';wb.innerHTML=q.answerHTML;card.appendChild(wb);} else {const wb=document.createElement('div');wb.className='workBox';card.appendChild(wb);} return card;}
    const wb=document.createElement('div');wb.className='workBox'+(showAnswers?' key':'');wb.innerHTML=showAnswers?`<span class="math">${q.answerHTML}</span>`:'';card.appendChild(wb);return card;
  }
  function makePage(title,pageIdx,pageCount,langClass){
    const page=document.createElement('div');page.className=`page ${langClass}`;
    const border=document.createElement('img');border.className='pageBorder';border.alt='';border.src=CONFIG.borderSrc;page.appendChild(border);
    const inner=document.createElement('div');inner.className='pageInner';const cont=document.createElement('div');cont.className='pageContent';
    const hdr=document.createElement('div');hdr.className='pageHeader';
    const left=document.createElement('div');left.className='hdrLeft';left.innerHTML=`<div class="hdrTitle">${title}</div><div class="hdrSub">${levelTitle()} ┬╖ ${ui('page')} ${pageIdx} / ${pageCount}</div>`;
    const name=document.createElement('div');name.className='nameRow';['name','className','date'].forEach(k=>{const f=document.createElement('div');f.className='lineField';f.innerHTML=`<div class="lineLabel">${ui(k)}</div><div class="lineBox"></div>`;name.appendChild(f);});
    hdr.append(left,name);cont.appendChild(hdr);const grid=document.createElement('div');grid.className='grid';cont.appendChild(grid);inner.appendChild(cont);page.appendChild(inner);return {page,grid};
  }
  function render(qs,showAnswers=false){const totalPages=Math.ceil(qs.length/CONFIG.perPage);const langClass=(I18N[state.language]?.dir)==='rtl'?'lang-rtl':'';for(let p=0;p<totalPages;p++){const title=showAnswers?ui('answerKeyTitle'):ui('pageTitle');const pg=makePage(title,p+1,totalPages,langClass);qs.slice(p*CONFIG.perPage,(p+1)*CONFIG.perPage).forEach((q,i)=>pg.grid.appendChild(makeCard(q,p*CONFIG.perPage+i+1,showAnswers)));out.appendChild(pg.page);}}
  function generate(){warn.classList.remove('show');out.innerHTML='';const ids=activeTypes();if(!ids.length){warn.textContent=ui('noTypes');warn.classList.add('show');return;}let n=Number(countInp.value||CONFIG.defaultCount);n=clamp(Math.round(n),CONFIG.minCount,CONFIG.maxCount);countInp.value=String(n);reseed();const qs=genQuestions(currentLevel(),n,ids);render(qs,false);render(qs,true);}
  genBtn.addEventListener('click',generate);printBtn.addEventListener('click',()=>window.print());resetBtn.addEventListener('click',()=>{countInp.value=CONFIG.defaultCount;levelSel.value='basic';state.language='en';languageSel.value='en';renderChecks();translateUI();out.innerHTML='';generate();});
  levelSel.addEventListener('change',()=>{renderChecks();out.innerHTML='';generate();});languageSel.addEventListener('change',()=>{state.language=languageSel.value;renderChecks();translateUI();out.innerHTML='';generate();});toggleAllBtn.addEventListener('click',()=>{const boxes=[...chkWrap.querySelectorAll('input[type=checkbox]')];const all=boxes.length&&boxes.every(b=>b.checked);boxes.forEach(b=>b.checked=!all);updateToggleAll();});chkWrap.addEventListener('change',updateToggleAll);
  document.title=CONFIG.title;renderChecks();translateUI();generate();
})();
</script>
</body>
