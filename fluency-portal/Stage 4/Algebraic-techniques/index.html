<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MMT Worksheet Generator — Algebraic Techniques</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --ink:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --shadow: 0 14px 40px rgba(0,0,0,.10);
      --radius: 18px;
      --ok:#16a34a;

      --footer-h: 44px;
      --pagePad: 12mm;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      color: var(--ink);
      padding-bottom: var(--footer-h);
    }

    .wrap{ max-width: 1100px; margin: 18px auto 40px; padding: 0 16px; }
    .panel{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    /* Controls */
    .controls{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 14px;
      flex-wrap:wrap;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg,#ffffff,#f9fafb);
    }

    label{
      display:block;
      font-weight: 950;
      color: var(--ink);
      margin: 0 0 8px;
      font-size: 13px;
    }

    select, input[type="number"]{
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 950;
      font-size: 16px;
      background:#fff;
      min-width: 320px;
      outline:none;
    }
    input[type="number"]{ min-width: 220px; }


    .topSelectors{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 14px;
      flex-wrap:wrap;
      width:100%;
    }
    .outcomeControl{ flex: 1 1 360px; min-width: 320px; }
    .outcomeControl select{ width:100%; }
    .languageControl{
      flex: 0 1 320px;
      min-width: 240px;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
    }
    .languageControl select{ min-width: 240px; width:100%; }
    .languageControl label{ text-align:right; }

    .checks{
      display:flex;
      gap: 12px 14px;
      flex-wrap:wrap;
      align-items:center;
      padding: 6px 0 0;
    }

    .checksHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      width:100%;
      margin-bottom: 2px;
    }

    .checksTitle{
      margin:0;
      font-size:13px;
      font-weight:950;
      color:var(--muted);
    }

    .miniBtn{
      border:none;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 950;
      cursor:pointer;
      background:#eef2ff;
      color:#1d4ed8;
      font-size: 12px;
      line-height:1;
      box-shadow: 0 8px 18px rgba(0,0,0,.04);
    }
    .miniBtn:active{ transform: scale(.98); }

    .chk{
      display:flex;
      gap: 10px;
      align-items:center;
      border: 1px solid rgba(229,231,235,.95);
      background:#fff;
      border-radius: 999px;
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgba(0,0,0,.04);
      user-select:none;
    }
    .chk input{ width: 18px; height: 18px; }
    .chk span{
      font-weight: 950;
      font-size: 13px;
      color:#111827;
      white-space: nowrap;
    }

    .btnRow{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    button{
      border:none;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 1000;
      cursor:pointer;
      background:#f3f4f6;
      color:#111827;
      transition: transform .04s ease, filter .15s ease, opacity .2s ease;
      user-select:none;
      font-size: 16px;
    }
    button:active{ transform: scale(.98); }
    button.primary{ background:#2563eb; color:#fff; }
    button.ghost{ background:#eef2ff; color:#1d4ed8; }
    button.danger{ background:#fee2e2; color:#991b1b; }

    .outWrap{ margin-top: 16px; }

    /* Pages */
    .page{
      margin-top: 16px;
      background:#fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(15,23,42,.08);
      overflow:hidden;
      position: relative;
    }

    .pageBorder{
      position:absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events:none;
      opacity: 1;
    }

    .pageInner{
      position: relative;
      z-index: 1;
      padding: 0;
    }

    .pageContent{
      margin: var(--pagePad);
      background:#fff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 0 0 1px rgba(229,231,235,.9) inset;
    }

    .pageHeader{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }

    .hdrLeft{ min-width: 240px; }
    .hdrTitle{
      font-weight: 1000;
      font-size: 18px;
      line-height: 1.15;
      margin-bottom: 2px;
    }
    .hdrSub{
      color: var(--muted);
      font-weight: 900;
      font-size: 12px;
      line-height: 1.2;
    }

    .nameRow{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items:end;
      min-width: min(420px, 100%);
    }
    .lineField{ display:flex; flex-direction:column; gap: 6px; min-width: 0; }
    .lineLabel{ font-size: 12px; font-weight: 950; color: var(--muted); }
    .lineBox{
      height: 30px;
      border: 2px solid #111827;
      border-radius: 10px;
      background:#fff;
      width: 100%;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 16px;
      margin-top: 10px;
    }

    .qCard{
      border: 1px solid rgba(229,231,235,.95);
      border-radius: 16px;
      padding: 12px 12px 12px;
      background:#fff;
      min-height: 190px;
      display:flex;
      flex-direction:column;
      gap: 8px;
    }

    .qTop{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      gap: 12px;
    }
    .qNum{
      font-weight: 1000;
      font-size: 18px;
      min-width: 44px;
      color:#111827;
    }
    .qText{
      font-weight: 1000;
      font-size: 16px;
      line-height: 1.15;
      color:#111827;
    }

    /* Like-terms layout: prompt on one line, expression on its own line */
    .qText.splitExpr{ display:block; }
    .qText .qPrompt{ display:block; font-weight: 1000; }
    .qText .qExprLine{
      display:block;
      margin-top: 6px;
      font-weight: 1000;
      text-align: center;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.15;
    }

    .qText.tablePrompt{ width:100%; }
    .qText .tableExprLine{
      font-size: 16px;
      margin-top: 7px;
      width: 100%;
      text-align: center;
      white-space: normal;
    }


    .biEnglish{
      display:block;
      margin-top: 3px;
      font-size: .82em;
      line-height: 1.12;
      color: #6b7280;
      font-weight: 850;
      direction: ltr;
      unicode-bidi: isolate;
    }
    .qText .qPrompt .biEnglish{
      margin-top: 2px;
    }
    .smallBi .biEnglish{
      font-size: .78em;
      margin-top: 1px;
    }

    /* Blank gap workspace */
    .workArea{
      margin-top: 2px;
      border: 1px solid rgba(229,231,235,.95);
      border-radius: 16px;
      padding: 10px 10px;
      background: #fff;
      flex: 1;
      min-height: 78px;
    }

    /* Table-only: table is the workspace */
    .workArea.tableOnly{
      border:none;
      padding: 0;
      background: transparent;
      min-height: 0;
    }

    .ansRow{
      margin-top: 6px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap: 10px;
    }
    .ansLabel{
      font-weight: 1000;
      font-size: 14px;
    }
    .ansBox{
      flex: 1;
      min-width: 0;
      height: 34px;
      border: 2px solid #111827;
      border-radius: 12px;
      background:#fff;
    }
    .ansBox.key{
      border-color: var(--ok);
      background: rgba(22,163,74,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 1000;
      color: var(--ok);
      font-size: 16px;
      padding: 0 10px;
      text-align:center;
    }

    /* Math-style variables */
    .var{
      font-family: "Cambria Math","STIX Two Math","Times New Roman",serif;
      font-style: italic;
      font-weight: 650;
    }

    /* Fraction with PRINT-SAFE bar */
    .frac{
      display:inline-flex;
      flex-direction:column;
      align-items:stretch;
      justify-content:center;
      vertical-align:middle;
      line-height:1.05;
      transform: translateY(-1px);
      margin: 0 2px;
      min-width: 42px;
    }
    .frac .top,
    .frac .bottom{
      text-align:center;
      padding: 0 4px;
      white-space: nowrap;
    }
    .frac .bar{
      height: 0;
      border-top: 2px solid #111827;
      margin: 2px 0;
      border-radius: 999px;
    }

    /* Table styling */
    .tinyTbl{
      width:100%;
      border-collapse: collapse;
      font-weight: 950;
      font-size: 14px;
      table-layout: fixed;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(229,231,235,.95) inset;
      background:#fff;
    }
    .tinyTbl td, .tinyTbl th{
      border:1px solid rgba(229,231,235,.95);
      padding: 8px 6px;
      text-align:center;
    }
    .tinyTbl th{
      background:#f9fafb;
      font-weight: 1000;
    }
    .cellBlank{
      height: 34px;
      border-radius: 10px;
      background: #fff;
    }
    .cellKey{
      height: 34px;
      border-radius: 10px;
      background: rgba(22,163,74,.08);
      color: var(--ok);
      font-weight: 1000;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .page.lang-rtl .pageHeader,
    .page.lang-rtl .qTop,
    .page.lang-rtl .ansRow{ direction: rtl; }
    .page.lang-rtl .qText,
    .page.lang-rtl .hdrTitle,
    .page.lang-rtl .hdrSub,
    .page.lang-rtl .lineLabel,
    .page.lang-rtl .ansLabel{ text-align: right; }
    .page.lang-rtl .qNum{ text-align: left; }
    .page.lang-rtl .qText .qExprLine{ text-align:center; direction:ltr; }
    .page.lang-rtl .frac{ direction:ltr; }

    /* Footer */
    .mmtFooter{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: var(--footer-h);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 0 12px;
      background: rgba(255,255,255,.92);
      border-top: 1px solid rgba(229,231,235,.95);
      backdrop-filter: blur(8px);
      z-index: 500;
      font-weight: 900;
      color: #111827;
      text-align:center;
      font-size: 13px;
    }
    .mmtFooter a{ color:#2563eb; text-decoration:none; font-weight: 950; }
    .mmtFooter a:hover{ text-decoration: underline; }

    /* Print */
    @media print{
      @page{ size: A4; margin: 12mm; }

      body{
        background:#fff !important;
        padding:0 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .controls, .mmtFooter{ display:none !important; }
      .wrap{ max-width:none !important; margin:0 !important; padding:0 !important; }

      :root{ --pagePad: 6mm; }

      .page{
        width: 186mm;
        height: 273mm;
        margin: 0 auto;
        border: none;
        box-shadow: none;
        page-break-after: always;
      }
      .page:last-child{ page-break-after: auto; }

      .pageContent{ margin: var(--pagePad); padding: 12px; }
      .pageHeader{ flex-wrap: nowrap !important; gap: 10px !important; }

      .grid{ gap: 12px !important; }
      .qCard{ break-inside: avoid; padding: 12px !important; }

      .frac .bar{ border-top-width: 2px !important; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="panel">
      <div class="controls" aria-label="Worksheet controls">
        <div style="min-width:320px; flex:1 1 560px;">
          <div class="topSelectors">
            <div class="outcomeControl">
              <label for="outcomeSel" data-i18n="stageOutcome">Stage outcome</label>
              <select id="outcomeSel"></select>
            </div>

            <div class="languageControl">
              <label for="languageSel" data-i18n="languageLabel">Worksheet language</label>
              <select id="languageSel">
                <option value="en">English</option>
                <option value="fa">فارسی (Farsi / Persian)</option>
                <option value="ar">العربية (Arabic)</option>
              </select>
            </div>
          </div>

          <div class="checks" aria-label="Question types">
            <div class="checksHeader">
              <label class="checksTitle" data-i18n="questionTypes">Question types (checkboxes)</label>
              <button id="toggleAllBtn" type="button" class="miniBtn">Deselect all</button>
            </div>
            <div id="chkWrap" style="display:flex; gap:12px 14px; flex-wrap:wrap; align-items:center;"></div>
          </div>
        </div>

        <div style="display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap;">
          <div>
            <label for="countInp" data-i18n="totalQuestions">Total questions (multiples of 8 recommended)</label>
            <input id="countInp" type="number" min="8" max="96" step="8" value="16" />
          </div>

          <div class="btnRow">
            <button id="genBtn" class="primary" data-i18n="generateBtn">Generate</button>
            <button id="printBtn" class="ghost" data-i18n="printBtn">Print / Save as PDF</button>
            <button id="resetBtn" class="danger" data-i18n="resetBtn">Reset</button>
          </div>
        </div>
      </div>

      <div id="out" class="outWrap"></div>
    </div>
  </div>

  <div class="mmtFooter">
    This tool and more can be found at&nbsp;
    <a href="https://www.millsmathstools.au">www.millsmathstools.au</a>
  </div>

<script>
(() => {
  // ============================================================
  // CONFIG
  // ============================================================
  const CONFIG = {
    title: "Worksheet Generator — Algebraic Techniques",
    perPage: 8,
    borderSrc: "border_page0.png",
    pageHeaderTitle: "Algebraic Techniques",
    answerKeyTitle: "Answer key",
    outcomes: [
      { value:"s4_de", label:"Stage 4 — Algebraic Techniques (D/E basic)", level:"DE" },
      { value:"s4_c",  label:"Stage 4 — Algebraic Techniques (C expected)", level:"C"  },
    ],
    defaultCount: 16,
    minCount: 8,
    maxCount: 96,
  };


  const I18N = {
    en: {
      dir:'ltr', stageOutcome:'Stage outcome', languageLabel:'Worksheet language', questionTypes:'Question types (checkboxes)', totalQuestions:'Total questions (multiples of 8 recommended)', generateBtn:'Generate', printBtn:'Print / Save as PDF', resetBtn:'Reset', selectAll:'Select all', deselectAll:'Deselect all',
      pageTitle:'Algebraic Techniques', answerKeyTitle:'Answer key', page:'Page', name:'Name', className:'Class', date:'Date', answer:'Answer:', value:'value', noTypes:'Please tick at least one question type.',
      outcomeDE:'Stage 4 — Algebraic Techniques (D/E basic)', outcomeC:'Stage 4 — Algebraic Techniques (C expected)',
      coefficient:'coefficient', pronumeral:'pronumeral', constant:'constant',
      identify:(expr,part)=>`In ${expr}, identify the ${part}.`, rewrite:(expr)=>`Rewrite ${expr} using algebraic notation.`, words:(txt)=>`Write an expression for: “${txt}”.`, evaluate:(expr, vals)=>`Evaluate ${expr} when ${vals}.`, simplify:(expr)=>`Simplify: ${expr}`, expand:(expr)=>`Expand: ${expr}`, factorise:(expr)=>`Factorise: ${expr}`, expandSimplify:(expr)=>`Expand and simplify: ${expr}`, completeTable:(expr)=>`Complete the table for: ${expr}`,
      stems:{ more5:v=>`5 more than ${v}`, inc7:v=>`${v} increased by 7`, less3:v=>`3 less than ${v}`, dec4:v=>`${v} decreased by 4`, twice:v=>`twice ${v}`, thrice:v=>`three times ${v}`, div2:v=>`${v} divided by 2`, half:v=>`half of ${v}`, twicePlus3:v=>`three more than twice ${v}`, threeMinus5:v=>`five less than three times ${v}`, sum7times2:v=>`the sum of ${v} and 7, multiplied by 2`, halfPlus6:v=>`half of (${v} + 6)`, diff10:v=>`the difference between 10 and ${v}`}
    },
    fa: {
      dir:'rtl', stageOutcome:'مرحله / سطح', languageLabel:'زبان برگه', questionTypes:'نوع پرسش‌ها (گزینه‌ها)', totalQuestions:'تعداد کل پرسش‌ها (مضرب‌های ۸ پیشنهاد می‌شود)', generateBtn:'ساخت برگه', printBtn:'چاپ / ذخیره PDF', resetBtn:'بازنشانی', selectAll:'انتخاب همه', deselectAll:'لغو انتخاب همه',
      pageTitle:'تکنیک‌های جبری', answerKeyTitle:'پاسخ‌نامه', page:'صفحه', name:'نام', className:'کلاس', date:'تاریخ', answer:'پاسخ:', value:'مقدار', noTypes:'لطفاً حداقل یک نوع پرسش را انتخاب کنید.',
      outcomeDE:'مرحله ۴ — تکنیک‌های جبری (D/E پایه)', outcomeC:'مرحله ۴ — تکنیک‌های جبری (C مورد انتظار)',
      coefficient:'ضریب', pronumeral:'حرف جبری', constant:'عدد ثابت',
      identify:(expr,part)=>`در ${expr}، ${part} را مشخص کنید.`, rewrite:(expr)=>`${expr} را با نمادگذاری جبری بازنویسی کنید.`, words:(txt)=>`برای عبارت زیر یک عبارت جبری بنویسید: «${txt}».`, evaluate:(expr, vals)=>`${expr} را وقتی ${vals} محاسبه کنید.`, simplify:(expr)=>`ساده کنید: ${expr}`, expand:(expr)=>`بسط دهید: ${expr}`, factorise:(expr)=>`عامل‌گیری کنید: ${expr}`, expandSimplify:(expr)=>`بسط دهید و ساده کنید: ${expr}`, completeTable:(expr)=>`جدول را برای ${expr} کامل کنید`,
      stems:{ more5:v=>`۵ بیشتر از ${v}`, inc7:v=>`${v} به اندازهٔ ۷ افزایش یافته است`, less3:v=>`۳ کمتر از ${v}`, dec4:v=>`${v} به اندازهٔ ۴ کاهش یافته است`, twice:v=>`دو برابر ${v}`, thrice:v=>`سه برابر ${v}`, div2:v=>`${v} تقسیم بر ۲`, half:v=>`نصف ${v}`, twicePlus3:v=>`۳ بیشتر از دو برابر ${v}`, threeMinus5:v=>`۵ کمتر از سه برابر ${v}`, sum7times2:v=>`مجموع ${v} و ۷، ضربدر ۲`, halfPlus6:v=>`نصف (${v} + ۶)`, diff10:v=>`اختلاف بین ۱۰ و ${v}`}
    },
    ar: {
      dir:'rtl', stageOutcome:'المرحلة / المستوى', languageLabel:'لغة ورقة العمل', questionTypes:'أنواع الأسئلة (مربعات اختيار)', totalQuestions:'إجمالي الأسئلة (يُفضّل مضاعفات ٨)', generateBtn:'إنشاء', printBtn:'طباعة / حفظ PDF', resetBtn:'إعادة ضبط', selectAll:'تحديد الكل', deselectAll:'إلغاء تحديد الكل',
      pageTitle:'التقنيات الجبرية', answerKeyTitle:'دليل الإجابات', page:'صفحة', name:'الاسم', className:'الصف', date:'التاريخ', answer:'الإجابة:', value:'القيمة', noTypes:'يرجى اختيار نوع سؤال واحد على الأقل.',
      outcomeDE:'المرحلة ٤ — التقنيات الجبرية (D/E أساسي)', outcomeC:'المرحلة ٤ — التقنيات الجبرية (C المتوقع)',
      coefficient:'المعامل', pronumeral:'المتغير', constant:'الثابت',
      identify:(expr,part)=>`في ${expr}، حدّد ${part}.`, rewrite:(expr)=>`أعد كتابة ${expr} بالصيغة الجبرية.`, words:(txt)=>`اكتب تعبيرًا جبريًا لـ: «${txt}».`, evaluate:(expr, vals)=>`احسب ${expr} عندما ${vals}.`, simplify:(expr)=>`بسّط: ${expr}`, expand:(expr)=>`وسّع: ${expr}`, factorise:(expr)=>`حلّل إلى عوامل: ${expr}`, expandSimplify:(expr)=>`وسّع وبسّط: ${expr}`, completeTable:(expr)=>`أكمل الجدول لـ ${expr}`,
      stems:{ more5:v=>`٥ أكثر من ${v}`, inc7:v=>`${v} زاد بمقدار ٧`, less3:v=>`٣ أقل من ${v}`, dec4:v=>`${v} نقص بمقدار ٤`, twice:v=>`ضعف ${v}`, thrice:v=>`ثلاثة أمثال ${v}`, div2:v=>`${v} مقسوم على ٢`, half:v=>`نصف ${v}`, twicePlus3:v=>`٣ أكثر من ضعف ${v}`, threeMinus5:v=>`٥ أقل من ثلاثة أمثال ${v}`, sum7times2:v=>`مجموع ${v} و٧ مضروب في ٢`, halfPlus6:v=>`نصف (${v} + ٦)`, diff10:v=>`الفرق بين ١٠ و ${v}`}
    }
  };
  function lang(){ return (document.getElementById('languageSel')?.value || 'en'); }
  function L(){ return I18N[lang()] || I18N.en; }
  function tr(key){ return L()[key] ?? I18N.en[key] ?? key; }
  function dir(){ return L().dir || 'ltr'; }
  function valList(pairs){ return pairs.map(([h,v]) => `${h} = ${fmtInt(v)}`).join(lang()==='en' ? ', ' : '، '); }
  function localStem(key, v){ return (L().stems[key] || I18N.en.stems[key])(v); }

  // ============================================================
  // HELPERS
  // ============================================================
  const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  const choice  = (arr) => arr[randInt(0, arr.length-1)];
  const clamp   = (n,a,b) => Math.max(a, Math.min(b, n));
  const shuffle = (arr) => {
    const a = arr.slice();
    for (let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  };
  function stripHTML(html){ return String(html).replace(/<[^>]*>/g,''); }

  // Variables: 30% x, others evenly
  const OTHER_VARS = ["a","b","c","d","e","f","y","p","w","k"];
  function pickVar(){
    if (Math.random() < 0.30) return "x";
    return OTHER_VARS[Math.floor(Math.random() * OTHER_VARS.length)];
  }
  const vHTML = (v) => `<span class="var">${v}</span>`;
  const fmtInt = (n) => (n < 0 ? `−${Math.abs(n)}` : `${n}`);

  function fracHTML(topHTML, bottomHTML){
    return `<span class="frac"><span class="top">${topHTML}</span><span class="bar"></span><span class="bottom">${bottomHTML}</span></span>`;
  }

  function termHTML(coeff, v){
    if (v == null) return String(Math.abs(coeff));
    const abs = Math.abs(coeff);
    if (abs === 1) return vHTML(v);
    return `${abs}${vHTML(v)}`;
  }

  function buildExpressionHTML(terms){
    const parts = [];
    terms.forEach((t, i) => {
      const isNeg = t.coeff < 0;
      const sign = (i === 0) ? (isNeg ? "− " : "") : (isNeg ? " − " : " + ");
      parts.push(sign + (t.v ? termHTML(t.coeff, t.v) : String(Math.abs(t.coeff))));
    });
    return parts.join("");
  }

  function simplifyTerms(terms){
    const map = new Map();
    let csum = 0;
    for (const t of terms){
      if (t.v == null) csum += t.coeff;
      else map.set(t.v, (map.get(t.v)||0) + t.coeff);
    }
    for (const [k,v] of map.entries()){
      if (v === 0) map.delete(k);
    }
    return { map, csum };
  }

  function buildSimplifiedHTML(map, csum){
    const vars = Array.from(map.keys()).sort((a,b)=>a.localeCompare(b));
    const terms = [];
    for (const v of vars) terms.push({ coeff: map.get(v), v });
    if (csum !== 0 || terms.length === 0) terms.push({ coeff: csum, v: null });
    return buildExpressionHTML(terms);
  }

  function productFactorHTML(factor){
    return factor.kind === 'num' ? String(factor.value) : vHTML(factor.value);
  }

  function buildMultiplyingTermsAnswer(factors){
    let numProduct = 1;
    const vars = [];
    for (const f of factors){
      if (f.kind === 'num') numProduct *= f.value;
      else vars.push(f.value);
    }
    vars.sort((a,b)=>a.localeCompare(b));
    const varPart = vars.map(v => vHTML(v)).join('');
    if (!vars.length) return String(numProduct);
    if (numProduct === 1) return varPart;
    return `${numProduct}${varPart}`;
  }

  function gcd(a,b){
    a = Math.abs(a); b = Math.abs(b);
    while (b){ const t = b; b = a % b; a = t; }
    return a || 1;
  }

  function monomialHTML(coeff, vars){
    const sorted = (vars || []).slice().sort((a,b)=>a.localeCompare(b));
    const varPart = sorted.map(v => vHTML(v)).join('');
    if (!sorted.length) return String(coeff);
    if (coeff === 1) return varPart;
    return `${coeff}${varPart}`;
  }

  function biLine(mainHTML, englishHTML){
    if (lang() === 'en') return mainHTML;
    return `${mainHTML}<span class="biEnglish">${englishHTML}</span>`;
  }

  function biLabel(key){
    const main = tr(key);
    const english = I18N.en[key] ?? main;
    return biLine(main, english);
  }

  function biPrompt(fnKey, argsLocal = [], argsEnglish = argsLocal){
    const mainFn = L()[fnKey];
    const englishFn = I18N.en[fnKey];
    const main = typeof mainFn === 'function' ? mainFn(...argsLocal) : String(mainFn ?? '');
    const english = typeof englishFn === 'function' ? englishFn(...argsEnglish) : String(englishFn ?? main);
    return biLine(main, english);
  }

  function makeCardShell(idx1, promptHTML){
    const card = document.createElement('div');
    card.className = 'qCard';

    const top = document.createElement('div');
    top.className = 'qTop';

    const num = document.createElement('div');
    num.className = 'qNum';
    num.textContent = `Q${idx1}`;

    const text = document.createElement('div');
    text.className = 'qText';
    text.innerHTML = promptHTML;

    top.appendChild(num);
    top.appendChild(text);
    card.appendChild(top);

    const work = document.createElement('div');
    work.className = 'workArea';
    card.appendChild(work);

    return card;
  }

  function makeAnswerRowHTML(htmlAnswer, plainFallback, isKey){
    const ansRow = document.createElement('div');
    ansRow.className = 'ansRow';

    const lab = document.createElement('div');
    lab.className = 'ansLabel';
    lab.innerHTML = biLabel('answer');
    if (lang() !== 'en') lab.classList.add('smallBi');

    const box = document.createElement('div');
    box.className = 'ansBox' + (isKey ? ' key' : '');
    if (isKey){
      box.innerHTML = htmlAnswer ?? '';
      if (!box.textContent.trim() && plainFallback) box.textContent = plainFallback;
    } else {
      box.textContent = '';
    }

    ansRow.appendChild(lab);
    ansRow.appendChild(box);
    return ansRow;
  }

  function makeAnswerRowPlain(text, isKey){
    const ansRow = document.createElement('div');
    ansRow.className = 'ansRow';

    const lab = document.createElement('div');
    lab.className = 'ansLabel';
    lab.innerHTML = biLabel('answer');
    if (lang() !== 'en') lab.classList.add('smallBi');

    const box = document.createElement('div');
    box.className = 'ansBox' + (isKey ? ' key' : '');
    box.textContent = isKey ? (text ?? '') : '';

    ansRow.appendChild(lab);
    ansRow.appendChild(box);

    {
      level:"C", id:"simplify_mixed",
      label:"Simplify (collect like terms — mixed order)",
      defaultOn:true,
      gen(){
        // Guarantee: every pronumeral used appears at least twice
        const totalTerms = randInt(2,6);

        // constants 0–2, but must leave >=2 var terms
        let constTerms = randInt(0,2);
        constTerms = Math.min(constTerms, Math.max(0, totalTerms - 2));

        const varTerms = totalTerms - constTerms; // at least 2

        const maxGroups = Math.min(3, Math.floor(varTerms / 2));
        const groupCount = randInt(1, Math.max(1, maxGroups));

        const vars = [];
        while (vars.length < groupCount){
          const v = pickVar();
          if (!vars.includes(v)) vars.push(v);
        }

        // each group starts with 2 terms
        const counts = Array(groupCount).fill(2);
        let remaining = varTerms - (2 * groupCount);
        while (remaining > 0){
          counts[randInt(0, groupCount-1)]++;
          remaining--;
        }

        const terms = [];

        for (let gi=0; gi<groupCount; gi++){
          const v = vars[gi];
          const ct = counts[gi];
          for (let k=0; k<ct; k++){
            const mag = randInt(1,9);
            const sgn = choice([1,-1]);
            terms.push({ coeff: sgn*mag, v });
          }
        }

        for (let k=0; k<constTerms; k++){
          const mag = randInt(1,15);
          const sgn = choice([1,-1]);
          terms.push({ coeff: sgn*mag, v: null });
        }

        const mixed = shuffle(terms);
        const exprHTML = buildExpressionHTML(mixed);
        const { map, csum } = simplifyTerms(mixed);
        const ansHTML = buildSimplifiedHTML(map, csum);

        return { type:this.id, exprHTML, ansHTML };
      },
      key:q => `sm_${stripHTML(q.exprHTML)}`,
      render(q, idx1, showAnswers){
        const promptHTML = `
          <span class="qPrompt">${biLine(lang()==="fa" ? "ساده کنید" : (lang()==="ar" ? "بسّط" : "Simplify"), "Simplify")}</span>
          <span class="qExprLine">${q.exprHTML}</span>
        `;
        const card = makeCardShell(idx1, promptHTML);
        card.querySelector('.qText').classList.add('splitExpr');
        card.appendChild(makeAnswerRowHTML(q.ansHTML, stripHTML(q.ansHTML), showAnswers));
        return card;
      }
    },

    {
      level:"C", id:"multiply_terms",
      label:"Multiplying terms",
      defaultOn:true,
      gen(){
        const factorCount = 4;
        const pronumeralCount = randInt(1,3);
        const numberCount = factorCount - pronumeralCount;

        const usedVars = [];
        const factors = [];

        for (let i=0; i<numberCount; i++){
          factors.push({ kind:'num', value: randInt(2,9) });
        }

        for (let i=0; i<pronumeralCount; i++){
          let v = pickVar();
          let guard = 0;
          while (usedVars.includes(v) && guard < 20){
            v = pickVar();
            guard++;
          }
          usedVars.push(v);
          factors.push({ kind:'var', value: v });
        }

        const shuffled = shuffle(factors);
        const exprHTML = shuffled.map(productFactorHTML).join(' × ');
        const ansHTML = buildMultiplyingTermsAnswer(shuffled);

        return { type:this.id, factors: shuffled, exprHTML, ansHTML };
      },
      key:q => `mt_${stripHTML(q.exprHTML)}`,
      render(q, idx1, showAnswers){
        const card = makeCardShell(idx1, biPrompt('simplify', [q.exprHTML]));
        card.appendChild(makeAnswerRowHTML(q.ansHTML, stripHTML(q.ansHTML), showAnswers));
        return card;
      }
    },

    {
      level:"C", id:"expand_simplify",
      label:"Expand and simplify (varied structures)",
      defaultOn:true,
      gen(){
        const template = choice(["c_plus_k_bracket", "k_bracket_plus_var", "two_var_bracket_plus", "two_var_big"]);
        let exprHTML = "";
        let finalTerms = [];

        if (template === "c_plus_k_bracket"){
          // 5 + 3(x + 5)
          const v = pickVar();
          const c0 = randInt(1,9);
          const k = randInt(2,6);
          const b = randInt(1,9);
          const sign = choice([+1,-1]);

          exprHTML = `${c0} + ${k}(${vHTML(v)} ${sign>0?"+":"−"} ${b})`;
          finalTerms = [
            { coeff: k, v },
            { coeff: c0 + k*(sign*b), v: null }
          ];
        }

        if (template === "k_bracket_plus_var"){
          // 3(x + 4) − 2x + 5
          const v = pickVar();
          const k = randInt(2,6);
          const b = randInt(1,9);
          const m = randInt(1,6);
          const addC = randInt(0,9);
          const signB = choice([+1,-1]);
          const signM = choice([+1,-1]);

          exprHTML = `${k}(${vHTML(v)} ${signB>0?"+":"−"} ${b}) ${signM>0?"+":"−"} ${m}${vHTML(v)}${addC?` + ${addC}`:""}`;
          finalTerms = [
            { coeff: k + signM*m, v },
            { coeff: k*(signB*b) + addC, v: null }
          ];
        }

        if (template === "two_var_bracket_plus"){
          // 5(2x + 3y) + 4y + 5x
          let v1 = pickVar(), v2 = pickVar();
          while (v2 === v1) v2 = pickVar();

          const k = randInt(2,5);
          const a = randInt(1,4);
          const b = randInt(1,4);
          const extra1 = randInt(0,6);
          const extra2 = randInt(0,6);

          exprHTML = `${k}(${a}${vHTML(v1)} + ${b}${vHTML(v2)})${extra2?` + ${extra2}${vHTML(v2)}`:""}${extra1?` + ${extra1}${vHTML(v1)}`:""}`;
          finalTerms = [
            { coeff: k*a + extra1, v: v1 },
            { coeff: k*b + extra2, v: v2 }
          ];
        }

        if (template === "two_var_big"){
          // 2(3x − y + 4) + x − 5y
          let v1 = pickVar(), v2 = pickVar();
          while (v2 === v1) v2 = pickVar();

          const k = randInt(2,4);
          const a = randInt(1,5);
          const b = randInt(1,5);
          const c0 = randInt(1,9);

          const outsideA = randInt(0,5);
          const outsideB = randInt(0,5);

          exprHTML = `${k}(${a}${vHTML(v1)} − ${b}${vHTML(v2)} + ${c0})${outsideA?` + ${outsideA}${vHTML(v1)}`:""}${outsideB?` − ${outsideB}${vHTML(v2)}`:""}`;
          finalTerms = [
            { coeff: k*a + outsideA, v: v1 },
            { coeff: -(k*b + outsideB), v: v2 },
            { coeff: k*c0, v: null }
          ];
        }

        const { map, csum } = simplifyTerms(finalTerms);
        const ansHTML = buildSimplifiedHTML(map, csum);

        return { type:this.id, exprHTML, ansHTML };
      },
      key:q => `es_${stripHTML(q.exprHTML)}`,
      render(q, idx1, showAnswers){
        const card = makeCardShell(idx1, biPrompt('expandSimplify', [q.exprHTML]));
        card.appendChild(makeAnswerRowHTML(q.ansHTML, stripHTML(q.ansHTML), showAnswers));
        return card;
      }
    },

    {
      level:"C", id:"alg_frac",
      label:"Simplify algebraic fractions (cancel common factors)",
      defaultOn:true,
      gen(){
        // C level: cancel common numerical and/or pronumeral factors, but keep the answer as a fraction.
        // Examples produced include forms like 32ax/24a -> 4x/3 and 16a/10 -> 8a/5.
        const templates = ["numOnly", "oneCommonVar", "twoVarsCancelOne", "twoVarsCancelToVarOverVar"];
        for (let tries=0; tries<300; tries++){
          const template = choice(templates);
          let v1 = pickVar(), v2 = pickVar();
          while (v2 === v1) v2 = pickVar();

          let topCoeff = randInt(2,9) * randInt(2,6);
          let botCoeff = randInt(2,9) * randInt(2,6);
          const g = gcd(topCoeff, botCoeff);
          if (g === 1) continue;

          let topVars = [], botVars = [];
          if (template === "numOnly"){
            topVars = [v1];
            botVars = [];
          } else if (template === "oneCommonVar"){
            topVars = [v1];
            botVars = [v1];
          } else if (template === "twoVarsCancelOne"){
            topVars = [v1, v2];
            botVars = [v1];
          } else {
            topVars = [v1, v2];
            botVars = [v1, pickVar()];
            while (botVars[1] === v1 || botVars[1] === v2) botVars[1] = pickVar();
          }

          const remainingTopVars = topVars.slice();
          const remainingBotVars = botVars.slice();
          for (const v of [...topVars]){
            const ti = remainingTopVars.indexOf(v);
            const bi = remainingBotVars.indexOf(v);
            if (ti >= 0 && bi >= 0){
              remainingTopVars.splice(ti,1);
              remainingBotVars.splice(bi,1);
            }
          }

          const a = topCoeff / g;
          const b = botCoeff / g;
          if (b === 1 && remainingBotVars.length === 0) continue; // keep answer visibly fractional

          const exprHTML = fracHTML(monomialHTML(topCoeff, topVars), monomialHTML(botCoeff, botVars));
          const ansHTML = fracHTML(monomialHTML(a, remainingTopVars), monomialHTML(b, remainingBotVars));
          return { type:this.id, exprHTML, ansHTML };
        }
        const exprHTML = fracHTML(`${32}${vHTML('a')}${vHTML('x')}`, `${24}${vHTML('a')}`);
        const ansHTML = fracHTML(`${4}${vHTML('x')}`, `3`);
        return { type:this.id, exprHTML, ansHTML };
      },
      key:q => `af_${stripHTML(q.exprHTML)}`,
      render(q, idx1, showAnswers){
        const card = makeCardShell(idx1, biPrompt('simplify', [q.exprHTML]));
        card.appendChild(makeAnswerRowHTML(q.ansHTML, stripHTML(q.ansHTML), showAnswers));
        return card;
      }
    },

    {
      level:"C", id:"pattern_table",
      label:"Complete a table of values (from an expression)",
      defaultOn:true,
      tableSequence:["n_plus_b", "n_minus_b", "an", "an_plus_b", "an_minus_b"],
      genWithForm(form){
        // Difficulty progression for tables:
        // n + b, n − b, an, an + b, an − b.
        const m = randInt(2,6);
        const b = randInt(1,8);

        let exprHTML = "";
        let rule = (n) => n;

        if (form === "n_plus_b"){
          exprHTML = `<span class="var">n</span> + ${b}`;
          rule = (n) => n + b;
        } else if (form === "n_minus_b"){
          exprHTML = `<span class="var">n</span> − ${b}`;
          rule = (n) => n - b;
        } else if (form === "an"){
          exprHTML = `${m}<span class="var">n</span>`;
          rule = (n) => m*n;
        } else if (form === "an_plus_b"){
          exprHTML = `${m}<span class="var">n</span> + ${b}`;
          rule = (n) => m*n + b;
        } else {
          exprHTML = `${m}<span class="var">n</span> − ${b}`;
          rule = (n) => m*n - b;
        }

        const ns = [1,2,3,4];
        const vals = ns.map(rule);
        return { type:this.id, form, m, b, exprHTML, ns, vals };
      },
      gen(){
        return this.genWithForm(choice(this.tableSequence));
      },
      key:q => `pt_${q.form}_${q.m}_${q.b}_${q.vals.join(",")}`,
      render(q, idx1, showAnswers){
        const promptHTML = `
          <span class="qPrompt">${biLine(lang()==="fa" ? "جدول را کامل کنید" : (lang()==="ar" ? "أكمل الجدول" : "Complete the table for:"), "Complete the table for:")}</span>
          <span class="qExprLine tableExprLine">${q.exprHTML}</span>
        `;
        const card = makeCardShell(idx1, promptHTML);
        card.querySelector('.qText').classList.add('splitExpr', 'tablePrompt');

        const work = card.querySelector('.workArea');
        work.classList.add('tableOnly');

        const headerRow = `<tr><th><span class="var">n</span></th>${q.ns.map(n=>`<th>${n}</th>`).join("")}</tr>`;
        const valueCells = showAnswers
          ? q.vals.map(v => `<td><div class="cellKey">${v}</div></td>`).join("")
          : q.vals.map(_ => `<td><div class="cellBlank"></div></td>`).join("");

        work.innerHTML = `
          <table class="tinyTbl">
            ${headerRow}
            <tr><th>${biLabel('value')}</th>${valueCells}</tr>
          </table>
        `;

        // no answer bubble for table questions
        return card;
      }
    },
  ];

  // ============================================================
  // UI / ENGINE
  // ============================================================
  function currentOutcome(){
    const val = outcomeSel.value;
    return CONFIG.outcomes.find(o => o.value === val) || CONFIG.outcomes[0];
  }

  function typesForCurrentLevel(){
    const lvl = currentOutcome().level;
    return ALL_TYPES.filter(t => t.level === lvl);
  }

  function localizeUI(){
    // Teacher-facing controls stay in English. The selected language only affects
    // the generated worksheet / answer key pages.
    document.documentElement.lang = 'en';
    document.documentElement.dir = 'ltr';
    genBtn.textContent = 'Generate';
    printBtn.textContent = 'Print / Save as PDF';
    resetBtn.textContent = 'Reset';
    Array.from(outcomeSel.options).forEach(opt => {
      const original = CONFIG.outcomes.find(o => o.value === opt.value);
      if (original) opt.textContent = original.label;
    });
    updateToggleAllButtonLabel();
  }

  function initUI(){
    document.title = CONFIG.title;

    outcomeSel.innerHTML = '';
    for (const o of CONFIG.outcomes){
      const opt = document.createElement('option');
      opt.value = o.value;
      opt.dataset.level = o.level;
      opt.textContent = o.label;
      outcomeSel.appendChild(opt);
    }

    countInp.min = String(CONFIG.minCount);
    countInp.max = String(CONFIG.maxCount);
    countInp.step = String(CONFIG.perPage);
    countInp.value = String(CONFIG.defaultCount);

    localizeUI();
    rebuildCheckboxes();
  }

  function updateToggleAllButtonLabel(){
    const boxes = Array.from(chkWrap.querySelectorAll('input[type="checkbox"]'));
    if (!boxes.length){
      toggleAllBtn.textContent = 'Select all';
      return;
    }
    const allChecked = boxes.every(b => b.checked);
    toggleAllBtn.textContent = allChecked ? 'Deselect all' : 'Select all';
  }

  function rebuildCheckboxes(){
    chkWrap.innerHTML = '';
    const types = typesForCurrentLevel();

    for (const qt of types){
      const lab = document.createElement('label');
      lab.className = 'chk';

      const inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.id = `chk_${qt.id}`;
      inp.checked = !!qt.defaultOn;
      inp.addEventListener('change', updateToggleAllButtonLabel);

      const span = document.createElement('span');
      span.textContent = qt.label;

      lab.appendChild(inp);
      lab.appendChild(span);
      chkWrap.appendChild(lab);
    }

    updateToggleAllButtonLabel();
  }

  function setAllCheckboxes(checked){
    const boxes = chkWrap.querySelectorAll('input[type="checkbox"]');
    boxes.forEach(box => box.checked = checked);
    updateToggleAllButtonLabel();
  }

  function activeTypes(){
    const types = typesForCurrentLevel();
    const ids = new Set();
    for (const qt of types){
      const el = document.getElementById(`chk_${qt.id}`);
      if (el && el.checked) ids.add(qt.id);
    }
    return types.filter(qt => ids.has(qt.id));
  }

  function uniqPush(arr, item, keyFn){
    const k = keyFn(item);
    if (arr.some(x => keyFn(x) === k)) return false;
    arr.push(item);
    return true;
  }

  function generateQuestions(n){
    const types = activeTypes();
    if (!types.length) return [];

    const qs = [];
    let safety = 0;

    while (qs.length < n && safety < 15000){
      safety++;
      const qt = choice(types);
      const q = qt.gen();
      if (!q) continue;

      const keyFn = (x) => {
        const t = types.find(tt => tt.id === x.type);
        if (!t) return JSON.stringify(x);
        return (t.key ? t.key(x) : JSON.stringify(x));
      };

      if (!uniqPush(qs, q, keyFn)) continue;
    }

    // Rebuild table-of-values questions in order of increasing difficulty.
    // This preserves the random spread of selected question types, but ensures
    // the first table question is n+b, the next is n−b, then an, an+b, an−b,
    // cycling again if the worksheet contains more than five table questions.
    const tableType = ALL_TYPES.find(t => t.id === 'pattern_table');
    if (tableType && tableType.genWithForm){
      let tableIndex = 0;
      for (let i=0; i<qs.length; i++){
        if (qs[i].type !== 'pattern_table') continue;
        const form = tableType.tableSequence[tableIndex % tableType.tableSequence.length];
        qs[i] = tableType.genWithForm(form);
        tableIndex++;
      }
    }

    return qs;
  }

  function pageHTML(pageTitle, pageSubtitle, pageIndex, pageCount){
    const page = document.createElement('div');
    page.className = 'page' + (dir()==='rtl' ? ' lang-rtl' : '');

    const border = document.createElement('img');
    border.className = 'pageBorder';
    border.alt = '';
    border.src = CONFIG.borderSrc;
    page.appendChild(border);

    const inner = document.createElement('div');
    inner.className = 'pageInner';
    page.appendChild(inner);

    const content = document.createElement('div');
    content.className = 'pageContent';
    inner.appendChild(content);

    const header = document.createElement('div');
    header.className = 'pageHeader';
    header.innerHTML = `
      <div class="hdrLeft">
        <div class="hdrTitle">${pageTitle} — ${biLabel('page')} ${pageIndex} / ${pageCount}</div>
        <div class="hdrSub">${pageSubtitle}</div>
      </div>
      <div class="nameRow">
        <div class="lineField"><div class="lineLabel">${biLabel('name')}</div><div class="lineBox"></div></div>
        <div class="lineField"><div class="lineLabel">${biLabel('className')}</div><div class="lineBox"></div></div>
        <div class="lineField"><div class="lineLabel">${biLabel('date')}</div><div class="lineBox"></div></div>
      </div>
    `;
    content.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'grid';
    content.appendChild(grid);

    return { page, grid };
  }

  function buildPages(questions, pageTitle, pageSubtitle, showAnswers){
    const pages = [];
    const totalPages = Math.ceil(questions.length / CONFIG.perPage);
    let qNum = 1;

    const typeMap = new Map(ALL_TYPES.map(t => [t.id, t]));

    for (let p=0; p<totalPages; p++){
      const { page, grid } = pageHTML(pageTitle, pageSubtitle, p+1, totalPages);
      const slice = questions.slice(p*CONFIG.perPage, p*CONFIG.perPage + CONFIG.perPage);

      for (const q of slice){
        const qt = typeMap.get(q.type);
        if (!qt) continue;
        grid.appendChild(qt.render(q, qNum, showAnswers));
        qNum++;
      }

      pages.push(page);
    }

    return pages;
  }

  function generate(){
    clearOut();

    let n = Number(countInp.value);
    if (!Number.isFinite(n)) n = CONFIG.defaultCount;
    n = clamp(Math.round(n), CONFIG.minCount, CONFIG.maxCount);
    countInp.value = String(n);

    const qs = generateQuestions(n);
    if (!qs.length){
      out.innerHTML = `<div style="padding:12px; font-weight:950; color:#991b1b;">Please tick at least one question type.</div>`;
      return;
    }

    const outcome = currentOutcome();
    const subtitle = outcome.level === 'DE' ? tr('outcomeDE') : tr('outcomeC');

    const ws  = buildPages(qs, tr('pageTitle'), subtitle, false);
    const key = buildPages(qs, tr('answerKeyTitle'), subtitle, true);

    for (const pg of ws) out.appendChild(pg);
    for (const pg of key) out.appendChild(pg);

    if (out.firstElementChild) out.firstElementChild.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  function reset(){
    clearOut();
    countInp.value = String(CONFIG.defaultCount);
    outcomeSel.selectedIndex = 0;
    rebuildCheckboxes();
  }

  outcomeSel.addEventListener('change', () => {
    clearOut();
    rebuildCheckboxes();
  });

  languageSel.addEventListener('change', () => {
    localizeUI();
    if (out.children.length) generate();
  });

  toggleAllBtn.addEventListener('click', () => {
    const boxes = Array.from(chkWrap.querySelectorAll('input[type="checkbox"]'));
    const allChecked = boxes.length && boxes.every(b => b.checked);
    setAllCheckboxes(!allChecked);
  });

  genBtn.addEventListener('click', generate);
  printBtn.addEventListener('click', () => window.print());
  resetBtn.addEventListener('click', reset);

  initUI();
})();
</script>
