/* v13 halving-and-doubling fit + consistent working-line size */
.halveVisual{
  width:100% !important;
  max-width:100% !important;
  margin:10px auto 2px !important;
  overflow:visible;
}
.halveGrid{
  width:100% !important;
  display:grid !important;
  grid-template-columns:minmax(0,1fr) 34px minmax(0,1fr) !important;
  grid-template-rows:auto auto auto auto auto !important;
  column-gap:8px !important;
  row-gap:8px !important;
  align-items:center !important;
  justify-items:center !important;
}
.halveCell,
.halveCell.op,
.halveResult,
.halveBreakdownLine{
  font-size:32px !important;
  font-weight:700 !important;
  line-height:1.08 !important;
}
.halveBreakdownLine{
  grid-column:1 / 4 !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  gap:12px !important;
  margin-top:12px !important;
  white-space:nowrap !important;
}
.halveBreakdownLine .groupPurple,
.halveBreakdownLine .groupGreen{
  font-size:32px !important;
  line-height:1 !important;
  padding:.03em .22em .08em !important;
}
.halveStep{
  font-size:18px !important;
}
.halveArrow{
  font-size:42px !important;
}

@media print{
  .triGrid{
    grid-template-columns:repeat(3,minmax(0,1fr)) !important;
  }
  .col{
    min-width:0 !important;
    overflow:hidden !important;
    padding-left:7px !important;
    padding-right:7px !important;
  }
  .halveVisual{
    width:100% !important;
    max-width:100% !important;
  }
  .halveGrid{
    grid-template-columns:minmax(0,1fr) 26px minmax(0,1fr) !important;
    column-gap:4px !important;
    row-gap:5px !important;
  }
  .halveCell,
  .halveCell.op,
  .halveResult,
  .halveBreakdownLine{
    font-size:24px !important;
    line-height:1.05 !important;
  }
  .halveBreakdownLine{
    gap:6px !important;
    margin-top:8px !important;
  }
  .halveBreakdownLine .groupPurple,
  .halveBreakdownLine .groupGreen{
    font-size:24px !important;
    padding:.02em .16em .06em !important;
  }
  .halveStep{
    font-size:14px !important;
  }
  .halveArrow{
    font-size:31px !important;
  }
  .answer{
    font-size:24px !important;
  }
}


/* v14 decimal-connection print fit */
.decimalVisual{
  width:100% !important;
  max-width:100% !important;
  margin:10px auto 2px !important;
  overflow:visible;
}
.decimalGrid{
  width:100% !important;
  display:grid !important;
  grid-template-columns:minmax(0,1fr) 34px minmax(0,1fr) !important;
  column-gap:8px !important;
  row-gap:8px !important;
  align-items:center !important;
  justify-items:center !important;
}
.decimalCell,
.decimalCell.op,
.decimalResult{
  font-size:32px !important;
  font-weight:700 !important;
  line-height:1.08 !important;
}
.decimalFactorLine{
  width:100% !important;
  text-align:center !important;
  white-space:nowrap !important;
  font-size:32px !important;
  line-height:1.25 !important;
  margin-top:12px !important;
}
.decimalFactorLine .groupPurple,
.decimalFactorLine .groupGreen,
.decimalResult .groupPurple,
.decimalResult .groupGreen{
  font-size:32px !important;
  line-height:1 !important;
  padding:.03em .22em .08em !important;
}
.decimalStep{
  font-size:18px !important;
}
.decimalArrow{
  font-size:42px !important;
}

@media print{
  .decimalVisual{
    width:100% !important;
    max-width:100% !important;
    overflow:visible !important;
  }
  .decimalGrid{
    grid-template-columns:minmax(0,1fr) 24px minmax(0,1fr) !important;
    column-gap:2px !important;
    row-gap:5px !important;
  }
  .decimalCell,
  .decimalCell.op,
  .decimalResult{
    font-size:22px !important;
    line-height:1.05 !important;
  }
  .decimalStep{
    font-size:13px !important;
  }
  .decimalArrow{
    font-size:29px !important;
  }
  .decimalFactorLine{
    font-size:22px !important;
    line-height:1.18 !important;
    margin-top:6px !important;
    white-space:nowrap !important;
  }
  .decimalFactorLine .groupPurple,
  .decimalFactorLine .groupGreen,
  .decimalResult .groupPurple,
  .decimalResult .groupGreen{
    font-size:22px !important;
    padding:.02em .14em .05em !important;
  }
}
